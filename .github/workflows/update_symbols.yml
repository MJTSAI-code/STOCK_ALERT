name: 美股代號字庫月更

on:
  schedule:
    # 每月 2 號 台灣時間 05:30（UTC 21:30 前一日）——避開整點壅塞
    - cron: '30 21 1 * *'
  workflow_dispatch:

concurrency:
  group: symbols-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-symbols:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 產生字庫
        run: python fetch_symbols.py

      - name: Commit（僅在有變動時）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet symbols.json 2>/dev/null && git ls-files --error-unmatch symbols.json >/dev/null 2>&1; then
            echo "字庫無變動，不 commit"
          else
            git add symbols.json
            git commit -m "📚 月更美股代號字庫"
            git push
          fi
