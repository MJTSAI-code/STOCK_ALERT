name: 24H 美股盤前情報自動推送

on:
  schedule:
    # 國際標準時間（UTC），換算台灣時間為每日早上 06:00 與晚上 18:00
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch: # 允許你隨時手動點擊按鈕、立刻測試發送

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 檢查專案代碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: pip install requests pytz

    - name: 執行自動化抓取與推送
      env:
        FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python - << 'EOF'
        import os, requests, datetime, time
        import pytz

        # 核心組態
        API_KEY = os.environ.get('FINNHUB_KEY')
        WEBHOOK_URL = os.environ.get('DISCORD_WEBHOOK')
        STOCKS = [
            {'sym': 'NOW', 'name': 'ServiceNow'},
            {'sym': 'NVDA', 'name': 'Nvidia'},
            {'sym': 'LITE', 'name': 'Lumentum'},
            {'sym': 'ONDS', 'name': 'Ondas 無人機'},
            {'sym': 'MRVL', 'name': 'Marvell'},
            {'sym': 'GOOG', 'name': 'Google C'}
        ]

        if not WEBHOOK_URL or "discord.com" not in WEBHOOK_URL:
            print("❌ 錯誤：尚未設定正確的 Discord Webhook 密鑰！")
            exit(1)

        print("🚀 開始抓取美股最新盤前情報...")
        
        # 解決時區問題：強制鎖定台灣時間
        tw_tz = pytz.timezone('Asia/Taipei')
        now_tw = datetime.datetime.now(tw_tz)
        today = now_tw.date()
        from_date = today - datetime.timedelta(days=3)

        # 抓取並組合訊息
        for s in STOCKS:
            sym = s['sym']
            
            # 1. 抓取股價
            try:
                q_res = requests.get(f"https://finnhub.io/api/v1/quote?symbol={sym}&token={API_KEY}").json()
                price_str = f"${q_res.get('c', 0):.2f} (漲跌: {q_res.get('d', 0):+.2f})" if q_res.get('c') else "暫無報價"
            except Exception as e:
                price_str = f"報價連線失敗 ({str(e)})"

            # 2. 抓取最新 2 條新聞
            news_str = ""
            try:
                n_res = requests.get(f"https://finnhub.io/api/v1/company-news?symbol={sym}&from={from_date}&to={today}&token={API_KEY}").json()
                if n_res and len(n_res) > 0:
                    for item in n_res[:2]:
                        news_str += f"• **[{item['source']}]** {item['headline']}\n👉 <{item['url']}>\n"
                else:
                    news_str = "• 該個股今日盤前暫無重大頭條新聞。\n"
            except Exception as e:
                news_str = f"• 新聞資料抓取失敗。({str(e)})\n"

            # 3. 組裝 Discord 卡片
            payload = {
                "embeds": [{
                    "title": f"📊 {sym} - {s['name']} 盤前速報",
                    "color": 5793266, 
                    "description": f"**最新價格：** {price_str}\n\n**🔥 相關即時情報：**\n{news_str}",
                    "footer": {"text": f"美股盤前情報站 · 數據更新時間: {now_tw.strftime('%Y-%m-%d %H:%M')}"}
                }]
            }
            
            # 4. 發射到 Discord
            res = requests.post(WEBHOOK_URL, json=payload)
            if res.status_code in [200, 204]:
                print(f"✅ 已成功推送 {sym} 到 Discord！")
            else:
                print(f"❌ 推送 {sym} 失敗，Discord 回傳狀態碼: {res.status_code}")
            
            # 防爆機制：稍微停頓 1 秒，避免被 Discord 認定是惡意刷頻
            time.sleep(1)
            
        EOF
