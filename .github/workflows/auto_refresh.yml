name: 美股數據更新與情報推送
on:
  schedule:
    - cron: '40 21 * * 0-4'   # 台灣週一到週五 05:40（UTC 週日到週四 21:40）
    - cron: '40 9  * * 1-5'   # 台灣週一到週五 17:40（UTC 10:40）- 早到確保18:00前執行
    - cron: '40 21 * * 5'     # 台灣週六 05:40（UTC 週五 21:40）
    - cron: '*/1 13-21 * * 1-5'   # 盤中每分鐘更新
    - cron: '*/30 * * * 1-5'      # 每30分鐘靜默更新
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查是否為平日（週六日完全不執行）
        id: check_weekday
        run: |
          export TZ="Asia/Taipei"
          TW_DOW=$(date +%u)
          UTC_DOW=$(date -u +%u)
          echo "台灣星期: ${TW_DOW} / UTC星期: ${UTC_DOW}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手動觸發，強制放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$TW_DOW" -ge 1 ] && [ "$TW_DOW" -le 5 ]; then
            echo "✅ 平日，繼續執行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$UTC_DOW" -ge 1 ] && [ "$UTC_DOW" -le 5 ]; then
            echo "✅ 台灣週六但UTC仍平日，放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          else
            echo "🛌 週末，完全跳過"
            echo "is_weekday=false" >> $GITHUB_ENV
          fi

      - name: 複製專案代碼
        if: env.is_weekday == 'true'
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        if: env.is_weekday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝依賴
        if: env.is_weekday == 'true'
        run: pip install yfinance pytz

      - name: 執行資料爬蟲
        if: env.is_weekday == 'true'
        run: python update_stocks.py

      - name: 判斷是否推播（Python 精準判斷台灣時間）
        if: env.is_weekday == 'true'
        run: |
          python3 - <<'EOF'
          import os
          from datetime import datetime
          import pytz

          tw = pytz.timezone('Asia/Taipei')
          now = datetime.now(tw)
          hour = now.hour
          minute = now.minute
          weekday = now.weekday()  # 0=週一, 6=週日

          print(f"台灣時間: {now.strftime('%Y-%m-%d %H:%M')} 週{weekday+1}")

          # 推播窗口：±20分鐘緩衝
          morning = (hour == 5 and minute >= 40) or (hour == 6 and minute <= 20)
          evening = (hour == 17 and minute >= 40) or (hour == 18 and minute <= 20)

          # 週日完全不推
          if weekday == 6:
              send = False
              reason = "週日不推播"
          # 週六只推早上
          elif weekday == 5:
              send = morning
              reason = "週六早上推播" if send else "週六非推播時間"
          # 週一到週五推早上和晚上
          else:
              send = morning or evening
              if morning:
                  reason = "平日早上推播"
              elif evening:
                  reason = "平日晚上推播"
              else:
                  reason = "非推播時間，靜默更新"

          print(f"推播決定: {send} ({reason})")

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"send_alert={'true' if send else 'false'}\n")
          EOF

      - name: 推送 stock_data.json 回倉庫
        if: env.is_weekday == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock_data.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🔄 自動更新股票數據 [skip ci]"
            git push
          else
            echo "數據無變動，跳過 Commit"
          fi

      - name: 發射 Telegram 推送
        if: env.is_weekday == 'true' && env.send_alert == 'true'
        run: |
          curl -sS --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🛡️ 美股情報室數據已更新！%0A🚀 開啟儀表板：https://mjtsai-code.github.io/STOCK_ALERT/" \
            -d "disable_web_page_preview=true"
