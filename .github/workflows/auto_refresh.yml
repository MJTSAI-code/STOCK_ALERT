name: 美股數據更新與情報推送
on:
  schedule:
    # ── 低頻排程（UTC）。設計原則：推播成功率最大化。
    # 實測 2026-07-10：原高頻排程（~120 次/日）遭 GitHub 降級，
    # 實際執行間隔 1.5–2 小時，morning 窗口 05:30–06:30 整段零 run。
    # 低頻（~21 次/日）+ 分鐘 offset 2/32/50/5 避開整點高峰。
    # /* Backup of original schedule (高頻，遭 GitHub 丟棄 ~95%):
    # - cron: '2-57/5 13-21 * * 1-5'
    # - cron: '7,37 8-12 * * 1-5'
    # - cron: '7,37 22 * * 1-5'
    # */
    - cron: '2,32 13-20 * * 1-5'   # 盤中每 30 分。TW 21:02–04:32。
                                    # 21:32 = 夏令開盤後 2 分；22:32 = 冬令開盤後 2 分，
                                    # 兩種令制下開盤即有新價。
    - cron: '2 21 * * 1-5'          # TW 05:02：冬令收盤（05:00）收尾快照。
                                    # 夏令此發為盤後快照，無害。
    - cron: '50 21 * * 1-5'         # TW 05:50：morning 推播主發（窗口 05:30–06:30）
    - cron: '5 22 * * 1-5'          # TW 06:05：morning 推播備援（alert_sent 去重）
    - cron: '50 9 * * 1-5'          # TW 17:50：evening 推播主發（窗口 17:45–18:59）
    - cron: '5 10 * * 1-5'          # TW 18:05：evening 推播備援（alert_sent 去重）
    - cron: '35 10 * * 1-5'         # TW 18:35：晚間盤前追蹤（落在推播窗口內，
                                    # alert_sent 已標記 → 靜默更新不重推）
    - cron: '2,32 11-12 * * 1-5'    # TW 19:02–20:32 每 30 分：晚間盤前追蹤，
                                    # 銜接 21:02 起的盤中排程，全程無 30 分以上空窗
  workflow_dispatch:
permissions:
  contents: write
# 防併發：多條 cron 或外部 workflow_dispatch（cron-job.org 保險）同時觸發時
# 排隊執行，避免雙 run 同時 git push 造成 non-fast-forward 失敗與
# stock_data.json lost-update。
# cancel-in-progress: false → 排隊而非砍掉正在推播的 run。
concurrency:
  group: stock-update
  cancel-in-progress: false
jobs:
  update-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查是否為平日
        id: check_weekday
        run: |
          export TZ="Asia/Taipei"
          TW_DOW=$(date +%u)
          UTC_DOW=$(date -u +%u)
          echo "台灣星期: ${TW_DOW} / UTC星期: ${UTC_DOW}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手動觸發，強制放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$TW_DOW" -ge 1 ] && [ "$TW_DOW" -le 5 ]; then
            echo "✅ 平日，繼續執行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$UTC_DOW" -ge 1 ] && [ "$UTC_DOW" -le 5 ]; then
            echo "✅ 台灣週六但UTC仍平日，放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          else
            echo "🛌 週末，完全跳過"
            echo "is_weekday=false" >> $GITHUB_ENV
          fi
      - name: 複製專案代碼
        if: env.is_weekday == 'true'
        uses: actions/checkout@v4
      - name: 設定 Python 環境
        if: env.is_weekday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安裝依賴
        if: env.is_weekday == 'true'
        run: pip install yfinance pytz
      - name: 執行資料爬蟲（含推播判斷）
        if: env.is_weekday == 'true'
        run: |
          python update_stocks.py
          SHOULD_ALERT=$(cat should_alert.txt 2>/dev/null || echo "false")
          echo "send_alert=${SHOULD_ALERT}" >> $GITHUB_ENV
          echo "推播決定: ${SHOULD_ALERT}"
      # ── 步驟順序刻意為 Telegram 先、git push 後（at-least-once 語義）──
      # 若先 push 再發送：curl 失敗時 alert_sent 已上庫 → 當日該 session
      # 推播永久丟失且無重試。交換後：發送失敗 → job fail → alert_sent
      # 不上庫 → 下輪 cron 自動重試。Trade-off: 極端情況（發送成功但
      # push 失敗）會重複推播一則 —— 監控系統寧重複、不漏報。
      - name: 發射 Telegram 推送
        if: env.is_weekday == 'true' && env.send_alert == 'true'
        run: |
          MSG=$(cat telegram_msg.txt)
          curl -sS --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
      - name: 推送 stock_data.json 回倉庫
        if: env.is_weekday == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock_data.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🔄 自動更新股票數據 [skip ci]"
            # rebase 防護：前一 run 剛 push、本 run 持舊 HEAD 時避免
            # non-fast-forward 失敗。--autostash 保護未預期的工作區殘留。
            # -X theirs：stock_data.json 為全量重生成的 artifact，content
            # conflict 一律取本輪新資料。注意 rebase 期間 ours/theirs 反轉——
            # theirs = 正在重放的本地 commit（新 JSON），非遠端。
            # /* Backup of original logic:
            # git pull --rebase --autostash origin ${{ github.ref_name }}
            # */
            git pull --rebase --autostash -X theirs origin ${{ github.ref_name }}
            git push
          else
            echo "數據無變動，跳過 Commit"
          fi
