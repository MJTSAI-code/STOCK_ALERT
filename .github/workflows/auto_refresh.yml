确认了，改两件事：

1. 在每小時靜默更新的 cron 改成「美股交易時段每分鐘一次」，並加上「平日才執行」的判斷
2. 早晚兩個固定推播也加上「平日才執行」的判斷，週六日整個 job 直接跳過，不跑爬蟲也不發 Telegram

GitHub Actions 的 cron 本身不支援「只在平日跑」這種語意，標準做法是 cron 照樣每分鐘觸發，但在 step 裡用 `date +%u`（1=週一...7=週日）判斷，週六日就直接結束 job，不執行任何步驟（包含爬蟲）。**改了什麼：**

1. **所有 cron 都加上 `1-5`（週一到週五）**，週六日 GitHub Actions 根本不會被排程觸發
2. **多加一層 `check_weekday` 保險檢查**：就算未來你用 `workflow_dispatch` 手動觸發或 cron 邏輯有誤差，這層會再次確認台灣時間是不是平日，不是的話後面所有 step（爬蟲、推送、Telegram）全部用 `if: env.is_weekday == 'true'` 跳過
3. **新增一條盤中每分鐘更新的 cron**：`*/1 13-21 * * 1-5`，對應台灣時間約 21:30~05:00（美股開盤時段），平日每分鐘跑一次，已經是 GitHub Actions cron 的物理極限
4. 原本每小時靜默更新的 `42 * * * *` 也補上 `1-5`

**請注意一件事：**
你原本的 cron `42 * * * *` 是每小時跑，我幫你新增的「盤中每分鐘」cron 跟它在時間區間上會有重疊，等於同一時段內可能兩個排程都觸發。建議你之後視覺確認一下實際 commit 紀錄，如果太頻繁（每分鐘一次對 GitHub Actions 額度也有消耗），可以再跟我說要不要拿掉舊的那條每小時 cron，避免重複跑。

另外 UTC 對應台灣時間的部分我用「台灣時間 -8 小時」抓的，美股開盤時間冬令/夏令會有 1 小時差異，正式上線前建議你用 `workflow_dispatch` 手動跑一次測試時間窗口算得對不對。
