name: 美股數據更新與情報推送
on:
  schedule:
    - cron: '30 21 * * 0-4'
    - cron: '30 9 * * 1-5'
    - cron: '*/5 13-21 * * 1-5'
    - cron: '*/30 * * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查是否為平日
        id: check_weekday
        run: |
          export TZ="Asia/Taipei"
          TW_DOW=$(date +%u)
          UTC_DOW=$(date -u +%u)
          echo "台灣星期: ${TW_DOW} / UTC星期: ${UTC_DOW}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手動觸發，強制放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$TW_DOW" -ge 1 ] && [ "$TW_DOW" -le 5 ]; then
            echo "✅ 平日，繼續執行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$UTC_DOW" -ge 1 ] && [ "$UTC_DOW" -le 5 ]; then
            echo "✅ 台灣週六但UTC仍平日，放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          else
            echo "🛌 週末，完全跳過"
            echo "is_weekday=false" >> $GITHUB_ENV
          fi
      - name: 複製專案代碼
        if: env.is_weekday == 'true'
        uses: actions/checkout@v4
      - name: 設定 Python 環境
        if: env.is_weekday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安裝依賴
        if: env.is_weekday == 'true'
        run: pip install yfinance pytz
      - name: 執行資料爬蟲（含推播判斷）
        if: env.is_weekday == 'true'
        run: |
          python update_stocks.py
          SHOULD_ALERT=$(cat should_alert.txt 2>/dev/null || echo "false")
          echo "send_alert=${SHOULD_ALERT}" >> $GITHUB_ENV
          echo "推播決定: ${SHOULD_ALERT}"
      - name: 推送 stock_data.json 回倉庫
        if: env.is_weekday == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock_data.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🔄 自動更新股票數據 [skip ci]"
            git push
          else
            echo "數據無變動，跳過 Commit"
          fi
      - name: 發射 Telegram 推送
        if: env.is_weekday == 'true' && env.send_alert == 'true'
        run: |
          MSG=$(cat telegram_msg.txt)
          curl -sS --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" \
            -d "disable_web_page_preview=true"
