name: 美股數據更新與情報推送
on:
  schedule:
    # /* Backup of original schedule (兩條殭屍 cron 為舊推播窗口殘留，已刪):
    # - cron: '30 21 * * 0-4'   # TW 05:30 — 舊 morning 窗口，新邏輯下為靜默區
    # - cron: '30 9 * * 1-5'    # TW 17:30 — 舊 evening 窗口，新邏輯下為靜默區
    # */
    - cron: '*/5 13-21 * * 1-5'   # 正式盤高頻更新（UTC 13-21 ≈ TW 21:00-05:55 夏令）
    - cron: '*/30 * * * 1-5'      # 全日 catch-all：覆蓋 morning 窗口 UTC 22:30/23:00
                                  # 與 evening 窗口 UTC 10:00/10:30，每窗口兩發容錯
  workflow_dispatch:
permissions:
  contents: write
# 防併發：*/5 與 */30 在 :00/:30 同時觸發時排隊執行，
# 避免雙 run 同時 git push 造成 non-fast-forward 失敗與 stock_data.json lost-update。
# cancel-in-progress: false → 排隊而非砍掉正在推播的 run。
concurrency:
  group: stock-update
  cancel-in-progress: false
jobs:
  update-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查是否為平日
        id: check_weekday
        run: |
          export TZ="Asia/Taipei"
          TW_DOW=$(date +%u)
          UTC_DOW=$(date -u +%u)
          echo "台灣星期: ${TW_DOW} / UTC星期: ${UTC_DOW}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手動觸發，強制放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$TW_DOW" -ge 1 ] && [ "$TW_DOW" -le 5 ]; then
            echo "✅ 平日，繼續執行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$UTC_DOW" -ge 1 ] && [ "$UTC_DOW" -le 5 ]; then
            echo "✅ 台灣週六但UTC仍平日，放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          else
            echo "🛌 週末，完全跳過"
            echo "is_weekday=false" >> $GITHUB_ENV
          fi
      - name: 複製專案代碼
        if: env.is_weekday == 'true'
        uses: actions/checkout@v4
      - name: 設定 Python 環境
        if: env.is_weekday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安裝依賴
        if: env.is_weekday == 'true'
        run: pip install yfinance pytz
      - name: 執行資料爬蟲（含推播判斷）
        if: env.is_weekday == 'true'
        run: |
          python update_stocks.py
          SHOULD_ALERT=$(cat should_alert.txt 2>/dev/null || echo "false")
          echo "send_alert=${SHOULD_ALERT}" >> $GITHUB_ENV
          echo "推播決定: ${SHOULD_ALERT}"
      # ── 步驟順序刻意為 Telegram 先、git push 後（at-least-once 語義）──
      # 若先 push 再發送：curl 失敗時 alert_sent 已上庫 → 當日該 session
      # 推播永久丟失且無重試。交換後：發送失敗 → job fail → alert_sent
      # 不上庫 → 下輪 cron 自動重試。Trade-off: 極端情況（發送成功但
      # push 失敗）會重複推播一則 —— 監控系統寧重複、不漏報。
      - name: 發射 Telegram 推送
        if: env.is_weekday == 'true' && env.send_alert == 'true'
        run: |
          MSG=$(cat telegram_msg.txt)
          curl -sS --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MSG}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
      - name: 推送 stock_data.json 回倉庫
        if: env.is_weekday == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock_data.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🔄 自動更新股票數據 [skip ci]"
            # rebase 防護：前一 run 剛 push、本 run 持舊 HEAD 時避免
            # non-fast-forward 失敗。--autostash 保護未預期的工作區殘留。
            git pull --rebase --autostash origin ${{ github.ref_name }}
            git push
          else
            echo "數據無變動，跳過 Commit"
          fi
