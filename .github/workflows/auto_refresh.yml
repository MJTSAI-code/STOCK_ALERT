name: 美股數據更新與情報推送
on:
  schedule:
    - cron: '30 21 * * 0-4'
    - cron: '30 9 * * 1-5'
    - cron: '*/1 13-21 * * 1-5'
    - cron: '*/30 * * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查是否為平日（週六日完全不執行）
        id: check_weekday
        run: |
          export TZ="Asia/Taipei"
          TW_DOW=$(date +%u)
          UTC_DOW=$(date -u +%u)
          echo "台灣星期: ${TW_DOW} / UTC星期: ${UTC_DOW}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手動觸發，強制放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$TW_DOW" -ge 1 ] && [ "$TW_DOW" -le 5 ]; then
            echo "✅ 平日，繼續執行"
            echo "is_weekday=true" >> $GITHUB_ENV
          elif [ "$UTC_DOW" -ge 1 ] && [ "$UTC_DOW" -le 5 ]; then
            echo "✅ 台灣週六但UTC仍平日（週五盤前05:30），放行"
            echo "is_weekday=true" >> $GITHUB_ENV
          else
            echo "🛌 週末，完全跳過"
            echo "is_weekday=false" >> $GITHUB_ENV
          fi
      - name: 複製專案代碼
        if: env.is_weekday == 'true'
        uses: actions/checkout@v4

      - name: 檢查是否為推播時段（依觸發來源判斷，避免每分鐘更新洗版）
        if: env.is_weekday == 'true'
        id: check_time
        run: |
          export TZ="Asia/Taipei"
          TW_HOUR=$(date +%k | tr -d ' ')
          echo "台灣時間: ${TW_HOUR} 點，觸發來源: ${{ github.event.schedule }}"

          # 只有「早上整點排程」或「晚上整點排程」或手動觸發才推播
          # 「每分鐘」「每30分鐘」這兩組只負責更新資料，絕不推播
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "✅ 手動觸發，強制推播"
            echo "send_alert=true" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 21 * * 0-4" ]; then
            echo "✅ 早上排程觸發，推播"
            echo "send_alert=true" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 9 * * 1-5" ]; then
            echo "✅ 晚上排程觸發，推播"
            echo "send_alert=true" >> $GITHUB_ENV
          else
            echo "🤫 背景靜默更新，不發 Telegram"
            echo "send_alert=false" >> $GITHUB_ENV
          fi

          # 新聞更新：早上排程或手動觸發時才更新
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "UPDATE_NEWS=true" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 21 * * 0-4" ]; then
            echo "UPDATE_NEWS=true" >> $GITHUB_ENV
          else
            echo "UPDATE_NEWS=false" >> $GITHUB_ENV
          fi

      - name: 設定 Python 環境
        if: env.is_weekday == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安裝依賴
        if: env.is_weekday == 'true'
        run: pip install yfinance pytz
      - name: 執行資料爬蟲
        if: env.is_weekday == 'true'
        run: python update_stocks.py
        env:
          UPDATE_NEWS: ${{ env.UPDATE_NEWS }}
      - name: 推送 stock_data.json 回倉庫
        if: env.is_weekday == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stock_data.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🔄 自動更新股票數據 [skip ci]"
            git push
          else
            echo "數據無變動，跳過 Commit"
          fi
      - name: 發射 Telegram 推送
        if: env.is_weekday == 'true' && env.send_alert == 'true'
        run: |
          curl -sS --fail -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🛡️ 美股情報室數據已更新！%0A🚀 開啟儀表板：https://mjtsai-code.github.io/STOCK_ALERT/" \
            -d "disable_web_page_preview=true"
