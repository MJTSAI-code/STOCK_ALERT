name: 每日美股盤前推播

on:
  schedule:
    # 📝 轉換為國際標準時間 UTC（台灣 06:00 = UTC 22:00 / 台灣 18:00 = UTC 10:00）
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch: # 讓你可以手動在 GitHub 點擊按鈕測試

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 呼叫 Telegram 機器人發送通知
        run: |
          # ⚡ 這裡設定你要顯示的手機通知文字
          TEXT="🛡️ 24H 雲端盤前情報已部署%0A%0A雲端已自動完成數據更新。%0A👉 [點我一秒開啟精美儀表板](${{ env.MY_URL }})"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"
        env:
          # ⚠️ 最關鍵：請把下面這行改成你平常在看、放在桌面上的那個真實 Yahoo 盤前網頁網址！
          MY_URL: "https://mjtsai-code.github.io/STOCK_ALERT/"
