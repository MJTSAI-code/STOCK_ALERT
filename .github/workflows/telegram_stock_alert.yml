name: 美股精選情報室

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查並鎖定台灣絕對時間
        run: |
          export TZ="Asia/Taipei"
          CURRENT_HOUR=$(date +%H)
          echo "當前台北時間的整點為: ${CURRENT_HOUR} 點"
          
          if [ "$CURRENT_HOUR" = "05" ] || [ "$CURRENT_HOUR" = "17" ]; then
            echo "偵測到目前為夏令時間，機器人開始沉睡 60 分鐘..."
            sleep 3600
          fi
          
          # 🎯 終極代碼：利用 # 號後面直接塞純中文！
          # 整條訊息在 Telegram 通知列會「全數轉為藍色超連結」，達成完美的中文看盤直達車！
          TEXT="https://mjtsai-code.github.io/STOCK_ALERT/#美股情報室數據已更新"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
