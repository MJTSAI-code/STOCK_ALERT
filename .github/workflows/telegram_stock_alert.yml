name: 美股精選情報室

on:
  schedule:
    # 📝 智慧時區防線：提前到台灣時間 05:00 與 17:00 喚醒
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查並鎖定台灣絕對時間
        run: |
          export TZ="Asia/Taipei"
          CURRENT_HOUR=$(date +%H)
          echo "當前台北時間的整點為: ${CURRENT_HOUR} 點"
          
          if [ "$CURRENT_HOUR" = "05" ] || [ "$CURRENT_HOUR" = "17" ]; then
            echo "偵測到目前為夏令時間，機器人開始沉睡 60 分鐘..."
            sleep 3600
          fi
          
          # 🎯 終極 HTML 語法：用 <a> 標籤把網址包在裡面
          # 網頁預覽開成 true，逼 Telegram 吐出 ICON，但畫面上只會顯示中文字！
          TEXT="🛡️ 美股情報室數據已更新！%0A<a href='https://mjtsai-code.github.io/STOCK_ALERT/'>🚀 開啟儀表板</a>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=false"
