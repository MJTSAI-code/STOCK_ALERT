name: 美股精選情報室

on:
  schedule:
    # 📝 智慧時區防線：提前到台灣時間 05:00 與 17:00 喚醒
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查並鎖定台灣絕對時間
        run: |
          export TZ="Asia/Taipei"
          CURRENT_HOUR=$(date +%H)
          echo "當前台北時間的整點為: ${CURRENT_HOUR} 點"
          
          if [ "$CURRENT_HOUR" = "05" ] || [ "$CURRENT_HOUR" = "17" ]; then
            echo "偵測到目前為夏令時間，機器人開始沉睡 60 分鐘..."
            sleep 3600
          fi
          
          # 🎯 隱藏網址大絕招：用 [文字](網址) 語法，並開啟網頁預覽
          # 這樣畫面上完全看不到網址，但 Telegram 系統會直接逼出那個小 ICON！
          TEXT="🛡️ 美股情報室數據已更新！%0A[🚀 開啟儀表板](https://mjtsai-code.github.io/STOCK_ALERT/)"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=MarkdownV2" \
            -d "disable_web_page_preview=false"
