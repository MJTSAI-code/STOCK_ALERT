name: 每日美股盤前推播

on:
  schedule:
    # 📝 智慧時區防線：提前到台灣時間 05:00 與 17:00 喚醒
    # (UTC 21:00 = 台灣 05:00 / UTC 09:00 = 台灣 17:00)
    - cron: '0 21 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch: # 讓你可以手動在 GitHub Actions 點擊按鈕測試

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查並鎖定台灣絕對時間
        run: |
          # 1. 強制設定環境為台北時區
          export TZ="Asia/Taipei"
          CURRENT_HOUR=$(date +%H)
          
          echo "當前台北時間的整點為: ${CURRENT_HOUR} 點"
          
          # 2. 如果醒來時是 05 點或 17 點（夏令時間），就原地罰站 60 分鐘，確保 06:00 / 18:00 準時發送
          if [ "$CURRENT_HOUR" = "05" ] || [ "$CURRENT_HOUR" = "17" ]; then
            echo "偵測到目前為夏令時間，機器人開始沉睡 60 分鐘..."
            sleep 3600
          fi
          
          # 3. 🎯 核心破局程式：網址直接裸露在通知最前方，逼迫手機作業系統在通知列解鎖點擊
          # %0A 代表換行，讓通知畫面的第一行就是純網址
          TEXT="https://mjtsai-code.github.io/STOCK_ALERT/%0A%0A🛡️ 24H 雲端盤前情報已部署！雲端已自動完成數據更新。"
          
          # 4. 發送 Telegram 通知（拿掉 parse_mode 避免網址被隱藏）
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
