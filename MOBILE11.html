<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark light">
<title>美股情報 PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'DM Mono Fallback';
    src: local('Courier New'), local('Courier');
    size-adjust: 96%;
    ascent-override: 90%;
  }
  @font-face {
    font-family: 'Roboto Mono Fallback';
    src: local('Courier New'), local('Courier');
    size-adjust: 98%;
    ascent-override: 90%;
  }
  :root {
    color-scheme: dark light;
    --bg: #0a0a0a;
    --card-bg: #1c1a16;
    --card-frame: #d9cdb8;
    --card-border: #3a352c;
    --window: #4a5240;
    --window-edge: #2e3328;
    --digit: #f0c987;
    --text: #f0e8d8;
    --muted: #7a7468;
    --label: #b8ad96;
    --up: #00e676;
    --down: #ff1744;
    --accent: #d9cdb8;
    --knob: #8a6240;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Mono', 'Roboto Mono Fallback', monospace;
    min-height: 100vh;
    min-width: 960px;
    padding-bottom: 40px;
    color-scheme: dark;
  }
  body.scroll-locked { overflow: hidden; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: #0d0d0d;
    border-bottom: 1px solid var(--card-frame);
  }
  .logo { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .hero-time { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; color: var(--digit); letter-spacing: 2px; line-height: 1; text-shadow: 0 0 12px rgba(240,201,135,0.25); }
  .hero-date { font-size: 11px; color: var(--muted); text-align: right; margin-top: 2px; }

  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 16px; }
  .card-add {
    border: 1.5px dashed #3a3020; background: #111008; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 18px 12px; cursor: pointer; transition: border-color 0.2s;
    color: #555; font-size: 13px; letter-spacing: 1px;
  }
  .card-add:hover { border-color: #c8a96e; color: #c8a96e; }
  .card-pending {
    border: 0.5px dashed #3a3020; background: #111008; border-radius: 10px;
    padding: 14px 12px; text-align: center; color: #555; font-size: 11px;
    font-family: monospace; letter-spacing: 1px;
  }
  #managePanel {
    display: none; background: #0d0c07; border-top: 1px solid #2a2418;
    padding: 14px 16px; position: sticky; bottom: 0; z-index: 500;
  }
  #managePanel.open { display: block; }
  .manage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .manage-title { color: #c8a96e; font-size: 11px; letter-spacing: 2px; }
  .manage-close { background: none; border: none; cursor: pointer; color: #555; font-size: 18px; line-height: 1; padding: 0; }
  .manage-close:hover { color: #c8a96e; }
  .manage-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .manage-input {
    flex: 1; background: #1a1710; border: 0.5px solid #3a3020; color: #e8d9b0;
    border-radius: 6px; padding: 8px 10px; font-size: 13px;
    font-family: monospace; text-transform: uppercase; outline: none;
  }
  .manage-input:focus { border-color: #c8a96e; }
  .manage-btn-add {
    background: #c8a96e; border: none; color: #0a0900; border-radius: 6px;
    padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .manage-list-removed-intentionally { display: none; }
  /* ── 長按刪除：edit-mode card ── */
  @keyframes cardWiggle {
    0%,100% { transform: rotate(0deg); }
    25%      { transform: rotate(-1.2deg); }
    75%      { transform: rotate(1.2deg); }
  }
  .card.edit-mode {
    animation: cardWiggle 0.35s ease-in-out infinite;
    border-color: rgba(224,92,92,0.6);
  }
  .card.edit-mode .delete-badge {
    display: flex;
  }
  .delete-badge {
    display: none;
    position: absolute; top: -8px; right: -8px;
    width: 24px; height: 24px;
    background: #e05c5c; border-radius: 50%;
    align-items: center; justify-content: center;
    font-size: 14px; color: #fff; font-weight: 700;
    box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    z-index: 20; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  /* ── 刪除確認底部條 ── */
  #deleteConfirmBar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 64px;
    background: linear-gradient(180deg, #1a1710 0%, #111009 100%);
    border-top: 1px solid #3a3020;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(200,160,80,0.1);
    align-items: center; justify-content: center;
    gap: 16px; z-index: 1400;
    font-family: 'DM Mono', monospace;
  }
  #deleteConfirmBar.show { display: flex; }
  #deleteConfirmBar .dcb-label {
    font-size: 12px; color: #c8a96e; letter-spacing: 1px;
  }
  #deleteConfirmBar .dcb-cancel {
    padding: 8px 16px; border-radius: 6px;
    border: 0.5px solid #3a3020; background: none;
    color: #888; font-size: 11px; cursor: pointer;
    font-family: 'DM Mono', monospace;
    -webkit-tap-highlight-color: transparent;
  }
  #deleteConfirmBar .dcb-confirm {
    padding: 8px 16px; border-radius: 6px;
    border: 0.5px solid #e05c5c; background: rgba(224,92,92,0.15);
    color: #e05c5c; font-size: 11px; cursor: pointer;
    font-family: 'DM Mono', monospace;
    -webkit-tap-highlight-color: transparent;
  }
  /* ── 設定：topbar ⚙️ + bottom sheet ── */
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .settings-btn {
    background: none; border: 1px solid #3a3020; border-radius: 8px;
    color: #c8a96e; font-size: 18px; line-height: 1;
    width: 38px; height: 38px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .settings-btn:hover { border-color: #c8a96e; }
  .settings-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 1490;
  }
  .settings-overlay.show { display: block; }
  #settingsSheet {
    display: none; position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #0d0c07; border-top: 1px solid #2a2418;
    padding: 14px 16px 22px; z-index: 1500;
  }
  #settingsSheet.open { display: block; }
  .settings-token-status {
    font-size: 11px; font-family: monospace; color: #7a7468;
    margin-bottom: 10px; letter-spacing: 1px;
  }
  .settings-actions { margin-bottom: 10px; }
  .settings-hint { font-size: 10px; color: #555; line-height: 1.6; }
  @media(min-width: 640px)  { .grid { grid-template-columns: repeat(4,1fr); } .grid > .card { grid-column: span 2; } }
  @media(min-width: 1000px) { .grid { grid-template-columns: repeat(6,1fr); } .grid > .card { grid-column: span 2; } }
  .card.last-row-solo   { grid-column: 3/5; }
  .card.last-row-pair-1 { grid-column: 2/4; }
  .card.last-row-pair-2 { grid-column: 4/6; }

  .card {
    background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
    border: 3px solid var(--card-frame);
    border-radius: 18px; padding: 16px; cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s, filter 0.25s;
    position: relative; perspective: 500px;
    display: flex; flex-direction: column;
    min-height: 160px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45), inset 0 2px 6px rgba(0,0,0,0.3);
  }
  @media (hover: hover) and (pointer: fine) {
    .card:not(.expanded):hover {
      border-color: #c8a96e;
      filter: brightness(1.12);
      box-shadow:
        0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45),
        inset 0 2px 6px rgba(0,0,0,0.3),
        inset 0 0 40px rgba(240,180,60,0.18),
        0 0 0 1px rgba(200,169,110,0.4),
        0 0 28px rgba(200,140,60,0.25);
    }
  }
  .card-body-split, .split-left, .split-right { display: contents; }
  .card-header { order: -2; }
  .price-section { order: -1; }

  .card.expanded {
    cursor: default; position: fixed;
    top: 50%; left: 50%;
    width: min(1040px, calc(100vw - 32px + var(--scrollbar-w, 0px)));
    max-height: calc(100vh - 32px);
    transform: translate(-50%, -50%);
    z-index: 1001;
    background: transparent; border: none; box-shadow: none; padding: 0;
    overflow: visible;
    animation: cardQuietAppear 0.3s ease-out forwards;
  }
  @keyframes cardQuietAppear {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.96); }
    100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }
  .card.expanded.closing { animation: cardQuietDisappear 0.28s ease-in forwards; }
  @keyframes cardQuietDisappear {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.96); }
  }

  .card.expanded .card-body-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    perspective: 1200px;
  }
  @media(min-width: 721px) {
    .card.expanded .split-left,
    .card.expanded .split-right {
      background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
      border: 2px solid var(--card-frame);
      border-radius: 10px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 12px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      overflow: hidden;
      position: relative;
      height: 460px;
    }
    .card.expanded .split-left  { display: flex; flex-direction: column; }
    .card.expanded .split-right { display: flex; flex-direction: column; }
    .card.expanded .split-left,
    .card.expanded .split-right {
      clip-path: inset(0 0 99% 0 round 10px);
      transform: scaleY(0.04);
      transform-origin: top center;
      opacity: 0;
    }
    .card.expanded .split-left.panel-flap,
    .card.expanded .split-right.panel-flap {
      animation: unrollDown 0.52s cubic-bezier(0.77,0,0.175,1) forwards;
    }
    @keyframes unrollDown {
      0%   { clip-path: inset(0 0 99% 0 round 10px); transform: scaleY(0.04); opacity: 0; }
      100% { clip-path: inset(0 0 0%  0 round 10px); transform: scaleY(1);    opacity: 1; }
    }
    .card.expanded .split-left::after,
    .card.expanded .split-right::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 20;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    .card.expanded .split-left.panel-flap::after,
    .card.expanded .split-right.panel-flap::after {
      animation: fadeOutGradient 0.3s ease 0.4s forwards;
    }
    @keyframes fadeOutGradient {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    .card.expanded .split-left { perspective: none; }
    .card.expanded .split-left .chart-container {
      flex: 1; height: auto !important; max-height: none !important;
      margin: 12px; border-radius: 6px; overflow: hidden;
      border: 1px solid rgba(217,205,184,0.25); background: #000;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
      opacity: 1;
      clip-path: inset(0 0 100% 0 round 6px);
      transition: clip-path 0.5s cubic-bezier(0.77,0,0.175,1) 0.1s;
    }
    .card.expanded .split-left .chart-container.show-chart {
      clip-path: inset(0 0 0% 0 round 6px);
    }
    .card.expanded .split-right .card-header {
      order: unset; flex: none;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(217,205,184,0.2);
    }
    .card.expanded .card-sym { font-size: 20px; font-weight: 700; color: var(--digit); letter-spacing: 1px; }
    .card.expanded .card-name { font-size: 10px; color: #aab09a; margin-top: 2px; }
  }

  .sf-wrap { position: relative; clip-path: inset(0 0 100% 0); }
  .sf-wrap.reveal-full { animation: sfRevealFull 0.44s cubic-bezier(0.77,0,0.175,1) forwards; }
  @keyframes sfRevealFull { 0% { clip-path: inset(0 0 100% 0); } 100% { clip-path: inset(0 0 0% 0); } }

  .expanded-price-stage {
    padding: 16px 14px 12px;
    background: linear-gradient(180deg, #5a4422 0%, #3d2e16 100%);
    border: 1px solid rgba(0,0,0,0.35); border-radius: 8px;
    margin: 10px 12px 0; text-align: center;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); position: relative;
    transition: box-shadow 0.15s ease;
  }
  .expanded-price-stage.light-up {
    box-shadow:
      inset 0 2px 10px rgba(0,0,0,0.5),
      inset 0 0 30px rgba(240,180,90,0.06),
      inset 0 15px 50px rgba(38, 166, 154, 0.50),
      inset 0 0 80px rgba(38, 166, 154, 0.22),
      inset 0 0 120px rgba(38, 166, 154, 0.09);
  }
  .expanded-price-stage.light-down {
    box-shadow:
      inset 0 2px 10px rgba(0,0,0,0.5),
      inset 0 0 30px rgba(240,180,90,0.06),
      inset 0 15px 50px rgba(239, 83, 80, 0.50),
      inset 0 0 80px rgba(239, 83, 80, 0.22),
      inset 0 0 120px rgba(239, 83, 80, 0.09);
  }
  .expanded-phase-label {
    position: absolute; top: 6px; left: 10px;
    font-size: 9px; font-weight: 700; color: #d9b87a; opacity: 0.8; letter-spacing: 1px;
  }
  .expanded-main-change { font-size: 13px; font-weight: 700; margin-top: 8px; }
  .expanded-ref-row {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; color: #c9b48a;
    overflow: hidden; perspective: 300px;
  }
  .expanded-ref-row #flipFront {
    display: block;
  }

  .expanded-news-wrap {
    flex: 1; overflow-y: auto; margin: 10px 12px 12px;
    background: rgba(0,0,0,0.2); border: 1px solid rgba(217,205,184,0.15);
    border-radius: 6px; padding: 12px;
  }
  .expanded-news-title { font-size: 11px; font-weight: 700; color: var(--card-frame); letter-spacing: 1px; margin-bottom: 8px; }
  .expanded-news-item { padding: 8px 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 5px; margin-bottom: 6px; text-decoration: none; display: block; transition: background 0.15s; }
  .expanded-news-item:hover { background: rgba(255,255,255,0.07); }
  .expanded-news-headline { font-size: 11px; color: var(--text); line-height: 1.5; }
  .expanded-news-source { font-size: 9px; color: var(--muted); margin-top: 3px; }

  .card-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 1000;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .card-overlay.show { display: block; opacity: 1; }

  .card-ghost {
    border-radius: 18px;
    border: 2px dashed #2a2820;
    background: transparent;
    position: relative;
    overflow: hidden;
    pointer-events: none;
    transition: border-color 0.45s ease;
  }
  .card-ghost .ghost-axle {
    position: absolute;
    top: 50%; left: 12px; right: 12px; height: 2px;
    background: linear-gradient(90deg, transparent, #2a2820 20%, #3a3528 50%, #2a2820 80%, transparent);
    transform: translateY(-50%);
    transition: opacity 0.3s ease;
    z-index: 1;
  }
  .card-ghost .ghost-screw {
    position: absolute; width: 10px; height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #4a4438, #1e1c16);
    border: 1px solid #3a3528;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
    transition: opacity 0.3s ease 0.1s;
    z-index: 2;
  }
  .card-ghost .ghost-screw::before {
    content: ''; position: absolute;
    top: 50%; left: 15%; right: 15%; height: 1px;
    background: #5a5040; transform: translateY(-50%);
  }
  .card-ghost .ghost-screw::after {
    content: ''; position: absolute;
    left: 50%; top: 15%; bottom: 15%; width: 1px;
    background: #5a5040; transform: translateX(-50%);
  }
  .card-ghost .ghost-screw.tl { top: 10px; left: 10px; }
  .card-ghost .ghost-screw.tr { top: 10px; right: 10px; }
  .card-ghost .ghost-screw.bl { bottom: 10px; left: 10px; }
  .card-ghost .ghost-screw.br { bottom: 10px; right: 10px; }
  .card-ghost .ghost-content {
    position: relative; z-index: 3;
    opacity: 0; padding: 16px;
  }
  .card-ghost.reviving { }
  .card.recently-viewed {
    border-color: rgba(240,201,135,0.7);
    box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45),
      inset 0 2px 6px rgba(0,0,0,0.3), 0 0 0 1px rgba(240,201,135,0.25),
      0 0 18px rgba(240,201,135,0.12);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .card.recently-viewed::before {
    content: '◉'; position: absolute; top: 6px; right: 10px;
    font-size: 8px; color: rgba(240,201,135,0.8);
    text-shadow: 0 0 6px rgba(240,201,135,0.6);
    animation: recentPulse 2s ease-in-out infinite;
  }
  @keyframes recentPulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.3; } }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .card-sym { font-size: 20px; font-weight: 700; color: var(--digit); letter-spacing: 1px; }
  .card-name { font-size: 10px; color: #aab09a; margin-top: 2px; }
  .tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.5px; }
  .tag-post { background: #3a2a18; color: #e0b97d; border: 1px solid var(--knob); display: none; }
  .tag-post.show { display: inline-block; }

  .price-section {
    position: relative; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-height: 120px;
    background: linear-gradient(180deg, #5a4422 0%, #3d2e16 100%);
    border: 1px solid rgba(0,0,0,0.35); border-radius: 10px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), inset 0 0 30px rgba(240,180,90,0.12);
    padding: 18px 14px 14px; text-align: center;
    transition: box-shadow 0.15s ease;
  }
  .price-section.light-up {
    box-shadow:
      inset 0 2px 10px rgba(0,0,0,0.5),
      inset 0 0 30px rgba(240,180,90,0.06),
      inset 0 15px 50px rgba(38, 166, 154, 0.50),
      inset 0 0 80px rgba(38, 166, 154, 0.22),
      inset 0 0 120px rgba(38, 166, 154, 0.09);
  }
  .price-section.light-down {
    box-shadow:
      inset 0 2px 10px rgba(0,0,0,0.5),
      inset 0 0 30px rgba(240,180,90,0.06),
      inset 0 15px 50px rgba(239, 83, 80, 0.50),
      inset 0 0 80px rgba(239, 83, 80, 0.22),
      inset 0 0 120px rgba(239, 83, 80, 0.09);
  }
  .phase-corner-label { position: absolute; top: 8px; left: 10px; font-size: 9px; font-weight: 700; color: #d9b87a; letter-spacing: 1px; opacity: 0.75; }
  .main-change { font-size: 12px; font-weight: 700; margin-top: 6px; min-height: 18px; }
  .ref-price { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08); width: 100%; font-size: 11px; color: #c9b48a; display: flex; justify-content: center; gap: 6px; align-items: baseline; }
  .ref-price .ref-tag { opacity: 0.6; font-size: 10px; }
  .ref-price .ref-value { font-family: 'DM Mono', monospace; color: #e8d4a8; }
  .up   { color: var(--up);   background: #00e67615; border: 1px solid #00e67630; }
  .down { color: var(--down); background: #ff174415; border: 1px solid #ff174430; }
  .divider { display: none; }

  /* ── PRICE FLIP：四層結構 ── */
  .pf-wrap {
    display: flex;
    justify-content: center;
    width: 100%;
  }
  .pf-stack {
    position: relative;
    width: 210px;
    height: 44px;
    perspective: 600px;
  }
  /* 共用基底 */
  .pf-top-static,
  .pf-bot-static,
  .pf-front,
  .pf-back {
    position: absolute;
    left: 0; right: 0;
    height: 22px;
    border-radius: 2px;
  }
  /* 靜態層 clip */
  .pf-top-static,
  .pf-bot-static { overflow: hidden; background: #14120d; }
  /* 翻蓋層：上下明暗微差，模擬光影 */
  .pf-front { overflow: hidden; background: #1a1812; }

<script>
const DEFAULT_STOCKS = [
  {sym:'NOW',  name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA', name:'Nvidia',     ex:'NASDAQ'},
  {sym:'LITE', name:'Lumentum',   ex:'NASDAQ'},
  {sym:'ONDS', name:'Ondas',      ex:'NASDAQ'},
  {sym:'MRVL', name:'Marvell',    ex:'NASDAQ'},
  {sym:'GOOG', name:'Google C',   ex:'NASDAQ'},
  {sym:'SPCX', name:'SpaceX',     ex:'NASDAQ'},
  {sym:'TSM',  name:'TSMC',       ex:'NYSE'},
  {sym:'MU',   name:'Micron',     ex:'NASDAQ'},
  {sym:'SNDK', name:'SanDisk',    ex:'NASDAQ'},
  {sym:'TSLA', name:'Tesla',      ex:'NASDAQ'}
];

// 上限：DEFAULT_STOCKS 有 11 支，原上限 10 導致第一次新增必被擋
const MAX_STOCKS = 12;

// ── Stock schema validator (Bug 1: corrupt localStorage guard) ──
function _isValidStockEntry(s) {
  return s && typeof s.sym === 'string' && /^[A-Z0-9._^]{1,12}$/.test(s.sym);
}

function _loadStocks() {
  try {
    const raw = localStorage.getItem('userStocks');
    if (!raw) return null;
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr) || arr.length === 0) return null;
    // Filter out any corrupt entries rather than rejecting the whole list
    const valid = arr.filter(_isValidStockEntry);
    return valid.length > 0 ? valid : null;
  } catch (e) {
    console.warn('[stocks] localStorage parse failed, resetting:', e);
    localStorage.removeItem('userStocks');
    return null;
  }
}

let STOCKS = _loadStocks() || DEFAULT_STOCKS.slice();

function _saveStocks() {
  try {
    localStorage.setItem('userStocks', JSON.stringify(STOCKS));
  } catch (e) {
    console.error('[stocks] localStorage write failed:', e);
  }
}

function _getToken() {
  return localStorage.getItem('ghToken') || '';
}

// ── P1 設定 sheet：Token 唯一 UI 入口（值只進 localStorage，永不進檔案）──
function _refreshTokenStatus() {
  var el = document.getElementById('tokenStatus');
  if (!el) return;
  var t = _getToken();
  // 遮罩顯示：只露尾 4 碼，避免螢幕側錄
  el.textContent = t ? ('已設定 ····' + t.slice(-4) + '　同步功能啟用中') : '未設定　同步功能停用（僅本機顯示）';
  el.style.color = t ? '#4caf7d' : '#7a7468';
}

function openSettings() {
  document.getElementById('settingsOverlay').classList.add('show');
  document.getElementById('settingsSheet').classList.add('open');
  _refreshTokenStatus();
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
  document.getElementById('settingsSheet').classList.remove('open');
  var input = document.getElementById('settingsTokenInput');
  if (input) input.value = '';  // 關閉即清輸入框，不留殘值
}

function saveTokenFromSheet() {
  var input = document.getElementById('settingsTokenInput');
  var v = (input.value || '').trim();
  if (!v) { _refreshTokenStatus(); return; }
  try {
    localStorage.setItem('ghToken', v);
  } catch (e) {
    console.error('[settings] token write failed:', e);
  }
  input.value = '';
  _refreshTokenStatus();
}

function clearToken() {
  try { localStorage.removeItem('ghToken'); } catch (e) {}
  _refreshTokenStatus();
}

// Bug 6: surface sync errors to user via manage panel status
function _showSyncStatus(msg, isError) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? '#e05c5c' : '#4caf7d';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.textContent = ''; }, 3000);
}

// ── 即時觸發：sync 成功後踩 workflow_dispatch，讓 Action 立刻抓新清單價格 ──
// workflow id 用 API 依名稱查一次後快取（不硬編 yml 檔名）。
// 需 PAT 具 Actions: Read and write；無權限時 403 → 靜默降級，同步仍成功。
let _workflowId = null;
async function _triggerWorkflow(token) {
  const OWNER = 'mjtsai-code', REPO = 'STOCK_ALERT';
  const WF_NAME = '美股數據更新與情報推送';
  const H = { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' };
  try {
    if (!_workflowId) {
      const r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/actions/workflows', { headers: H });
      if (!r.ok) { console.warn('[dispatch] list workflows', r.status); return false; }
      const j = await r.json();
      const wf = (j.workflows || []).find(function(w) { return w.name === WF_NAME; });
      if (!wf) { console.warn('[dispatch] workflow not found:', WF_NAME); return false; }
      _workflowId = wf.id;
    }
    const d = await fetch(
      'https://api.github.com/repos/' + OWNER + '/' + REPO + '/actions/workflows/' + _workflowId + '/dispatches',
      { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, H),
        body: JSON.stringify({ ref: 'main' }) }
    );
    if (d.status !== 204) console.warn('[dispatch] fire failed', d.status, d.status === 403 ? '（PAT 缺 Actions 權限？）' : '');
    return d.status === 204;
  } catch (e) {
    console.warn('[dispatch] error:', e);
    return false;
  }
}

// Bug 2: returns Promise so callers can await before rebuilding UI
// In-flight guard: prevents concurrent PUT race on rapid taps (409 SHA conflict)
let _syncInFlight = false;
async function _syncGitHub() {
  if (_syncInFlight) return;
  _syncInFlight = true;
  const token = _getToken();
  if (!token) { _syncInFlight = false; return; }
  const OWNER = 'mjtsai-code', REPO = 'STOCK_ALERT', PATH = 'stock_data.json';
  try {
    const metaRes = await fetch(
      'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + PATH,
      { headers: { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' } }
    );
    if (!metaRes.ok) {
      const status = metaRes.status;
      const hint = status === 401 ? '（Token 已過期）' : status === 409 ? '（衝突，請稍後再試）' : '';
      _showSyncStatus('同步失敗 ' + status + hint, true);
      console.warn('[syncGitHub] HTTP', status);
      return;
    }
    const meta = await metaRes.json();
    const decoded = meta.content.split('\n').join('');
    const current = JSON.parse(atob(decoded));
    current.stocks = STOCKS.map(function(s) { return s.sym; });
    const putRes = await fetch(
      'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + PATH,
      {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: '📊 更新自選股清單',
          content: btoa(unescape(encodeURIComponent(JSON.stringify(current, null, 2)))),
          sha: meta.sha
        })
      }
    );
    if (!putRes.ok) {
      _showSyncStatus('同步寫入失敗 ' + putRes.status, true);
      console.warn('[syncGitHub] PUT failed', putRes.status);
    } else {
      const fired = await _triggerWorkflow(token);
      _showSyncStatus(fired ? '✓ 已同步，資料更新中（約 2–4 分鐘）' : '✓ 已同步至 GitHub', false);
    }
  } catch (e) {
    _showSyncStatus('同步錯誤（網路？）', true);
    console.warn('[syncGitHub] error:', e);
  } finally {
    _syncInFlight = false;
  }
}

function openManagePanel() {
  document.getElementById('managePanel').classList.add('open');
}

function closeManagePanel() {
  document.getElementById('managePanel').classList.remove('open');
}

// Bug 4: safe DOM id — replace special chars for card-{id}
function _safeId(sym) {
  return sym.replace(/[^A-Z0-9]/g, '_');
}

// ── P0 XSS 防護：外部資料（Yahoo 新聞）進 innerHTML 前必經 ──
// headline/source 來自 yfinance 抓的外部標題，未跳脫時一則含
// <img onerror=...> 的標題即可執行任意 JS → 讀走 localStorage token。
function _escapeHtml(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// URL 協議白名單：擋 javascript: / data: 等可執行協議
function _safeUrl(u) {
  if (typeof u !== 'string') return '#';
  const t = u.trim();
  if (t === '#' || /^https?:\/\//i.test(t)) return t;
  return '#';
}

// _renderManageList() removed — deletion moved to long-press on card

async function manageAddStock() {
  var input = document.getElementById('manageInput');
  var sym = input.value.trim().toUpperCase().replace(/[^A-Z0-9._^]/g, '');
  // Validate ticker format: 1-12 chars, letters/digits/dot/caret only
  var validTicker = /^[A-Z^][A-Z0-9._^]{0,11}$/.test(sym);
  if (!sym || !validTicker || STOCKS.find(function(s) { return s.sym === sym; })) {
    if (sym && !validTicker) {
      input.placeholder = '代號格式無效';
      setTimeout(function() { input.placeholder = '輸入代號 AAPL'; }, 2000);
    }
    input.value = '';
    return;
  }
  if (STOCKS.length >= MAX_STOCKS) {
    input.value = '';
    input.placeholder = '已達上限 ' + MAX_STOCKS + ' 支';
    setTimeout(function() { input.placeholder = '輸入代號 AAPL'; }, 2000);
    return;
  }
  // ex 留空 → TradingView URL 走裸代號，由 TV 自己的 resolver 解析主上市
  // （硬編 'NASDAQ' 會讓 NYSE 股如 TSM 組出 NASDAQ:TSM → 圖表載入失敗）
  STOCKS.push({ sym: sym, name: sym, ex: '' });
  _saveStocks();
  input.value = '';
  buildGrid();   // show card immediately with pending state (Bug 3)
  await _syncGitHub();  // Bug 2: await sync before any further reload
}

async function manageRemoveStock(sym) {
  if (STOCKS.length <= 1) return;
  STOCKS = STOCKS.filter(function(s) { return s.sym !== sym; });
  _saveStocks();
  buildGrid();
  await _syncGitHub();
}

let _lpTimer = null;          // long-press setTimeout handle
let _lpMoved = false;         // cancel if finger moves (scroll guard)
let _editModeSym = null;      // which card is in edit-mode
let confirmDeleteTarget = ''; // sym pending confirmation

function _attachLongPressHandlers() {
  STOCKS.forEach(function(s) {
    var card = document.getElementById('card-' + _safeId(s.sym));
    if (!card) return;
    // Prevent iOS system callout on long press
    card.style.webkitTouchCallout = 'none';
    card.style.userSelect = 'none';

    card.addEventListener('touchstart', function(e) {
      if (card.classList.contains('expanded')) return;
      _lpMoved = false;
      _lpTimer = setTimeout(function() {
        if (!_lpMoved) enterEditMode(s.sym);
      }, 500);
    }, { passive: true });

    card.addEventListener('touchmove', function() {
      _lpMoved = true;
      clearTimeout(_lpTimer);
    }, { passive: true });

    card.addEventListener('touchend', function() {
      clearTimeout(_lpTimer);
    }, { passive: true });

    card.addEventListener('touchcancel', function() {
      clearTimeout(_lpTimer);
    }, { passive: true });
  });
}

function enterEditMode(sym) {
  // Exit any previous edit-mode first
  if (_editModeSym && _editModeSym !== sym) exitEditMode();
  _editModeSym = sym;
  var card = document.getElementById('card-' + _safeId(sym));
  if (!card) return;
  card.classList.add('edit-mode');
  // Temporarily disable card tap-to-expand while in edit mode
  card._savedOnclick = card.onclick;
  card.onclick = function(e) { e.stopPropagation(); };
  showDeleteConfirmBar(sym);
}

function exitEditMode() {
  if (!_editModeSym) return;
  var card = document.getElementById('card-' + _safeId(_editModeSym));
  if (card) {
    card.classList.remove('edit-mode');
    if (card._savedOnclick) {
      card.onclick = card._savedOnclick;
      card._savedOnclick = null;
    }
  }
  _editModeSym = null;
  confirmDeleteTarget = '';
  var bar = document.getElementById('deleteConfirmBar');
  if (bar) bar.classList.remove('show');
}

function showDeleteConfirmBar(sym) {
  confirmDeleteTarget = sym;
  var label = document.getElementById('dcbLabel');
  if (label) label.textContent = '移除 ' + sym + '？';
  var bar = document.getElementById('deleteConfirmBar');
  if (bar) bar.classList.add('show');
}

function confirmDelete() {
  var sym = confirmDeleteTarget;
  exitEditMode();
  if (sym) manageRemoveStock(sym);
}

function fixLastRowLayout() {
  const grid = document.getElementById('grid');
  if (!grid) return;
  grid.querySelectorAll('.last-row-solo, .last-row-pair-1, .last-row-pair-2')
    .forEach(el => el.classList.remove('last-row-solo','last-row-pair-1','last-row-pair-2'));
  if (window.innerWidth < 1000) return;
  const cards = Array.from(grid.querySelectorAll('.card:not(.expanded), .card-ghost'));
  const total = cards.length;
  const remainder = total % 3;
  if (remainder === 1) cards[total-1].classList.add('last-row-solo');
  else if (remainder === 2) { cards[total-2].classList.add('last-row-pair-1'); cards[total-1].classList.add('last-row-pair-2'); }
}
window.addEventListener('resize', fixLastRowLayout);

function collapseCard(sym) {
  const card  = document.getElementById(`card-${_safeId(sym)}`);
  if (!card) return;
  if (cardState === 'closing' || cardState === 'opening') return;
  cardState = 'closing';

  // 清掉所有展開動畫的殘留 timer
  pendingAnimTimers.forEach(id => clearTimeout(id));
  pendingAnimTimers = [];

  // 保險：最多 1.5s 後強制解鎖
  const _busyGuard = setTimeout(() => {
    document.getElementById('grid').style.pointerEvents = '';
    cardState = 'idle';
  }, 1500);

  const overlay = document.getElementById('cardOverlay');
  const ghost   = document.getElementById(`ghost-${sym}`);
  const stock   = STOCKS.find(s => s.sym === sym);

  overlay.classList.remove('show');
  document.body.classList.remove('scroll-locked');
  document.body.style.paddingRight = '';
  document.getElementById('grid').style.paddingRight = '';
  document.documentElement.style.removeProperty('--scrollbar-w');
  // 清理 mobile-close-bar
  const existingBar = document.querySelector('.mobile-close-bar');
  if (existingBar) existingBar.remove();
  const chartEl = document.getElementById(`chart-${sym}`);
  if (chartEl) chartEl.src = '';

  card.animate(
    [{ opacity:1, transform:'translate(-50%,-50%) scale(1)' },
     { opacity:0, transform:'translate(-50%,-50%) scale(1)' }],
    { duration:200, easing:'linear', fill:'forwards' }
  ).onfinish = () => {
    card.remove();
    if (!ghost) {
      expandedSym = null;
      clearTimeout(_busyGuard);
      document.getElementById('grid').style.pointerEvents = '';
      cardState = 'idle';
      return;
    }
    ghost.classList.add('reviving');
    pendingAnimTimers.push(setTimeout(() => {
      if (!ghost.parentNode) {
        expandedSym = null;
        clearTimeout(_busyGuard);
        document.getElementById('grid').style.pointerEvents = '';
        cardState = 'idle';
        return;
      }
      const newCard = document.createElement('div');
      newCard.className = 'card recently-viewed';
      newCard.id        = `card-${_safeId(sym)}`;

      // 先算好所有資料，填進 innerHTML，replaceChild 時直接是完整狀態
      const _q  = window._lastStockData?.[sym]?.quote;
      const _d  = parseQuote(_q);
      const _valStr      = _d ? _d.valStr : '—';
      const _phaseLabel  = _d ? _d.phaseLabel : '現價';
      const _lightClass  = _d ? _d.lightClass : '';
      const _badgeShow   = _d?.isExt ? 'show' : '';
      const _phase       = _d ? _d.phase : '正式盤';
      const _mainChgHtml = _d ? `<span class="${_d.dir}">${_d.sg} ${Math.abs(_d.mc).toFixed(2)} (${Math.abs(_d.mct).toFixed(2)}%)</span>` : '';
      const _subChgHtml  = _d ? `<span class="${_d.rd}">${_d.rsg} ${Math.abs(_d.rc).toFixed(2)} (${Math.abs(_d.rp).toFixed(2)}%)</span>` : '';
      const _showSub     = _d?.isExt ?? false;
      const _regular     = _d ? _d.regular : 0;

      newCard.innerHTML = `
        <div class="card-body-split">
          <div class="split-left">
            <div class="chart-container">
              <iframe id="chart-${sym}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
            </div>
          </div>
          <div class="split-right">
            <div class="card-header">
              <div>
                <div class="card-sym">${sym}</div>
                <div class="card-name">${stock?.name || ''}</div>
              </div>
              <span class="tag tag-post ${_badgeShow}" id="badge-${sym}">${_d?.isExt ? _phase : '盤後'}</span>
            </div>
            <div class="price-section ${_lightClass}">
              <span class="phase-corner-label" id="phase-label-${sym}">${_phaseLabel}</span>
              <div class="pf-wrap">${makePfStack(sym, '', _valStr)}</div>
              <div class="main-change" id="main-chg-${sym}">${_mainChgHtml}</div>
              <div class="ref-price" id="sub-row-${sym}" style="${_showSub ? 'visibility:visible;display:flex;' : 'visibility:hidden;'}">
                <span class="ref-tag" id="sub-label-${sym}">收盤</span>
                <span class="ref-value" id="sub-${sym}">${_q ? `$${_regular.toFixed(2)}` : '—'}</span>
                <span class="ref-change" id="sub-chg-${sym}">${_subChgHtml}</span>
              </div>
            </div>
            <div class="news-container" id="news-container-${sym}">
              <div class="news-header">📰 最新消息</div>
              <div class="news-list" id="news-list-${sym}"></div>
            </div>
          </div>
        </div>
      `;
      newCard.onclick = () => toggleCard(sym, stock?.ex || '');
      newCard.style.opacity = '0';
      ghost.parentNode.replaceChild(newCard, ghost);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          newCard.style.transition = 'opacity 0.2s ease';
          newCard.style.opacity = '1';
        });
      });
      fixLastRowLayout();
      if (window._lastStockData?.[sym]?.news) renderNews(sym, window._lastStockData[sym].news);
      pendingAnimTimers.push(setTimeout(() => newCard.classList.remove('recently-viewed'), 3000));
      expandedSym = null;
      collapsingViaBack = false;
      clearTimeout(_busyGuard);
      document.getElementById('grid').style.pointerEvents = '';
      cardState = 'idle';
    }, 100));
  };
}

      }, 100));
      pendingAnimTimers.push(setTimeout(() => splitLeft.classList.add('panel-flap'),  60));
      pendingAnimTimers.push(setTimeout(() => splitRight.classList.add('panel-flap'), 120));
      pendingAnimTimers.push(setTimeout(() => {
        const cc = splitLeft.querySelector('.chart-container');
        if (cc) cc.classList.add('show-chart');
      }, 200));
      pendingAnimTimers.push(setTimeout(() => {
        const sh = document.getElementById(`exp-secHeader-${sym}`);
        if (sh) sh.classList.add('reveal-full');
      }, 120));
      pendingAnimTimers.push(setTimeout(() => {
        const sp = document.getElementById(`exp-secPrice-${sym}`);
        if (sp) sp.classList.add('reveal-full');
      }, 180));
      pendingAnimTimers.push(setTimeout(() => {
        flipPriceCard('exp-'+sym, curVal);
      }, 640));
      pendingAnimTimers.push(setTimeout(() => {
        const sn = document.getElementById(`exp-secNews-${sym}`);
        if (sn) sn.classList.add('reveal-full');
      }, 660));
    }

  } else {
    collapseCard(sym);
    if (!collapsingViaBack && history.state?.expanded === sym) history.back();
  }
}

// ── 四層翻頁邏輯 ──
function flipPriceCard(sym, newVal) {
  const topEl   = document.getElementById(`pf-top-${sym}`);
  const botEl   = document.getElementById(`pf-bot-${sym}`);
  const frontEl = document.getElementById(`pf-front-${sym}`);
  const backEl  = document.getElementById(`pf-back-${sym}`);
  const frontWrap = frontEl?.parentElement;
  const backWrap  = backEl?.parentElement;
  if (!topEl || !botEl || !frontEl || !backEl) return;

  const curVal = topEl.textContent;
  if (curVal === newVal) return;

  // 上靜態換成新值（被前翻蓋蓋住，使用者看不到）
  topEl.textContent = newVal;
  // 下靜態維持舊值（被後翻蓋蓋住）
  botEl.textContent = curVal;
  // 前翻蓋顯示舊值上半 → 往下翻走
  frontEl.textContent = curVal;
  // 後翻蓋顯示新值下半 → 從下翻上來
  backEl.textContent = newVal;

  // reset
  frontWrap.classList.remove('go');
  backWrap.classList.remove('go');
  backWrap.style.transform = 'rotateX(90deg)';
  void frontWrap.offsetWidth;

  // fire
  frontWrap.classList.add('go');
  backWrap.classList.add('go');

  setTimeout(() => { botEl.textContent = newVal; }, 130);

  // cleanup（0.13 + delay 0.11 + 0.12 = 0.36s + buffer）
  setTimeout(() => {
    frontWrap.classList.remove('go');
    backWrap.classList.remove('go');
    backWrap.style.transform = '';
    frontEl.textContent = newVal;
  }, 280);
}

function setPriceDirect(sym, val) {
  const topEl   = document.getElementById(`pf-top-${sym}`);
  const botEl   = document.getElementById(`pf-bot-${sym}`);
  const frontEl = document.getElementById(`pf-front-${sym}`);
  const backEl  = document.getElementById(`pf-back-${sym}`);
  if (!topEl) return;
  topEl.textContent   = val;
  botEl.textContent   = val;
  frontEl.textContent = val;
  backEl.textContent  = val;
}

const lastPhase = {};

function parseQuote(q) {
  if (!q) return null;
  const current   = parseFloat(q.c ?? q.regular ?? 0);
  const regular   = parseFloat(q.regular ?? q.c ?? 0);
  const prevClose = parseFloat(q.prev_close ?? regular);
  const phase     = q.phase || '正式盤';
  const valStr    = `$${current.toFixed(2)}`;
  const mc  = q.d  !== undefined ? parseFloat(q.d)  : (current - prevClose);
  const mct = q.dp !== undefined ? parseFloat(q.dp) : (prevClose ? (mc / prevClose * 100) : 0);
  const rc  = q.reg_d  !== undefined ? parseFloat(q.reg_d)  : (regular - prevClose);
  const rp  = q.reg_dp !== undefined ? parseFloat(q.reg_dp) : (prevClose ? (rc / prevClose * 100) : 0);
  const phaseLabelMap = { '盤前':'盤前','盤後':'盤後','正式盤':'現價','錯誤':'—' };
  const isExt = phase === '盤前' || phase === '盤後';
  return { current, regular, prevClose, phase, valStr, mc, mct, rc, rp, isExt,
           phaseLabel: phaseLabelMap[phase] || '現價',
           dir: mc >= 0 ? 'up' : 'down', sg: mc >= 0 ? '▲' : '▼',
           rd: rc >= 0 ? 'up' : 'down', rsg: rc >= 0 ? '▲' : '▼',
           lightClass: mc > 0 ? 'light-up' : mc < 0 ? 'light-down' : '' };
}

function renderPrice(sym, q) {
  const d = parseQuote(q);
  if (!d) return;

  document.getElementById(`phase-label-${sym}`).textContent = d.phaseLabel;
  flipPriceCard(sym, d.valStr);
  lastPhase[sym] = d.phase;

  document.getElementById(`main-chg-${sym}`).innerHTML =
    `<span class="${d.dir}">${d.sg} ${Math.abs(d.mc).toFixed(2)} (${Math.abs(d.mct).toFixed(2)}%)</span>`;

  const priceSection = document.querySelector(`#card-${_safeId(sym)} .price-section`);
  if (priceSection) {
    priceSection.classList.remove('light-up', 'light-down');
    if (d.lightClass) priceSection.classList.add(d.lightClass);
  }

  const badge = document.getElementById(`badge-${sym}`);
  if (d.isExt) { badge.textContent = d.phase; badge.classList.add('show'); }
  else badge.classList.remove('show');

  const subRow   = document.getElementById(`sub-row-${sym}`);
  const subLabel = document.getElementById(`sub-label-${sym}`);
  const subEl    = document.getElementById(`sub-${sym}`);
  const subChgEl = document.getElementById(`sub-chg-${sym}`);

  if (d.isExt) {
    subRow.style.visibility = 'visible'; subRow.style.display = 'flex';
    subLabel.textContent = '收盤';
    subEl.textContent = `$${d.regular.toFixed(2)}`;
    subChgEl.innerHTML = `<span class="${d.rd}">${d.rsg} ${Math.abs(d.rc).toFixed(2)} (${Math.abs(d.rp).toFixed(2)}%)</span>`;
  } else {
    subRow.style.visibility = 'hidden'; subRow.style.display = '';
  }
}

// ── BUG 2 修復：跨裝置清單同步 ─────────────────────────────
// GitHub 的 stocks 欄位 = source of truth，localStorage 僅為快取。
// 防護：無 token（本機唯讀模式，remote 非本人清單語意）、sync 進行中
// （避免覆寫剛按下的新增）、卡片展開/編輯中（避免重建 DOM 打斷互動）
// 皆跳過，交給下一輪輪詢。
function _reconcileStocks(remoteSyms) {
  if (!Array.isArray(remoteSyms) || remoteSyms.length === 0) return;
  if (!_getToken()) return;
  if (_syncInFlight || expandedSym || _editModeSym || cardState !== 'idle') return;
  const localSyms = STOCKS.map(function(s) { return s.sym; });
  if (JSON.stringify(localSyms) === JSON.stringify(remoteSyms)) return;
  const bySym = {};
  STOCKS.forEach(function(s) { bySym[s.sym] = s; });
  STOCKS = remoteSyms
    .filter(function(sym) { return /^[A-Z0-9._^]{1,12}$/.test(sym); })
    .map(function(sym) { return bySym[sym] || { sym: sym, name: sym, ex: '' }; });
  _saveStocks();
  buildGrid();
  console.info('[reconcile] 清單已對齊 GitHub:', remoteSyms.join(','));
}

// Precise-refresh timer handle — cancelled and reset on every successful load.
let _nextUpdateTimer = null;

async function loadData() {
  try {
    const res  = await fetch('./stock_data.json?t=' + Date.now());
    const json = await res.json();
    window._lastStockData = json.data || {};
    _reconcileStocks(json.stocks);
    let _nameDirty = false;
    STOCKS.forEach((s) => {
      const data = json.data?.[s.sym];
      // BUG 3: 後端 name 回填。僅當本地 name 仍是佔位符（=== sym）時採用，
      // 手寫策展名（'Google C'、'TSMC'…）永不被覆蓋。
      if (data?.name && s.name === s.sym && data.name !== s.sym) {
        s.name = data.name;
        _nameDirty = true;
        const nameEl = document.querySelector(`#card-${_safeId(s.sym)} .card-name`);
        if (nameEl) nameEl.textContent = s.name;
      }
      if (data?.quote) renderPrice(s.sym, data.quote);
      if (data?.news)  renderNews(s.sym, data.news);
    });
    if (_nameDirty) _saveStocks();

    // Schedule a precise refresh at the next expected update time.
    // Falls back to the 60-second polling interval if field is absent or stale.
    if (_nextUpdateTimer) clearTimeout(_nextUpdateTimer);
    const nextAt = json.next_update_at ? Date.parse(json.next_update_at) : NaN;
    const msUntilNext = nextAt - Date.now();
    if (msUntilNext > 0 && msUntilNext < 35 * 60 * 1000) {
      // Only arm if the target is in the future and within 35 min (sanity cap).
      _nextUpdateTimer = setTimeout(loadData, msUntilNext);
    }
  } catch(e) { console.error(e); }
}

function renderNews(sym, newsList) {
  const el = document.getElementById(`news-list-${sym}`);
  if (!el) return;
  el.innerHTML = newsList.length
    ? newsList.map(n =>
        `<a class="news-item" href="${_escapeHtml(_safeUrl(n.url))}" target="_blank" rel="noopener noreferrer">
           <div class="news-headline">${_escapeHtml(n.headline)}</div>
           <div class="news-source">${_escapeHtml(n.source)}</div>
         </a>`).join('')
    : `<div class="news-source">暫無相關新聞</div>`;
}

let collapsingViaBack = false;
window.addEventListener('popstate', () => {
  if (expandedSym && cardState !== 'closing') {
    collapsingViaBack = true;
    toggleCard(expandedSym, '');
  }
});

buildGrid();
loadData();
setInterval(loadData, 60000);
</script>
