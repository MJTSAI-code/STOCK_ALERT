<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="盤前情報">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<title>盤前情報</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #c8ff00; --accent2: #00d4ff; --text: #e8e8f0;
    --muted: #5a5a7a; --up: #39ff8a; --down: #ff4d6d; --discord: #5865F2;
  }
  
  html, body { width: 100%; min-height: 100vh; margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; }
  * { box-sizing: inherit; }
  
  body { display: flex; flex-direction: column; padding: 10px 16px 20px; max-width: 100%; margin: 0 auto; position: relative; }
  
  header, .hero, .control-strip { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 4px 6px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .clock, .hero-sub, .status-label, .card-price-chg, .card-news-item .news-time, .detail-news-meta { font-family: 'DM Mono', monospace; }
  .clock, .hero-sub { font-size: 11px; color: var(--muted); }
  
  .hero-time { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; line-height: 1; margin-top: 2px; }
  .hero-time span { color: var(--accent); }
  .hero-sub { margin-top: 2px; }
  
  .control-strip { margin-bottom: 4px; }
  .status-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 2s infinite; }
  .status-label { font-size: 10px; color: var(--accent); }
  .refresh-btn { background: rgba(0,212,255,0.1); border: 1px solid var(--accent2); border-radius: 100px; padding: 6px 14px; font-size: 11px; color: var(--accent2); cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .refresh-btn:active { transform: scale(0.95); }
  
  /* 網頁柵格基礎排版 */
  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; justify-content: flex-start; width: 100%; overflow: hidden; -webkit-tap-highlight-color: transparent; }
  .card.expanded { border-color: var(--accent2); grid-column: 1 / -1 !important; order: -1; cursor: default; }
  
  .card-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .card-sym-wrapper { display: flex; align-items: center; gap: 8px; }
  .card-sym { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent2); letter-spacing: 0.02em; line-height: 1.1; }
  
  .market-badge { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; font-weight: 700; color: var(--accent); border: 1px solid var(--accent); padding: 1px 5px; border-radius: 4px; background: rgba(200, 255, 0, 0.08); display: none; }
  
  .card-name { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .card-price { text-align: right; }
  .card-price-num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; }
  .card-price-chg { font-size: 11px; margin-top: 1px; }
  .up { color: var(--up) !important; } .down { color: var(--down) !important; } .neutral { color: var(--muted); }
  
  .card-news { border-top: 1px solid var(--border); padding-top: 6px; margin-top: 6px; width: 100%; pointer-events: none; }
  .card.expanded .card-news { display: none; }
  .card-news-item { font-size: 11px; color: var(--text); line-height: 1.5; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.02); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; }
  .card-news-item .news-time { font-size: 9px; color: var(--muted); margin-top: 1px; }
  .card-news-item:last-child { border-bottom: none; }
  
  .card-detail { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; width: 100%; }
  .card.expanded .card-detail { display: block; }
  
  .chart-box { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); height: 320px; margin-bottom: 14px; width: 100%; background: var(--bg); }
  .chart-box iframe { width: 100%; height: 100%; border: none; }
  
  .detail-news-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; text-decoration: none; display: block; width: 100%; }
  .detail-news-title { font-size: 12px; color: var(--text); line-height: 1.5; }
  .detail-news-meta { margin-top: 4px; display: block; font-size: 9px; color: var(--muted); }
  
  .discord-box { padding: 14px; background: rgba(88,101,242,0.03); border: 1px solid rgba(88,101,242,0.12); border-radius: 14px; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .discord-title { font-size: 12px; font-weight: 500; color: #5865F2; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .discord-text { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .time-group { white-space: nowrap; display: inline-block; }
  .discord-highlight { color: var(--accent); border: 1px solid var(--accent); border-radius: 100px; padding: 1px 6px; font-size: 10px; font-weight: 500; display: inline-block; background: rgba(200, 255, 0, 0.05); }
  
  .discord-btn-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .discord-btn { width: 100%; padding: 10px; background: var(--discord); color: #fff; border: none; border-radius: 10px; font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
  .discord-btn-join { background: transparent; border: 1.5px solid var(--discord); color: #fff; }
  
  .notice { padding: 8px 12px; background: rgba(0, 212, 255, 0.04); border: 1px solid rgba(0, 212, 255, 0.15); border-radius: 10px; font-size: 10px; color: var(--accent2); line-height: 1.6; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  /* 💻 核心修改：大螢幕（1920) 滿版且不產生滾動條排版 */
  @media (min-width: 1200px) {
    body { max-width: 1600px; height: 100vh; overflow: hidden; padding: 12px 24px; justify-content: space-between; }
    /* 當有卡片被展開時，自動釋放高度限制允許滾動 */
    body.has-expanded { height: auto !important; overflow-y: auto !important; }
    
    .hero-time { font-size: 42px; }
    .grid { grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 8px; flex: 1; align-content: center; }
    .card { min-height: 155px; justify-content: space-between; padding: 16px; }
    .card-news { margin-top: 8px; padding-top: 8px; }
    .card-news-item { padding: 5px 0; font-size: 11.5px; }
    
    .discord-box { flex-direction: row; align-items: center; justify-content: space-between; padding: 12px 18px; gap: 20px; margin-bottom: 8px; }
    .discord-text { margin-top: 0; max-width: 50%; }
    .discord-btn-group { flex-direction: row; width: auto; gap: 12px; }
    .discord-btn { width: 220px; padding: 11px; }
    
    .chart-box { height: 460px; }
  }

  /* 平板裝置適應 */
  @media (min-width: 600px) and (max-width: 1199px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .discord-btn-group { flex-direction: row; }
    .discord-btn { flex: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">盤前情報 · PRO</div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="hero">
  <div>
    <div class="hero-time" id="heroTime">--<span>:</span>--</div>

</div>

<div class="control-strip">
  <div class="status-chip">
    <div class="status-dot"></div>
    <div class="status-label" id="update-status">定時同步中</div>
  </div>
  <div class="refresh-btn" onclick="manualRefresh()">🔄 重新載入</div>
</div>

<div class="grid" id="grid"></div>

<div class="discord-box">

    <div class="discord-title"><span>🛡️</span> 24H 雲端自動推送已部署</div>
    <div class="discord-text">

<script>
const STOCKS = [
  { sym: 'NOW',  name: 'ServiceNow',   ex: 'NYSE' },
  { sym: 'NVDA', name: 'Nvidia',       ex: 'NASDAQ' },
  { sym: 'LITE', name: 'Lumentum',     ex: 'NASDAQ' },
  { sym: 'ONDS', name: 'Ondas 無人機', ex: 'NASDAQ' },
  { sym: 'MRVL', name: 'Marvell',      ex: 'NASDAQ' },
  { sym: 'GOOG', name: 'Google C',     ex: 'NASDAQ' },
];

const FALLBACK_NEWS = {
  NOW: [
    { title: "ServiceNow 雲端工作流拓展：機構上調目標價與大型企業續約率觀察", src: "財經編譯" },
    { title: "AI 自動化平台需求強勁，NOW 獲矽谷科技板塊核心長線資金增持", src: "機構調研" },
    { title: "企業數位轉型支出未減，分析師看好雲端 SaaS 軟體服務續航動能", src: "美股焦點" }
  ],
  NVDA: [
    { title: "輝達晶片供應鏈產能與出貨大追蹤：多頭排列均線支撐力道強勁", src: "科技半導體" },
    { title: "大型資料中心資本支出再擴大，法人籌碼面維持主動淨流入", src: "籌碼解析" },
    { title: "次世代 AI 架構全球封測進度順暢，供應鏈板塊維持主導地位", src: "財經快訊" }
  ],
  LITE: [
    { title: "Lumentum 光通訊模組需求看漲：追蹤高速網路元件最新拉貨潮", src: "光通訊專欄" },
    { title: "矽光子技術與資料中心內部升級，LITE 受益於AI硬體建置基礎", src: "板塊分析" },
    { title: "光學元件庫存去化進入尾聲，留意機構盤後對通訊板塊評級調整", src: "機構解讀" }
  ],
  ONDS: [
    { title: "Ondas 無人機防禦與軍工訂單追蹤：多空量能與核心均線變動", src: "特種工業" },
    { title: "商用無人機專用頻段審批進展，技術專利授權擴大商業化規模", src: "產業觀察" },
    { title: "低空經濟政策利多發酵，邊緣計算數據通訊設備拉貨能見度高", src: "趨勢解析" }
  ],
  MRVL: [
    { title: "Marvell 客製化晶片與 ASIC 訂單火熱：網通板塊技術突破", src: "半導體情報" },
    { title: "高速傳輸晶片全球市佔攀升，MRVL 受惠高速光纖介面升級潮", src: "資金動向" },
    { title: "雲端大廠擴建特殊規格晶片，機構法人評估毛利率有望持續擴張", src: "研究報告" }
  ],
  GOOG: [
    { title: "Google 核心搜尋與 AI 廣告整合成效：流量變現與用戶黏著度", src: "網路巨頭" },
    { title: "雲端運算獲利結構優化，大盤修正下大型科技股資金避風港", src: "總經觀察" },
    { title: "留意聯準會最新言論對科技大盤籌碼之影響，大型股維持韌性", src: "美股大盤" }
  ]
};

let expandedSym = null;
let globalDataCache = null;

function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('heroTime').innerHTML = `${pad(now.getHours())}<span>:</span>${pad(now.getMinutes())}`;
  document.getElementById('heroDate').textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} 週${['日','一','二','三','四','五','六'][now.getDay()]}`;
}
setInterval(updateClock, 1000); 
updateClock();

function buildGrid() {
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}" onclick="handleCardClick('${s.sym}','${s.ex}', event)">
      <div class="card-top">
        <div>
          <div class="card-sym-wrapper">
            <div class="card-sym">${s.sym}</div>
            <div class="market-badge" id="badge-${s.sym}">盤前</div>
          </div>
          <div class="card-name">${s.name}</div>
        </div>
        <div class="card-price">
          <div class="card-price-num neutral" id="price-${s.sym}">$...</div>
          <div class="card-price-chg neutral" id="chg-${s.sym}">--</div>
        </div>
      </div>
      <div class="card-news" id="news-${s.sym}">
        <div class="card-news-item">📡 正在接收即時中文市場資訊...</div>
      </div>
      <div class="card-detail" id="detail-${s.sym}">
        <div class="chart-box"><iframe id="chart-${s.sym}" src="" allowtransparency="true"></iframe></div>
        <div class="detail-news" id="detail-news-${s.sym}"></div>
      </div>
    </div>
  `).join('');
}

// 點擊卡片觸發的入口
function handleCardClick(sym, ex, event) {
  if (event.target.closest('.detail-news-item')) return;
  const card = document.getElementById(`card-${sym}`);
  if (!card) return;
  
  if (card.classList.contains('expanded')) {
    // 點擊已打開的卡片 -> 執行關閉（並退回歷史紀錄）
    history.back();
  } else {
    // 打開新卡片 -> 注入歷史紀錄狀態，達成原生「上一步」效果
    history.pushState({ expandedSym: sym, ex: ex }, "");
    renderExpandedCard(sym, ex);
  }
}

// 真正執行渲染展開卡片的邏輯
function renderExpandedCard(sym, ex) {
  closeCurrentExpanded();
  
  const card = document.getElementById(`card-${sym}`);
  if (!card) return;
  
  card.classList.add('expanded');
  document.body.classList.add('has-expanded');
  expandedSym = sym;
  
  setTimeout(() => { window.scrollTo({ top: card.offsetTop - 15, behavior: 'smooth' }); }, 60);

  const iframe = document.getElementById(`chart-${sym}`);
  if (iframe) {
    iframe.src = `https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW`;
  }
  
  const box = document.getElementById('detail-news-' + sym);
  if (box && globalDataCache?.[sym]) {
    const items = globalDataCache[sym].news;
    const validItems = items ? items.
