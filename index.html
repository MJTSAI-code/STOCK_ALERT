<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美股情報 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #1c1a16;
    --card-frame: #d9cdb8;
    --card-border: #3a352c;
    --window: #4a5240;
    --window-edge: #2e3328;
    --window-shadow: #1a1d15;
    --digit: #f0c987;
    --text: #f0e8d8;
    --muted: #7a7468;
    --label: #b8ad96;
    --up: #00e676;
    --down: #ff1744;
    --accent: #d9cdb8;
    --knob: #8a6240;
    --badge-bg: #1a2a1a;
    --tag-green: #00c853;
    --tag-purple: #9c27b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Mono', monospace;
    min-height: 100vh;
    padding-bottom: 40px;
    perspective: 1200px; /* 讓展開卡片的 rotateX 翻頁動畫有立體深度 */
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: #0d0d0d;
    border-bottom: 1px solid var(--card-frame);
  }
  .logo {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .hero-time {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    color: var(--digit);
    letter-spacing: 2px;
    line-height: 1;
    text-shadow: 0 0 12px rgba(240, 201, 135, 0.25);
  }
  .hero-date {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 2px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin: 16px;
  }
  @media(min-width: 640px)  {
    .grid { grid-template-columns: repeat(4, 1fr); }
    .grid > .card { grid-column: span 2; }
  }
  @media(min-width: 1000px) {
    .grid { grid-template-columns: repeat(6, 1fr); }
    .grid > .card { grid-column: span 2; }
  }

  /* ── 最後一行卡片補滿邏輯 ──
     改用 JS 動態計算（見 fixLastRowLayout() 函式），不再用 CSS nth-child。
     原因：卡片展開時會被搬到 DOM 最前面（讓上面的卡片自然滑到下方），
     這會讓所有卡片的 DOM 順序位移，CSS nth-child 算出來的「第幾張」會跟著錯亂，
     導致平分公式套用到錯誤的卡片上。JS 在每次排序變動後即時重算「目前實際排列」，
     才能保證不管展開哪一張、收合幾次，最後一行永遠正確平分。
     詳細規則見 fixLastRowLayout() 內的註解。
  */
  .grid.last-row-1 > .card:last-child {
    grid-column: 3 / 5; /* 6 欄制下置中：從第3欄到第5欄，左右各空1欄，卡片維持原本 span 2 大小 */
  }
  .grid.last-row-2 > .card:nth-last-child(2) {
    grid-column: 2 / 4; /* 兩張各佔原本大小(span 2)，整體置中：左空1欄 */
  }
  .grid.last-row-2 > .card:last-child {
    grid-column: 4 / 6; /* 緊接著第一張，右空1欄，兩張對稱置中 */
  }

  /* ── CARD ── */
  .card {
    background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
    border: 3px solid var(--card-frame);
    border-radius: 18px;
    padding: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    perspective: 500px;
    box-shadow:
      0 6px 0 rgba(0,0,0,0.5),
      0 10px 22px rgba(0,0,0,0.45),
      inset 0 2px 6px rgba(0,0,0,0.3);
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: #e8ddc8;
    box-shadow:
      0 8px 0 rgba(0,0,0,0.5),
      0 16px 26px rgba(0,0,0,0.5),
      inset 0 2px 6px rgba(0,0,0,0.3);
  }
  .card.expanded {
    cursor: default;
    position: fixed;
    top: 50%;
    left: 50%;
    width: min(680px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    overflow-y: auto;
    transform: translate(-50%, -50%);
    transform-origin: center center;
    border-color: #e8ddc8;
    z-index: 1001;
    box-shadow:
      0 20px 0 rgba(0,0,0,0.5),
      0 30px 60px rgba(0,0,0,0.6);
    animation: doorFlipOpen 0.5s cubic-bezier(0.4, 0, 0.3, 1);
  }
  /* 翻頁鐘啟動感：卡片原地繞水平中軸翻轉「開門」，
     45%~55% 翻到接近側面時短暫變暗（模擬看到卡片邊緣的瞬間），
     翻過去後落下定格，帶一點點回彈，不是位移/拉伸，是原地翻轉 */
  @keyframes doorFlipOpen {
    0%   { transform: translate(-50%, -50%) rotateX(0deg);   filter: brightness(1); }
    45%  { transform: translate(-50%, -50%) rotateX(-92deg); filter: brightness(0.5); }
    55%  { transform: translate(-50%, -50%) rotateX(88deg);  filter: brightness(0.5); }
    80%  { transform: translate(-50%, -50%) rotateX(-6deg);  filter: brightness(1); }
    100% { transform: translate(-50%, -50%) rotateX(0deg);   filter: brightness(1); }
  }
  .card.expanded.closing {
    animation: doorFlipClose 0.36s cubic-bezier(0.4, 0, 0.3, 1) forwards;
  }
  @keyframes doorFlipClose {
    0%   { transform: translate(-50%, -50%) rotateX(0deg);   filter: brightness(1);   opacity: 1; }
    60%  { transform: translate(-50%, -50%) rotateX(90deg);  filter: brightness(0.5); opacity: 1; }
    100% { transform: translate(-50%, -50%) rotateX(0deg);   filter: brightness(1);   opacity: 0; }
  }

  /* 展開時背後的半透明遮罩，蓋住其餘卡片，點擊可收合 */
  .card-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .card-overlay.show {
    display: block;
    opacity: 1;
  }

  /* header row */
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .card-sym {
    font-size: 20px;
    font-weight: 700;
    color: var(--digit);
    letter-spacing: 1px;
  }
  .card-name {
    font-size: 10px;
    color: #aab09a;
    margin-top: 2px;
  }

  /* badges */
  .tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .tag-post {
    background: #3a2a18;
    color: #e0b97d;
    border: 1px solid var(--knob);
    display: none;
  }
  .tag-post.show { display: inline-block; }

  /* price section — square LCD digit block, centered, label as corner badge */
  .price-section {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 92px; /* 確保沒有附屬參考行（如尚無資料的股票）時，卡片高度仍跟其他卡片一致 */
    background: linear-gradient(180deg, #5a4422 0%, #3d2e16 100%);
    border: 1px solid rgba(0,0,0,0.35);
    border-radius: 10px;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), inset 0 0 30px rgba(240,180,90,0.12);
    padding: 18px 14px 14px;
    text-align: center;
    transform-origin: center center;
    backface-visibility: hidden;
  }
  .card.expanded .price-section {
    animation: flapDown 0.42s cubic-bezier(0.45, 0, 0.55, 1);
  }
  @keyframes flapDown {
    0%   { transform: rotateX(0deg); }
    45%  { transform: rotateX(-92deg); filter: brightness(0.55); }
    46%  { transform: rotateX(88deg);  filter: brightness(0.55); }
    75%  { transform: rotateX(8deg);   filter: brightness(1); }
    100% { transform: rotateX(0deg);   filter: brightness(1); }
  }
  .phase-corner-label {
    position: absolute;
    top: 8px;
    left: 10px;
    font-size: 9px;
    font-weight: 700;
    color: #d9b87a;
    letter-spacing: 1px;
    opacity: 0.75;
  }
  .price-value {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 500;
    color: #ffd98a;
    letter-spacing: 1px;
    text-shadow: 0 0 14px rgba(255, 200, 110, 0.55);
    line-height: 1;
    display: inline-block;
  }
  .price-value.tick {
    animation: digitTick 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes digitTick {
    0%   { transform: translateY(-6px); opacity: 0.4; filter: brightness(1.8); }
    60%  { transform: translateY(1px);  opacity: 1;   filter: brightness(1.2); }
    100% { transform: translateY(0);    opacity: 1;   filter: brightness(1); }
  }
  .main-change {
    font-size: 12px;
    font-weight: 700;
    margin-top: 6px;
  }
  .ref-price {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    width: 100%;
    font-size: 11px;
    color: #c9b48a;
    display: flex;
    justify-content: center;
    gap: 6px;
    align-items: baseline;
  }
  .ref-price .ref-tag {
    opacity: 0.6;
    font-size: 10px;
  }
  .ref-price .ref-value {
    font-family: 'DM Mono', monospace;
    color: #e8d4a8;
  }
  .ref-price .ref-change {
    font-size: 10px;
    font-weight: 700;
  }
  .up   { color: var(--up);   background: #00e67615; border: 1px solid #00e67630; }
  .down { color: var(--down); background: #ff174415; border: 1px solid #ff174430; }

  /* divider — superseded by price-row seam, hidden but kept in DOM */
  .divider {
    display: none;
  }

  /* ── CHART ── */
  .chart-container {
    margin-top: 0;
    border: 1px solid var(--card-frame);
    border-radius: 10px;
    overflow: hidden;
    height: 0;
    max-height: 0;
    background: #000;
    opacity: 0;
    transition: height 0.5s cubic-bezier(0.25, 0.1, 0.25, 1),
                margin-top 0.5s cubic-bezier(0.25, 0.1, 0.25, 1),
                opacity 0.4s ease;
  }
  .chart-container.show-chart {
    height: 420px;
    max-height: 420px;
    margin-top: 14px;
    opacity: 1;
  }

  /* ── NEWS ── */
  .news-container {
    display: none;
    margin-top: 14px;
    border: 1px solid var(--card-frame);
    border-radius: 10px;
    background: var(--card-bg);
    padding: 14px;
    transform-origin: top center;
    backface-visibility: hidden;
  }
  .news-container.show-news {
    display: block;
    animation: flapDown 0.45s cubic-bezier(0.45, 0, 0.55, 1);
  }
  .news-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--card-frame);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-item {
    display: block;
    padding: 10px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    text-decoration: none;
    transition: background 0.15s;
  }
  .news-item:hover { background: rgba(255,255,255,0.07); }
  .news-headline {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }
  .news-source {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

</style>
</head>
<body>

<div class="topbar">
  <div class="logo">美股情報 PRO</div>
  <div>
    <div class="hero-time" id="heroTime">00:00</div>
    <div class="hero-date" id="heroDate"></div>
  </div>
</div>

<div class="card-overlay" id="cardOverlay" onclick="if(expandedSym) toggleCard(expandedSym, '')"></div>
<div class="grid" id="grid"></div>

<div class="footer">YAHOO FINANCE · 點擊卡片展開圖表</div>

<script>
const STOCKS = [
  {sym:'NOW',  name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA', name:'Nvidia',     ex:'NASDAQ'},
  {sym:'LITE', name:'Lumentum',   ex:'NASDAQ'},
  {sym:'ONDS', name:'Ondas',      ex:'NASDAQ'},
  {sym:'MRVL', name:'Marvell',    ex:'NASDAQ'},
  {sym:'GOOG', name:'Google C',   ex:'NASDAQ'},
  {sym:'SPCX', name:'SpaceX',     ex:'NASDAQ'},
  {sym:'TSM',  name:'TSMC',       ex:'NYSE'},
  {sym:'MU',   name:'Micron',     ex:'NASDAQ'},
  {sym:'SNDK', name:'SanDisk',    ex:'NASDAQ'},
  {sym:'TSLA', name:'Tesla',      ex:'NASDAQ'}
];

let expandedSym = null;

/* ── CLOCK ── */
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('heroTime').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('heroDate').textContent =
    `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${days[now.getDay()]}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ── BUILD GRID ── */
function buildGrid() {
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}" onclick="toggleCard('${s.sym}','${s.ex}')">
      <div class="card-header">
        <div>
          <div class="card-sym">${s.sym}</div>
          <div class="card-name">${s.name}</div>
        </div>
        <span class="tag tag-post" id="badge-${s.sym}">盤後</span>
      </div>

      <div class="price-section">
        <span class="phase-corner-label" id="phase-label-${s.sym}">現價</span>
        <span class="price-value" id="main-${s.sym}">—</span>
        <div class="main-change" id="main-chg-${s.sym}"></div>
        <div class="ref-price" id="sub-row-${s.sym}" style="display:none;">
          <span class="ref-tag" id="sub-label-${s.sym}">收盤</span>
          <span class="ref-value" id="sub-${s.sym}">—</span>
          <span class="ref-change" id="sub-chg-${s.sym}"></span>
        </div>
      </div>

      <div class="chart-container">
        <iframe id="chart-${s.sym}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
      </div>

      <div class="news-container" id="news-container-${s.sym}">
        <div class="news-header">📰 最新消息</div>
        <div class="news-list" id="news-list-${s.sym}"></div>
      </div>
    </div>
  `).join('');
  fixLastRowLayout();
}

/* ── 最後一行排版修正 ──
   展開的卡片現在是 position:fixed 浮層，不再參與 grid 排版、不會搬動 DOM 順序，
   所以這裡不需要在展開/收合時重算，只需要在初始建立 grid、或視窗縮放時計算一次。
   用 class 套用「整體置中、大小不變」的排版（不是撐大）。
   呼叫時機：buildGrid() 初始建立時、視窗 resize 時。
*/
function fixLastRowLayout() {
  const grid = document.getElementById('grid');
  if (!grid) return;
  grid.classList.remove('last-row-1', 'last-row-2');

  // 只有桌機 3 欄版面（>=1000px）才會出現「不能被 3 整除」的問題
  // 2 欄、1 欄版面卡片數量目前不會卡出落單行，故只處理 3 欄情境
  if (window.innerWidth < 1000) return;

  const total = grid.querySelectorAll('.card').length;
  const remainder = total % 3;
  if (remainder === 1) {
    grid.classList.add('last-row-1'); // 最後剩 1 張 → 置中
  } else if (remainder === 2) {
    grid.classList.add('last-row-2'); // 最後剩 2 張 → 整體置中、左右各留白
  }
  // remainder === 0：剛好整除，不用特殊處理
}
window.addEventListener('resize', fixLastRowLayout); // 視窗大小改變（例如轉橫向）時重新計算

/* ── TOGGLE CHART ──
   架構說明：展開的卡片改用 position:fixed 變成蓋在最上層的浮層（不再是 grid 的一份子）。
   這個改變一次解決了好幾個過去個別修補的問題：
     - 「上面還有其他卡片」：fixed 定位是相對視窗，浮在所有東西最上層，背後用半透明遮罩蓋住，
       不需要把卡片搬到 DOM 最前面、不需要把其他卡片推到下面。
     - 「最後一行落單/大小不一」：展開的卡片離開了 grid 的排版邏輯，其餘卡片完全不受影響、
       不需要重新排序，原本的 last-row-1/last-row-2 規則永遠對應「真實排列」，不會算錯。
     - 「畫面跳動」：不需要 scrollTo()，因為 fixed 定位直接置中於目前的視窗，不管使用者捲到哪都一樣。
     - 「快速切換卡片造成圖卡疊加」：沒有 DOM 搬移、沒有排序競爭，只剩單純的「誰在 .expanded 狀態」。
*/
let pendingAnimTimers = []; // 記錄目前這輪展開動畫排定的所有 setTimeout，切換卡片時要全部取消

function collapseCard(sym) {
  const card = document.getElementById(`card-${sym}`);
  if (!card) return;
  const chartEl = document.getElementById(`chart-${sym}`);
  const overlay = document.getElementById('cardOverlay');

  // 收合：原地播放「翻頁關門」動畫，播完才真正移除 expanded（讓它退回 grid 排版）
  card.classList.add('closing');
  pendingAnimTimers.push(setTimeout(() => {
    card.classList.remove('expanded', 'closing');
  }, 360));

  overlay.classList.remove('show');
  chartEl.src = '';
  chartEl.closest('.chart-container').classList.remove('show-chart');
  document.getElementById(`news-container-${sym}`).classList.remove('show-news');
  expandedSym = null;
}

function toggleCard(sym, ex) {
  // 取消上一輪還沒跑完的動畫計時器，避免「快速切換卡片」時，
  // 舊卡片過期的 setTimeout 還是會在背景觸發，把新聞/圖表狀態套到錯的卡片上
  pendingAnimTimers.forEach(id => clearTimeout(id));
  pendingAnimTimers = [];

  const card = document.getElementById(`card-${sym}`);
  const isExpanded = card.classList.contains('expanded');
  const chartEl = document.getElementById(`chart-${sym}`);
  const chartContainer = chartEl.closest('.chart-container');
  const newsContainer = document.getElementById(`news-container-${sym}`);
  const mainValueEl = document.getElementById(`main-${sym}`);
  const overlay = document.getElementById('cardOverlay');

  if (expandedSym && expandedSym !== sym) {
    collapseCard(expandedSym); // 切換到別張卡片前，先讓前一張正常收合歸位
  }

  if (!isExpanded) {
    // 展開：直接切換 class，CSS 的 doorFlipOpen 動畫會自己處理「原地翻頁開門 → 淡入定格於視窗中央」，
    // 不需要 JS 算位移/縮放，卡片本來就是 position:fixed，瀏覽器會直接把它放到該在的位置。
    card.classList.add('expanded');
    expandedSym = sym;
    history.pushState({ expanded: sym }, '');
    overlay.classList.add('show');

    // 時序：翻頁開門動畫(500ms) → 數字跳動更新(280ms) → 新聞翻轉跳出(450ms) → 圖表下拉展開
    pendingAnimTimers.push(setTimeout(() => {
      mainValueEl.classList.add('tick');
      pendingAnimTimers.push(setTimeout(() => mainValueEl.classList.remove('tick'), 300));
    }, 500));

    pendingAnimTimers.push(setTimeout(() => {
      newsContainer.classList.add('show-news');
    }, 500 + 280 + 20));

    pendingAnimTimers.push(setTimeout(() => {
      chartEl.src =
        `https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW`;
      chartContainer.classList.add('show-chart');
    }, 500 + 280 + 20 + 450)); // 新聞翻轉播完後才下拉圖表
  } else {
    collapseCard(sym);
    // 手動點擊收合（不是按返回鍵）時，主動清掉之前推入的瀏覽紀錄，避免堆疊殘留
    if (!collapsingViaBack && history.state && history.state.expanded === sym) {
      history.back();
    }
  }
}

/* ── RENDER PRICE ── */
function renderPrice(sym, q) {
  if (!q) return;
  const current    = parseFloat(q.c ?? q.regular ?? 0);
  const regular    = parseFloat(q.regular ?? q.c ?? 0);
  const prevClose  = parseFloat(q.prev_close ?? regular);
  const phase      = q.phase || '正式盤';

  // 主行：永遠顯示「目前最新成交價」，標籤跟著 phase 走（跟 TradingView 一致）
  const phaseLabelMap = { '盤前': '盤前', '盤後': '盤後', '正式盤': '現價', '錯誤': '—' };
  document.getElementById(`phase-label-${sym}`).textContent = phaseLabelMap[phase] || '現價';
  document.getElementById(`main-${sym}`).textContent = `$${current.toFixed(2)}`;

  // 主行漲跌：永遠相對「昨日收盤」（沿用後端算好的 d / dp）
  const mainChange = q.d  !== undefined ? parseFloat(q.d)  : (current - prevClose);
  const mainPct    = q.dp !== undefined ? parseFloat(q.dp) : (prevClose ? (mainChange / prevClose * 100) : 0);
  const mainDir  = mainChange >= 0 ? 'up' : 'down';
  const mainSign = mainChange >= 0 ? '▲' : '▼';
  document.getElementById(`main-chg-${sym}`).innerHTML =
    `<span class="${mainDir}">${mainSign} ${Math.abs(mainChange).toFixed(2)} (${Math.abs(mainPct).toFixed(2)}%)</span>`;

  // badge：跟主行標籤一致，盤前/盤後才顯示徽章；盤中不顯示
  const badge = document.getElementById(`badge-${sym}`);
  if (phase === '盤前' || phase === '盤後') {
    badge.textContent = phase;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }

  // 附屬行：盤前/盤後才顯示參考價；盤中時完全隱藏，不湊行數
  // 盤後：今天已經收盤，參考基準是「今日收盤」
  // 盤前：還沒有「今天的收盤」，參考基準是「昨收」
  const subRow   = document.getElementById(`sub-row-${sym}`);
  const subLabel = document.getElementById(`sub-label-${sym}`);
  const subEl    = document.getElementById(`sub-${sym}`);
  const subChgEl = document.getElementById(`sub-chg-${sym}`);

  if (phase === '盤後') {
    subRow.style.display = 'flex';
    subLabel.textContent = '收盤';
    subEl.textContent = `$${regular.toFixed(2)}`;
    const regChange = regular - prevClose;
    const regPct = prevClose ? (regChange / prevClose * 100) : 0;
    const dir  = regChange >= 0 ? 'up' : 'down';
    const sign = regChange >= 0 ? '▲' : '▼';
    subChgEl.innerHTML =
      `<span class="${dir}">${sign} ${Math.abs(regChange).toFixed(2)} (${Math.abs(regPct).toFixed(2)}%)</span>`;
  } else if (phase === '盤前') {
    subRow.style.display = 'flex';
    subLabel.textContent = '昨收';
    subEl.textContent = `$${prevClose.toFixed(2)}`;
    subChgEl.innerHTML = '';
  } else {
    subRow.style.display = 'none';
  }
}

/* ── LOAD DATA ── */
async function loadData() {
  try {
    const res  = await fetch('./stock_data.json?t=' + Date.now());
    const json = await res.json();
    STOCKS.forEach(s => {
      const data = json.data?.[s.sym];
      if (data && data.quote) renderPrice(s.sym, data.quote);
      if (data && data.news) renderNews(s.sym, data.news);
    });
  } catch(e) { console.error(e); }
}

/* ── RENDER NEWS ── */
function renderNews(sym, newsList) {
  const el = document.getElementById(`news-list-${sym}`);
  if (!el) return;
  if (!newsList.length) {
    el.innerHTML = `<div class="news-source">暫無相關新聞</div>`;
    return;
  }
  el.innerHTML = newsList.map(n => `
    <a class="news-item" href="${n.url}" target="_blank" rel="noopener noreferrer">
      <div class="news-headline">${n.headline}</div>
      <div class="news-source">${n.source}</div>
    </a>
  `).join('');
}

/* ── 手機返回鍵收合展開的卡片 ──
   展開卡片時推一筆瀏覽紀錄，按返回鍵時攔截，改成收合卡片而不是離開頁面 */
let collapsingViaBack = false;
window.addEventListener('popstate', () => {
  if (expandedSym) {
    collapsingViaBack = true;
    toggleCard(expandedSym, '');
    collapsingViaBack = false;
  }
});

buildGrid();
loadData();
setInterval(loadData, 60000);
</script>
