<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark light">
<title>美股情報 PRO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'DM Mono Fallback';
    src: local('Courier New'), local('Courier');
    size-adjust: 96%;
    ascent-override: 90%;
  }
  @font-face {
    font-family: 'Roboto Mono Fallback';
    src: local('Courier New'), local('Courier');
    size-adjust: 98%;
    ascent-override: 90%;
  }
  :root {
    color-scheme: dark light;
    --bg: #0a0a0a;
    --card-bg: #1c1a16;
    --card-frame: #d9cdb8;
    --card-border: #3a352c;
    --window: #4a5240;
    --window-edge: #2e3328;
    --digit: #f0c987;
    --text: #f0e8d8;
    --muted: #7a7468;
    --label: #b8ad96;
    --up: #00e676;
    --down: #ff1744;
    --accent: #d9cdb8;
    --knob: #8a6240;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  /* 捲軸槽永久保留：捲軸出現/消失都不再改變版面寬度，根治點卡片與編輯切換的位移 */
  html { scrollbar-gutter: stable; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Mono', 'Roboto Mono Fallback', monospace;
    min-height: 100vh;
    min-width: 960px;
    padding-bottom: 40px;
    color-scheme: dark;
  }
  body.scroll-locked { overflow: hidden; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; background: #0d0d0d;
    border-bottom: 1px solid var(--card-frame);
  }
  .logo { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .hero-time { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; color: var(--digit); letter-spacing: 2px; line-height: 1; text-shadow: 0 0 12px rgba(240,201,135,0.25); }
  .hero-date { font-size: 11px; color: var(--muted); text-align: right; margin-top: 2px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 16px; }
  .card-pending {
    border: 0.5px dashed #3a3020; background: #111008; border-radius: 10px;
    padding: 14px 12px; text-align: center; color: #555; font-size: 11px;
    font-family: monospace; letter-spacing: 1px;
  }
  #searchPanel {
    display: none; background: #0d0c07; border-top: 1px solid #2a2418;
    padding: 14px 16px; position: sticky; bottom: 60px; z-index: 500;
    /* bottom:60px = #actionBar 高度 → 面板釘在動作列正上方，垂直堆疊不重疊 */
  }
  body.editing #searchPanel { display: block; }
  /* 編輯模式頁尾墊片：等於 actionBar 高度，避免捲到最底時內容被 fixed 列蓋住 */
  body.editing::after { content: ''; display: block; height: 60px; }
  .manage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .manage-title { color: #c8a96e; font-size: 11px; letter-spacing: 2px; }
  .manage-close { background: none; border: none; cursor: pointer; color: #555; font-size: 18px; line-height: 1; padding: 0; }
  .manage-close:hover { color: #c8a96e; }
  .search-inner { background: #131109; border: 1px solid #2a2620; border-radius: 12px; padding: 10px; }
  .search-inner input {
    width: 100%; background: #0c0b07; border: 1px solid #33302a; border-radius: 8px;
    padding: 9px 12px; color: #f0e8d8; font-family: 'DM Mono', monospace; font-size: 13px;
    text-transform: uppercase; outline: none;
  }
  .search-inner input:focus { border-color: #c8a96e; }
  .results { margin-top: 8px; max-height: 130px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .res-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: #171509; border: 1px solid #2a2620; border-radius: 8px; }
  .res-row .r-sym { font-size: 13px; font-weight: 700; color: var(--digit); font-family: 'DM Mono', monospace; letter-spacing: 1px; }
  .res-row .r-name { font-size: 10px; color: #8a8474; margin-top: 2px; }
  .add-btn {
    padding: 5px 14px; border: none; background: #c8a96e;
    color: #0a0900; border-radius: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 1px;
  }
  .add-btn:hover { background: #d9bc84; }
  .res-empty { font-size: 11px; color: #6f6a5e; text-align: center; padding: 10px; }
  #syncStatus { font-size: 11px; min-height: 16px; margin-top: 6px; font-family: monospace; }
  /* ── 編輯模式指示 1：慢閃 set mode（電子鐘調時感，未選取才閃）──
     動畫掛在 span 層：span 無背景色，只有發光數字明滅、黑底框穩定不動。
     四層（上靜態/下靜態/前蓋/後蓋）必須全選，漏任何一層＝該半截恆亮。
     （掛在 .pf-stack 容器會連黑底框一起閃 → 整個黑框明滅，錯誤層級）*/
  @keyframes setBlink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  body.editing .card:not(.go):not(.selected) .pf-top-static span,
  body.editing .card:not(.go):not(.selected) .pf-bot-static span,
  body.editing .card:not(.go):not(.selected) .pf-front span,
  body.editing .card:not(.go):not(.selected) .pf-back span { animation: setBlink 1.3s ease-in-out infinite; }
  /* ── 編輯模式指示 2：頂邊發光細縫（面板未扣上）── */
  .card::before {
    content: ''; position: absolute; top: -2px; left: 14px; right: 14px; height: 2px;
    border-radius: 2px; z-index: 6; pointer-events: none;
    background: linear-gradient(90deg, transparent 0%, rgba(255,205,115,0.9) 30%, rgba(255,215,130,1) 50%, rgba(255,205,115,0.9) 70%, transparent 100%);
    box-shadow: 0 0 8px rgba(255,190,100,0.5);
    opacity: 0; transition: opacity .3s ease, box-shadow .2s ease, height .2s ease;
  }
  body.editing .card:not(.go)::before { opacity: 1; }
  .card.selected::before { height: 3px; box-shadow: 0 0 18px rgba(255,205,115,0.9); }
  /* ── hover / 選取（琥珀金光暈）── */
  body.editing .card { cursor: pointer; }
  @media (hover: hover) and (pointer: fine) {
    body.editing .card:not(.selected):not(.go):hover {
      border-color: #c8a96e; filter: brightness(1.12);
      box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45),
                  inset 0 2px 6px rgba(0,0,0,0.3),
                  inset 0 0 40px rgba(240,180,60,0.18),
                  0 0 0 1px rgba(200,169,110,0.4),
                  0 0 28px rgba(200,140,60,0.25);
    }
    body.editing .card:not(.selected):not(.go):hover .pf-top-static span,
    body.editing .card:not(.selected):not(.go):hover .pf-bot-static span,
    body.editing .card:not(.selected):not(.go):hover .pf-front span,
    body.editing .card:not(.selected):not(.go):hover .pf-back span { animation: none; }
    body.editing .card:not(.selected):not(.go):hover::before { height: 3px; box-shadow: 0 0 16px rgba(255,200,110,0.85); }
  }
  .card.selected {
    border-color: #f0c060 !important; filter: brightness(1.13);
    box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45),
                inset 0 2px 6px rgba(0,0,0,0.3),
                inset 0 0 44px rgba(240,185,70,0.22),
                0 0 0 1.5px rgba(230,195,110,0.5),
                0 0 30px rgba(220,160,70,0.3);
  }
  /* 選取順序角標（1,2,3…）取代單張 ✕ */
  .check {
    position: absolute; top: -9px; right: -9px; min-width: 26px; height: 26px; padding: 0 6px;
    border-radius: 8px; background: #3a2c12; border: 1px solid #f0c060;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.5); transition: opacity .18s, transform .2s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 12; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; color: #201400;
    pointer-events: none;
  }
  .card.selected .check { opacity: 1; transform: scale(1); background: #f0c060; box-shadow: 0 0 12px rgba(240,190,90,0.6); }
  /* ── 卸除：翻頁歸零後熄滅 → 淡出 ── */
  .price-section.off { transition: filter .14s ease, opacity .14s ease; filter: brightness(0.15); opacity: .3; }
  .main-change.off { transition: opacity .14s ease; opacity: .25; }
  @keyframes cardTeardownFade { 0%{opacity:1} 100%{opacity:0} }
  .card.fade { animation: cardTeardownFade .2s ease forwards; }
  .card.go .check { opacity: 0; }
  /* ── 底部批量刪除動作列 ── */
  #actionBar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1400;
    height: 60px; box-sizing: border-box;
    background: linear-gradient(180deg, #1a1710 0%, #111009 100%);
    border-top: 1px solid #3a3020; box-shadow: 0 -2px 12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(200,160,80,0.1);
    padding: 12px 16px; align-items: center; justify-content: space-between;
  }
  body.editing #actionBar { display: flex; }
  #actionBar .bar-count { font-size: 12px; color: #c8a96e; font-family: 'DM Mono', monospace; }
  #actionBar .confirm-txt { display: none; font-size: 12px; color: #e05c5c; }
  #actionBar.confirming .bar-count { display: none; }
  #actionBar.confirming .confirm-txt { display: inline; }
  #actionBar .grp { display: flex; gap: 8px; align-items: center; }
  #actionBar .default-grp { display: flex; }
  #actionBar .confirm-grp { display: none; align-items: center; gap: 10px; }
  #actionBar.confirming .default-grp { display: none; }
  #actionBar.confirming .confirm-grp { display: flex; }
  #actionBar .eb-btn {
    padding: 7px 15px; border-radius: 9px; font-family: 'DM Mono', monospace; font-size: 12px;
    letter-spacing: 1px; cursor: pointer; border: 1px solid transparent;
  }
  #actionBar .eb-del { background: rgba(224,92,92,0.12); border-color: #e05c5c; color: #e05c5c; }
  #actionBar .eb-del:hover { background: #e05c5c; color: #140f0f; }
  #actionBar .eb-del[disabled] { opacity: .35; cursor: default; border-color: #5a3030; background: none; color: #8a5a5a; }
  #actionBar .eb-ghost { background: none; border-color: #3a3020; color: #c8a96e; }
  #actionBar .eb-ghost:hover { border-color: #c8a96e; }
  /* ── 設定：topbar ⚙️ + bottom sheet ── */
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .settings-btn {
    background: none; border: 1px solid #3a3020; border-radius: 8px;
    color: #c8a96e; font-size: 18px; line-height: 1;
    width: 38px; height: 38px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .settings-btn:hover { border-color: #c8a96e; }
  .edit-btn {
    width: auto; padding: 0 14px; font-weight: 600;
    font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px;
  }
  .edit-btn.active { border-color: #c8a96e; background: #c8a96e; color: #0a0900; }
  /* 查無代號防呆：錯誤卡標示 */
  .card.card-error { border-color: rgba(224,92,92,0.55); }
  .card.card-error .price-section {
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), inset 0 0 30px rgba(224,92,92,0.08);
  }
  .settings-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 1490;
  }
  .settings-overlay.show { display: block; }
  #settingsSheet {
    display: none; position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #0d0c07; border-top: 1px solid #2a2418;
    padding: 14px 16px 22px; z-index: 1500;
  }
  #settingsSheet.open { display: block; }
  .settings-token-status {
    font-size: 11px; font-family: monospace; color: #7a7468;
    margin-bottom: 10px; letter-spacing: 1px;
  }
  .settings-actions { margin-bottom: 10px; }
  .settings-hint { font-size: 10px; color: #555; line-height: 1.6; }
  .token-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .token-input {
    flex: 1; background: #0c0b07; border: 1px solid #33302a; color: #f0e8d8;
    border-radius: 8px; padding: 9px 12px; font-size: 13px;
    font-family: 'DM Mono', monospace; outline: none;
  }
  .token-input:focus { border-color: #c8a96e; }
  .eb-save-btn {
    background: #c8a96e; border: none; color: #0a0900; border-radius: 8px;
    padding: 0 18px; font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'DM Mono', monospace; letter-spacing: 1px;
  }
  .eb-save-btn:hover { background: #d9bc84; }
  .eb-clear-btn {
    padding: 7px 15px; border-radius: 9px;
    border: 1px solid #3a3020; background: none;
    color: #a05a5a; font-size: 12px; cursor: pointer;
    font-family: 'DM Mono', monospace; letter-spacing: 1px;
  }
  .eb-clear-btn:hover { border-color: #e05c5c; color: #e05c5c; }
  @media(min-width: 640px)  { .grid { grid-template-columns: repeat(4,1fr); } .grid > .card { grid-column: span 2; } }
  @media(min-width: 1000px) { .grid { grid-template-columns: repeat(6,1fr); } .grid > .card { grid-column: span 2; } }
  .card.last-row-solo   { grid-column: 3/5; }
  .card.last-row-pair-1 { grid-column: 2/4; }
  .card.last-row-pair-2 { grid-column: 4/6; }
  .card {
    background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
    border: 3px solid var(--card-frame);
    border-radius: 18px; padding: 16px; cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s, filter 0.25s;
    position: relative; perspective: 500px;
    display: flex; flex-direction: column;
    min-height: 160px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45), inset 0 2px 6px rgba(0,0,0,0.3);
  }
  @media (hover: hover) and (pointer: fine) {
    .card:not(.expanded):hover {
      border-color: #c8a96e;
      filter: brightness(1.12);
      box-shadow:
        0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45),
        inset 0 2px 6px rgba(0,0,0,0.3),
        inset 0 0 40px rgba(240,180,60,0.18),
        0 0 0 1px rgba(200,169,110,0.4),
        0 0 28px rgba(200,140,60,0.25);
    }
  }
  .card-body-split, .split-left, .split-right { display: contents; }
  .card-header { order: -2; }
  .price-section { order: -1; }
  .card.expanded {
    cursor: default; position: fixed;
    top: 50%; left: 50%;
    width: min(1040px, calc(100vw - 32px + var(--scrollbar-w, 0px)));
    max-height: calc(100vh - 32px);
    transform: translate(-50%, -50%);
    z-index: 1001;
    background: transparent; border: none; box-shadow: none; padding: 0;
    overflow: visible;
    animation: cardQuietAppear 0.3s ease-out forwards;
  }
  @keyframes cardQuietAppear {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.96); }
    100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }
  .card.expanded.closing { animation: cardQuietDisappear 0.28s ease-in forwards; }
  @keyframes cardQuietDisappear {
    0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.96); }
  }
  .card.expanded .card-body-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    perspective: 1200px;
  }
  @media(min-width: 721px) {
    .card.expanded .split-left,
    .card.expanded .split-right {
      background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
      border: 2px solid var(--card-frame);
      border-radius: 10px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 12px 24px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      overflow: hidden;
      position: relative;
      height: 460px;
    }
    .card.expanded .split-left  { display: flex; flex-direction: column; }
    .card.expanded .split-right { display: flex; flex-direction: column; }
    .card.expanded .split-left,
    .card.expanded .split-right {
      clip-path: inset(0 0 99% 0 round 10px);
      transform: scaleY(0.04);
      transform-origin: top center;
      opacity: 0;
    }
    .card.expanded .split-left.panel-flap,
    .card.expanded .split-right.panel-flap {
      animation: unrollDown 0.52s cubic-bezier(0.77,0,0.175,1) forwards;
    }
    @keyframes unrollDown {
      0%   { clip-path: inset(0 0 99% 0 round 10px); transform: scaleY(0.04); opacity: 0; }
      100% { clip-path: inset(0 0 0%  0 round 10px); transform: scaleY(1);    opacity: 1; }
    }
    .card.expanded .split-left::after,
    .card.expanded .split-right::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 20;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    .card.expanded .split-left.panel-flap::after,
    .card.expanded .split-right.panel-flap::after {
      animation: fadeOutGradient 0.3s ease 0.4s forwards;
    }
    @keyframes fadeOutGradient {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }
    .card.expanded .split-left { perspective: none; }
    .card.expanded .split-left .chart-container {
      flex: 1; height: auto !important; max-height: none !important;
      margin: 12px; border-radius: 6px; overflow: hidden;
      border: 1px solid rgba(217,205,184,0.25); background: #000;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
      opacity: 1;
      clip-path: inset(0 0 100% 0 round 6px);
      transition: clip-path 0.5s cubic-bezier(0.77,0,0.175,1) 0.1s;
    }
    .card.expanded .split-left .chart-container.show-chart {
      clip-path: inset(0 0 0% 0 round 6px);
    }
    .card.expanded .split-right .card-header {
      order: unset; flex: none;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(217,205,184,0.2);
    }
    .card.expanded .card-sym { font-size: 20px; font-weight: 700; color: var(--digit); letter-spacing: 1px; }
    .card.expanded .card-name { font-size: 10px; color: #aab09a; margin-top: 2px; }
  }
  .sf-wrap { position: relative; clip-path: inset(0 0 100% 0); }
  .sf-wrap.reveal-full { animation: sfRevealFull 0.44s cubic-bezier(0.77,0,0.175,1) forwards; }
  @keyframes sfRevealFull { 0% { clip-path: inset(0 0 100% 0); } 100% { clip-path: inset(0 0 0% 0); } }
  .expanded-price-stage {
    padding: 16px 14px 12px;
    background: linear-gradient(180deg, #5a4422 0%, #3d2e16 100%);
    border: 1px solid rgba(0,0,0,0.35); border-radius: 8px;
    margin: 10px 12px 0; text-align: center;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); position: relative;
    transition: box-shadow 0.15s ease;
  }
  .expanded-price-stage.light-up {
    box-shadow:
      inset 0 2px 10px rgba(0,0,0,0.5),
      inset 0 0 30px rgba(240,180,90,0.06),
      inset 0 15px 50px rgba(38, 166, 154, 0.50),
      inset 0 0 80px rgba(38, 166, 154, 0.22),
      inset 0 0 120px rgba(38, 166, 154, 0.09);
  }
  .expanded-price-stage.light-down {
    box-shadow:
      inset 0 2px 10px rgba(0,0,0,0.5),
      inset 0 0 30px rgba(240,180,90,0.06),
      inset 0 15px 50px rgba(239, 83, 80, 0.50),
      inset 0 0 80px rgba(239, 83, 80, 0.22),
      inset 0 0 120px rgba(239, 83, 80, 0.09);
  }
  .expanded-phase-label {
    position: absolute; top: 6px; left: 10px;
    font-size: 9px; font-weight: 700; color: #d9b87a; opacity: 0.8; letter-spacing: 1px;
    white-space: nowrap;
  }
  .expanded-main-change { font-size: 13px; font-weight: 700; margin-top: 8px; }
  .expanded-ref-row {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; color: #c9b48a;
    overflow: hidden; perspective: 300px;
  }
  .expanded-ref-row #flipFront {
    display: block;
  }
  .expanded-news-wrap {
    flex: 1; overflow-y: auto; margin: 10px 12px 12px;
    background: rgba(0,0,0,0.2); border: 1px solid rgba(217,205,184,0.15);
    border-radius: 6px; padding: 12px;
  }

    /* ── 效能：翻頁字卡合成層隔離 ──
       .pf-stack 提升為獨立合成層 + contain，讓 rotateX 逐幀重繪不會
       波及父層 .expanded-price-stage 那 5 層 inset box-shadow（最大 120px blur）。
       視覺外觀完全不變，只是把 paint 範圍鎖在字卡內。 */
    /* 註：不使用 contain:paint —— rotateX 經 perspective 投影會略微超出元素邊界，
       paint containment 會把它裁掉。用 translateZ(0) 提升合成層即足夠。 */
    .pf-stack {
      contain: layout style;
      transform: translateZ(0);
    }
    .pf-front, .pf-back { will-change: transform; backface-visibility: hidden; }
    /* 翻動當下把 text-shadow blur 從 14px 降到 6px：
       44px 字 × 4 層模糊文字逐幀重繪是主要卡頓來源。
       靜止狀態維持原本的完整光暈，動畫中的 0.13s 肉眼看不出差異。 */
    .pf-front.go span, .pf-back.go span {
      text-shadow: 0 0 6px rgba(255,200,110,0.45);

    /* light-up/down 切換時 box-shadow transition 會讓整塊含巨型 blur 重繪 */
    .card.expanded .expanded-price-stage { transition: none; }
    /* 點擊反饋 */
    .card:not(.expanded):active {
      border-color: #c8a96e;
      filter: brightness(1.12);
      box-shadow:
        0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45),
        inset 0 2px 6px rgba(0,0,0,0.3),
        inset 0 0 40px rgba(240,180,60,0.18),
        0 0 0 1px rgba(200,169,110,0.4),
        0 0 28px rgba(200,140,60,0.25);
    }
    /* hover 手機上取消 */
    .card:not(.expanded):hover { filter: none; box-shadow: none; border-color: var(--card-frame); }
    /* 外層卡片微調 */
    .pf-stack { width: min(210px, 80%); }
    /* 手機版：sf-wrap 改用 GPU 可加速的 opacity+translateY，取代 clip-path（卡頓來源）
       animation-play-state:paused 讓元素 DOM 插入瞬間即凍結在 0%（opacity:0），
       無空窗閃現，行為穩定於 Android WebView / iOS Safari */
    /* ── 手機展開：清除贅餘的 3D rendering context ──
       .card 的 perspective:500px 與 .card-body-split 的 perspective:1200px
       都是為桌機雙欄 unrollDown 翻板而設。手機是單欄、無翻板，卻仍繼承這兩層
       3D context，導致內部所有動畫被迫走 3D 光柵化路徑。
       .pf-stack 的 perspective:600px（翻頁鬧鐘）不在此列，維持原樣。 */
    .card.expanded { perspective: none; }
    .card.expanded .card-body-split { perspective: none; }
    .card.expanded .expanded-ref-row { perspective: none; }

    /* ── 手機 reveal：通電暖機 ──
       螢光顯示器通電的亮度爬升：先暗 → 過衝到偏亮 → 回落穩定。
       只動 opacity 與 filter，不觸發 layout，也不產生 transform 祖先。 */
    .sf-wrap {
      clip-path: none;
      animation: sfRevealMobile 0.42s cubic-bezier(0.2,0.7,0.3,1) forwards;
      animation-play-state: paused;
    }
    /* 必須用 .sf-wrap.reveal-full（特異性 0,2,0）重新宣告整個 animation。
       只寫 .sf-wrap（0,1,0）會輸給第 371 行的
       .sf-wrap.reveal-full { animation: sfRevealFull ... }（clip-path 捲軸），
       導致手機實際跑的是桌機那支動畫 —— 這是「改成 opacity 卻還是看到卷軸」的原因。 */
    .sf-wrap.reveal-full {
      animation: sfRevealMobile 0.42s cubic-bezier(0.2,0.7,0.3,1) forwards;
      animation-play-state: running;
    }
    @keyframes sfRevealMobile {

      45%  { opacity: 1; filter: brightness(1.55); }
      100% { opacity: 1; filter: brightness(1); }

       filter 會讓元素渲染進獨立緩衝，並「攤平」子層的 3D 變換。
       animation-fill-mode:forwards 會讓 brightness(1) 永久殘留，
       翻頁鬧鐘（.pf-stack 的 rotateX）就會失去立體感。
       animation:none 才能解除 fill-forwards 的鎖定 —— 動畫層級的計算值
       優先於 inline style，光設 filter:none 是蓋不掉的。 */
    .sf-wrap.reveal-done {
      animation: none;
      opacity: 1;
      filter: none;
    }
    /* 手機版：字卡位置固定，不依賴瀏覽器 flex 自動置中 */
    .pf-wrap { margin: 8px 0; }

        inset 0 0 80px rgba(239, 83, 80, 0.28),
        inset 0 0 120px rgba(239, 83, 80, 0.12);

    .card { padding: 14px; }

    /* ── 手機版展開：全螢幕，完全獨立於桌機版 ── */
    .card.expanded {

      width: 100vw;

    .card.expanded .card-name { font-size: 10px; }
    .card.expanded .card-header { padding: 14px 16px; }
    .card.expanded .expanded-price-stage { padding: 16px 14px 12px; margin: 10px 12px 0; }
    .card.expanded .expanded-phase-label { font-size: 9px; }

    .card.expanded .exp-pf-stack .pf-top-static,
    .card.expanded .exp-pf-stack .pf-bot-static,
    .card.expanded .exp-pf-stack .pf-front,
    .card.expanded .exp-pf-stack .pf-back { height: 28px; }
    .card.expanded .exp-pf-stack .pf-top-static span,
    .card.expanded .exp-pf-stack .pf-bot-static span,
    .card.expanded .exp-pf-stack .pf-front span,
    .card.expanded .exp-pf-stack .pf-back span { font-size: 44px; line-height: 56px; height: 56px; }
    .card.expanded .expanded-main-change { font-size: 13px; margin-top: 8px; }
    .card.expanded .expanded-ref-row { font-size: 11px; margin-top: 8px; }
    .card.expanded .expanded-news-wrap { margin: 10px 12px 0; }
    /* ── 手機展開：沿用收合卡片的橄欖綠機身 ──
       展開＝走進這張卡的內部，機身沿用同一組漸層，維持物件感。
       內部各區塊一律「深邊 rgba(0,0,0,0.35) + inset 凹陷」，
       與收合卡片的 .price-section 同一套材質規則；
       奶油色（--card-frame）維持只在最外框出現一次的原則，內部不使用。 */
    .card.expanded {
      background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
    }
    /* 標題區：與收合卡片相同，無框線，僅靠留白分隔 */
    .card.expanded .card-header {
      background: none;
      border-bottom: none;
      box-shadow: none;
      padding: 16px 16px 10px;
    }
    /* 顯示窗：完全比照收合卡片的 .price-section */
    .card.expanded .expanded-price-stage {
      border: 1px solid rgba(0,0,0,0.35);
      border-radius: 10px;
      margin: 0 16px;
      box-shadow:
        inset 0 2px 10px rgba(0,0,0,0.5),
        inset 0 0 30px rgba(240,180,90,0.12);
    }
    /* 新聞區：同樣的深邊凹陷語彙，只是底色更深以區隔層次 */
    .card.expanded .expanded-news-wrap {
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(0,0,0,0.35);
      border-radius: 10px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.45);
      margin: 12px 16px 0;
      padding: 13px;
    }
    .card.expanded .expanded-news-title {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 9px;
    }
    .card.expanded .expanded-news-item {
      background: rgba(0,0,0,0.18);
      border-color: rgba(0,0,0,0.3);
    }
    /* ── 操作鍵：凸起 ──
       材質分工：可以按的東西凸出來，用來看的東西（顯示窗、新聞槽）凹進去。
       凸起沿用收合卡片本身的語彙（0 6px 0 實心厚度 + 柔和落影），只是縮小尺度：
         0 3px 0   → 按鍵的實體厚度
         0 5px 10px→ 落在機身上的影子
         inset 頂部高光 → 受光面
       仍不使用奶油色描邊，維持「奶油色只在最外框」的規則。 */
    .card.expanded .mobile-tv-btn,
    .card.expanded .mobile-back-bar {
      background: linear-gradient(180deg, #1a1710 0%, #111009 100%);
      border: 1px solid #3a3020;
      box-shadow:
        0 3px 0 rgba(0,0,0,0.5),
        0 5px 10px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(200,160,80,0.18);
      color: #c8a96e;
      transition: transform 0.09s ease, box-shadow 0.09s ease;
    }
    .card.expanded .mobile-tv-btn   { margin: 14px 16px 0; }
    .card.expanded .mobile-back-bar { margin: 12px 16px 22px; }
    /* 按下：整顆沉入，厚度歸零 */
    .card.expanded .mobile-tv-btn:active,
    .card.expanded .mobile-back-bar:active {
      transform: translateY(3px);
      background: linear-gradient(180deg, #201e14 0%, #181510 100%);
      box-shadow:
        0 0 0 rgba(0,0,0,0.5),
        0 1px 3px rgba(0,0,0,0.3),
        inset 0 2px 7px rgba(0,0,0,0.5);
    }
    /* 底部留空，避免被 close-bar 蓋住 */
    .card.expanded .card-body-split { padding-bottom: 72px; }

.mobile-close-bar {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;

      background: linear-gradient(180deg, #1a1710 0%, #111009 100%);
      border-top: 1px solid #3a3020;

    }
    .mobile-close-bar .cb-screw {

    .mobile-close-bar .cb-label {

    .mobile-close-bar .cb-line {

  }
  .footer { text-align: center; margin-top: 24px; font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  /* ── 底部關閉列：復古機械風格 ── */

</style>

<body>

  <div class="manage-header">
    <span class="manage-title">設定 · GITHUB TOKEN</span>
    <button class="manage-close" onclick="closeSettings()" aria-label="關閉">&#x2715;</button>
  </div>
  <div class="settings-token-status" id="tokenStatus">未設定</div>
  <div class="token-row">
    <input id="settingsTokenInput" class="token-input" type="password"
           placeholder="貼上 fine-grained PAT" autocomplete="off"
           autocapitalize="off" spellcheck="false" style="text-transform:none;" />
    <button class="eb-save-btn" onclick="saveTokenFromSheet()">儲存</button>
  </div>
  <div class="settings-actions">
    <button class="eb-clear-btn" onclick="clearToken()">清除 Token</button>
  </div>
  <div class="settings-hint">此 Token 只存在你這台裝置的瀏覽器裡，僅用於同步自選股清單，建議申請僅限 STOCK_ALERT repo、Contents 讀寫權限的 fine-grained token。</div>
</div>
<script>
const DEFAULT_STOCKS = [
  {sym:'NOW',  name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA', name:'Nvidia',     ex:'NASDAQ'},
  {sym:'LITE', name:'Lumentum',   ex:'NASDAQ'},
  {sym:'ONDS', name:'Ondas',      ex:'NASDAQ'},
  {sym:'MRVL', name:'Marvell',    ex:'NASDAQ'},
  {sym:'GOOG', name:'Google C',   ex:'NASDAQ'},
  {sym:'SPCX', name:'SpaceX',     ex:'NASDAQ'},
  {sym:'TSM',  name:'TSMC',       ex:'NYSE'},
  {sym:'MU',   name:'Micron',     ex:'NASDAQ'},
  {sym:'SNDK', name:'SanDisk',    ex:'NASDAQ'},
  {sym:'TSLA', name:'Tesla',      ex:'NASDAQ'}
];
// 上限：DEFAULT_STOCKS 有 11 支，原上限 10 導致第一次新增必被擋
const MAX_STOCKS = 12;
// ── Stock schema validator (Bug 1: corrupt localStorage guard) ──
function _isValidStockEntry(s) {
  return s && typeof s.sym === 'string' && /^[A-Z0-9._^]{1,12}$/.test(s.sym);
}
function _loadStocks() {
  try {
    const raw = localStorage.getItem('userStocks');
    if (!raw) return null;
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr) || arr.length === 0) return null;
    // Filter out any corrupt entries rather than rejecting the whole list
    const valid = arr.filter(_isValidStockEntry);
    return valid.length > 0 ? valid : null;
  } catch (e) {
    console.warn('[stocks] localStorage parse failed, resetting:', e);
    localStorage.removeItem('userStocks');
    return null;
  }
}
let STOCKS = _loadStocks() || DEFAULT_STOCKS.slice();
function _saveStocks() {
  try {
    localStorage.setItem('userStocks', JSON.stringify(STOCKS));
  } catch (e) {
    console.error('[stocks] localStorage write failed:', e);
  }
}
function _getToken() {
  return localStorage.getItem('ghToken') || '';
}
// ── P1 設定 sheet：Token 唯一 UI 入口（值只進 localStorage，永不進檔案）──
function _refreshTokenStatus() {
  var el = document.getElementById('tokenStatus');
  if (!el) return;
  var t = _getToken();
  // 遮罩顯示：只露尾 4 碼，避免螢幕側錄
  el.textContent = t ? ('已設定 ····' + t.slice(-4)) : '未設定';
  el.style.color = t ? '#4caf7d' : '#7a7468';
}
function openSettings() {
  document.getElementById('settingsOverlay').classList.add('show');
  document.getElementById('settingsSheet').classList.add('open');
  _refreshTokenStatus();
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
  document.getElementById('settingsSheet').classList.remove('open');
  var input = document.getElementById('settingsTokenInput');
  if (input) input.value = '';  // 關閉即清輸入框，不留殘值
}
function saveTokenFromSheet() {
  var input = document.getElementById('settingsTokenInput');
  var v = (input.value || '').trim();
  if (!v) { _refreshTokenStatus(); return; }
  try {
    localStorage.setItem('ghToken', v);
  } catch (e) {
    console.error('[settings] token write failed:', e);
  }
  input.value = '';
  _refreshTokenStatus();
}
function clearToken() {
  try { localStorage.removeItem('ghToken'); } catch (e) {}
  _refreshTokenStatus();
}
// Bug 6: surface sync errors to user via manage panel status
function _showSyncStatus(msg, isError) {
  var el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = isError ? '#e05c5c' : '#4caf7d';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.textContent = ''; }, 3000);
}
// ── 即時觸發：sync 成功後踩 workflow_dispatch，讓 Action 立刻抓新清單價格 ──
// workflow id 用 API 依名稱查一次後快取（不硬編 yml 檔名）。
// 需 PAT 具 Actions: Read and write；無權限時 403 → 靜默降級，同步仍成功。
let _workflowId = null;
async function _triggerWorkflow(token) {
  const OWNER = 'mjtsai-code', REPO = 'STOCK_ALERT';
  const WF_NAME = '美股數據更新與情報推送';
  const H = { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' };
  try {
    if (!_workflowId) {
      const r = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/actions/workflows', { headers: H });
      if (!r.ok) { console.warn('[dispatch] list workflows', r.status); return false; }
      const j = await r.json();
      const wf = (j.workflows || []).find(function(w) { return w.name === WF_NAME; });
      if (!wf) { console.warn('[dispatch] workflow not found:', WF_NAME); return false; }
      _workflowId = wf.id;
    }
    const d = await fetch(
      'https://api.github.com/repos/' + OWNER + '/' + REPO + '/actions/workflows/' + _workflowId + '/dispatches',
      { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, H),
        body: JSON.stringify({ ref: 'main' }) }
    );
    if (d.status !== 204) console.warn('[dispatch] fire failed', d.status, d.status === 403 ? '（PAT 缺 Actions 權限？）' : '');
    return d.status === 204;
  } catch (e) {
    console.warn('[dispatch] error:', e);
    return false;
  }
}
// Bug 2: returns Promise so callers can await before rebuilding UI
// In-flight guard + trailing flush: 進行中收到新請求不再丟棄（會掉最後一筆
// 變更），改記 dirty 旗標，本輪結束自動補跑一輪，帶上當下最新 STOCKS。
let _syncInFlight = false;
let _syncDirty = false;
async function _syncGitHub() {
  if (_syncInFlight) { _syncDirty = true; return; }
  _syncInFlight = true;
  const token = _getToken();
  if (!token) { _syncInFlight = false; return; }
  const OWNER = 'mjtsai-code', REPO = 'STOCK_ALERT', PATH = 'stock_data.json';
  try {
    const metaRes = await fetch(
      'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + PATH,
      { headers: { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' } }
    );
    if (!metaRes.ok) {
      const status = metaRes.status;
      const hint = status === 401 ? '（Token 已過期）' : status === 409 ? '（衝突，請稍後再試）' : '';
      _showSyncStatus('同步失敗 ' + status + hint, true);
      console.warn('[syncGitHub] HTTP', status);
      return;
    }
    const meta = await metaRes.json();
    const decoded = meta.content.split('\n').join('');
    const current = JSON.parse(atob(decoded));
    current.stocks = STOCKS.map(function(s) { return s.sym; });
    const putRes = await fetch(
      'https://api.github.com/repos/' + OWNER + '/' + REPO + '/contents/' + PATH,
      {
        method: 'PUT',
        headers: { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: '📊 更新自選股清單',
          content: btoa(unescape(encodeURIComponent(JSON.stringify(current, null, 2)))),
          sha: meta.sha
        })
      }
    );
    if (!putRes.ok) {
      _showSyncStatus('同步寫入失敗 ' + putRes.status, true);
      console.warn('[syncGitHub] PUT failed', putRes.status);
    } else {
      const fired = await _triggerWorkflow(token);
      _showSyncStatus(fired ? '✓ 已同步，資料更新中（約 2–4 分鐘）' : '✓ 已同步至 GitHub', false);
    }
  } catch (e) {
    _showSyncStatus('同步錯誤（網路？）', true);
    console.warn('[syncGitHub] error:', e);
  } finally {
    _syncInFlight = false;
    if (_syncDirty) {
      _syncDirty = false;
      _syncGitHub();  // 補同步：PUT body 於執行時讀 STOCKS，必為最新清單
    }
  }
}
// Bug 4: safe DOM id — replace special chars for card-{id}
function _safeId(sym) {
  return sym.replace(/[^A-Z0-9]/g, '_');
}
// ── P0 XSS 防護：外部資料（Yahoo 新聞）進 innerHTML 前必經 ──
// headline/source 來自 yfinance 抓的外部標題，未跳脫時一則含
// <img onerror=...> 的標題即可執行任意 JS → 讀走 localStorage token。
function _escapeHtml(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
// URL 協議白名單：擋 javascript: / data: 等可執行協議
function _safeUrl(u) {
  if (typeof u !== 'string') return '#';
  const t = u.trim();
  if (t === '#' || /^https?:\/\//i.test(t)) return t;
  return '#';
}
// _renderManageList() removed — deletion moved to bottom action bar (batch)
// ── 搜尋新增：本地字庫比對 ─────────────────────────────
// symbols.json（月更 workflow 產出，NASDAQ Trader 官方清單 ~1 萬檔）
// 與頁面同源伺服 → 零 CORS。首次搜尋時懶載入，之後每個按鍵皆為
// 記憶體即時比對：代號前綴 + 公司名子字串，可像 demo 一樣用名字搜。
// 字庫載入失敗（檔案尚未生成/網路）→ fail-open：顯示 ⚠ 仍可加入，
// 由後端「查無此代號」防呆兜底。
let _symLib = null;        // null=未載入 | 'loading' | 'failed' | Map(sym -> name)
const _SYM_SAFE_RE = /^[A-Z0-9.\-^$]{1,12}$/;  // 進 inline onclick 前的白名單
async function _loadSymLib() {
  if (_symLib instanceof Map || _symLib === 'loading') return;
  _symLib = 'loading';
  try {
    const res = await fetch('./symbols.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const arr = await res.json();
    const m = new Map();
    if (Array.isArray(arr)) {
      arr.forEach(function(row) {
        if (Array.isArray(row) && _SYM_SAFE_RE.test(String(row[0]))) {
          m.set(String(row[0]), String(row[1] || row[0]));
        }
      });
    }
    if (m.size === 0) throw new Error('empty library');
    _symLib = m;
    console.info('[symLib] 字庫載入完成:', m.size, '筆');
  } catch (e) {
    console.warn('[symLib] 字庫載入失敗，fail-open:', e);
    _symLib = 'failed';
  }
  _renderSearch();  // 載入結束後刷新當前搜尋畫面
}
function _renderSearch() {
  var input = document.getElementById('searchInput');
  var results = document.getElementById('searchResults');
  if (!input || !results) return;
  var raw = input.value.trim();
  var q = raw.toUpperCase();
  var sym = q.replace(/[^A-Z0-9._^]/g, '');
  if (!q) { results.innerHTML = ''; return; }
  if (STOCKS.length >= MAX_STOCKS) {
    results.innerHTML = '<div class="res-empty">已達上限 ' + MAX_STOCKS + ' 支</div>';
    return;
  }
  if (_symLib === null || _symLib === 'loading') {
    results.innerHTML = '<div class="res-empty">載入代號字庫中…</div>';
    _loadSymLib();
    return;
  }
  if (_symLib === 'failed') {
    // fail-open：無字庫可查，格式合法即允許加入，後端防呆兜底
    var validTicker = /^[A-Z^][A-Z0-9._^]{0,11}$/.test(sym);
    if (!sym || !validTicker) {
      results.innerHTML = '<div class="res-empty">代號格式無效</div>';
      return;
    }
    if (STOCKS.find(function(s) { return s.sym === sym; })) {
      results.innerHTML = '<div class="res-empty">「' + sym + '」已在自選清單中</div>';
      return;
    }
    results.innerHTML =
      '<div class="res-row"><div><span class="r-sym">' + sym + '</span>' +
      '<div class="r-name" style="color:#a08a5a;">⚠ 字庫無法載入，未驗證即加入，若查無將標示於卡片</div>' +
      '</div><button class="add-btn" onclick="_addStockFromSearch(\'' + sym + '\')">＋ 加入</button></div>';
    return;
  }
  // ── 字庫比對：代號前綴優先，公司名子字串次之，最多 6 筆 ──
  var hits = [];
  var nameHits = [];
  _symLib.forEach(function(name, s) {
    if (hits.length >= 6) return;
    if (s === q || s.indexOf(q) === 0) hits.push([s, name]);
    else if (nameHits.length < 6 && q.length >= 2 && name.toUpperCase().indexOf(q) !== -1) nameHits.push([s, name]);

    document.getElementById(`phase-label-${sym}`).textContent = '查無';
    setPriceDirect(sym, '—');
    document.getElementById(`main-chg-${sym}`).innerHTML =
      '<span style="color:#e05c5c;">查無此代號 · 按「編輯」可移除</span>';
    const ps = cardEl?.querySelector('.price-section');
    if (ps) ps.classList.remove('light-up', 'light-down');
    const errBadge = document.getElementById(`badge-${sym}`);
    if (errBadge) errBadge.classList.remove('show');
    const errSubRow = document.getElementById(`sub-row-${sym}`);
    if (errSubRow) { errSubRow.style.visibility = 'hidden'; errSubRow.style.display = ''; }
    return;
  }
  if (cardEl) cardEl.classList.remove('card-error');
  document.getElementById(`phase-label-${sym}`).textContent = d.phaseLabel;
  flipPriceCard(sym, d.valStr);
  lastPhase[sym] = d.phase;
  document.getElementById(`main-chg-${sym}`).innerHTML =
    `<span class="${d.dir}">${d.sg} ${Math.abs(d.mc).toFixed(2)} (${Math.abs(d.mct).toFixed(2)}%)</span>`;
  const priceSection = document.querySelector(`#card-${_safeId(sym)} .price-section`);
  if (priceSection) {
    priceSection.classList.remove('light-up', 'light-down');
    if (d.lightClass) priceSection.classList.add(d.lightClass);
  }
  // 相位標示統一放在卡片右上角。原本只有盤前/盤後才顯示，現在「現價」也一併
  // 收進同一個 badge —— 兩者本來就是同一份資料（phaseLabelMap）的兩種呈現。
  // 咖啡色面板左上的 .phase-corner-label 已改為視覺隱藏，但 DOM 與文字更新
  // 都保留：toggleCard() 會讀它的 textContent 決定展開頁的大標，不可移除。
  const badge = document.getElementById(`badge-${sym}`);
  badge.textContent = d.phaseLabel;
  badge.classList.add('show');   // 現價 / 盤前 / 盤後 共用同一組 .tag-post 樣式
  const subRow   = document.getElementById(`sub-row-${sym}`);
  const subLabel = document.getElementById(`sub-label-${sym}`);
  const subEl    = document.getElementById(`sub-${sym}`);
  const subChgEl = document.getElementById(`sub-chg-${sym}`);
  if (d.isExt) {
    subRow.style.visibility = 'visible'; subRow.style.display = 'flex';
    subLabel.textContent = '收盤';
    subEl.textContent = `$${d.regular.toFixed(2)}`;
    subChgEl.innerHTML = `<span class="${d.rd}">${d.rsg} ${Math.abs(d.rc).toFixed(2)} (${Math.abs(d.rp).toFixed(2)}%)</span>`;
  } else {
    subRow.style.visibility = 'hidden'; subRow.style.display = '';
  }
}
// ── buildGrid() 重建後立即從快取回填價格/新聞，不等下一輪輪詢 ──
// 修復：新增/刪除卡片時全部卡片閃回 '—' 需等最久 60s 的問題。
function _renderAllFromCache() {
  const cache = window._lastStockData;
  if (!cache) return;
  STOCKS.forEach(function(s) {
    const data = cache[s.sym];
    if (data?.quote) renderPrice(s.sym, data.quote);
    if (data?.news)  renderNews(s.sym, data.news);
  });
}
// ── BUG 2 修復：跨裝置清單同步 ─────────────────────────────
// GitHub 的 stocks 欄位 = source of truth，localStorage 僅為快取。
// 防護：無 token（本機唯讀模式，remote 非本人清單語意）、sync 進行中
// （避免覆寫剛按下的新增）、卡片展開/編輯中（避免重建 DOM 打斷互動）
// 皆跳過，交給下一輪輪詢。
function _reconcileStocks(remoteSyms) {
  if (!Array.isArray(remoteSyms) || remoteSyms.length === 0) return;
  if (!_getToken()) return;
  if (_syncInFlight || expandedSym || _globalEdit || cardState !== 'idle') return;
  const localSyms = STOCKS.map(function(s) { return s.sym; });
  if (JSON.stringify(localSyms) === JSON.stringify(remoteSyms)) return;
  const bySym = {};
  STOCKS.forEach(function(s) { bySym[s.sym] = s; });
  STOCKS = remoteSyms
    .filter(function(sym) { return /^[A-Z0-9._^]{1,12}$/.test(sym); })
    .map(function(sym) { return bySym[sym] || { sym: sym, name: sym, ex: '' }; });
  _saveStocks();
  buildGrid();
  _renderAllFromCache();
  console.info('[reconcile] 清單已對齊 GitHub:', remoteSyms.join(','));
}
// Precise-refresh timer handle — cancelled and reset on every successful load.
let _nextUpdateTimer = null;
async function loadData() {
  try {
    const res  = await fetch('./stock_data.json?t=' + Date.now());
    const json = await res.json();
    window._lastStockData = json.data || {};
    _reconcileStocks(json.stocks);
    let _nameDirty = false;
    STOCKS.forEach((s) => {
      const data = json.data?.[s.sym];
      // BUG 3: 後端 name 回填。僅當本地 name 仍是佔位符（=== sym）時採用，
      // 手寫策展名（'Google C'、'TSMC'…）永不被覆蓋。
      if (data?.name && s.name === s.sym && data.name !== s.sym) {
        s.name = data.name;
        _nameDirty = true;
        const nameEl = document.querySelector(`#card-${_safeId(s.sym)} .card-name`);
        if (nameEl) nameEl.textContent = s.name;
      }
      if (data?.quote) renderPrice(s.sym, data.quote);
      if (data?.news)  renderNews(s.sym, data.news);
    });
    if (_nameDirty) _saveStocks();
    // Schedule a precise refresh at the next expected update time.
    // Falls back to the 60-second polling interval if field is absent or stale.
    if (_nextUpdateTimer) clearTimeout(_nextUpdateTimer);
    const nextAt = json.next_update_at ? Date.parse(json.next_update_at) : NaN;
    const msUntilNext = nextAt - Date.now();
    if (msUntilNext > 0 && msUntilNext < 35 * 60 * 1000) {
      // Only arm if the target is in the future and within 35 min (sanity cap).
      _nextUpdateTimer = setTimeout(loadData, msUntilNext);
    }
  } catch(e) { console.error(e); }
}
function renderNews(sym, newsList) {
  const el = document.getElementById(`news-list-${sym}`);
  if (!el) return;
  el.innerHTML = newsList.length
    ? newsList.map(n =>
        `<a class="news-item" href="${_escapeHtml(_safeUrl(n.url))}" target="_blank" rel="noopener noreferrer">
           <div class="news-headline">${_escapeHtml(n.headline)}</div>
           <div class="news-source">${_escapeHtml(n.source)}</div>
         </a>`).join('')
    : `<div class="news-source">暫無相關新聞</div>`;
}
let collapsingViaBack = false;
window.addEventListener('popstate', () => {
  if (expandedSym && cardState !== 'closing') {
    collapsingViaBack = true;
    toggleCard(expandedSym, '');
  }
});
buildGrid();
loadData();
setInterval(loadData, 60000);
</script>
