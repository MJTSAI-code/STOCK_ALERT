<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<meta name="theme-color" content="#0a0a0f">
<title>盤前情報</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #c8ff00; --accent2: #00d4ff; --text: #e8e8f0;
    --muted: #5a5a7a; --up: #39ff8a; --down: #ff4d6d; --discord: #5865F2;
  }
  html, body { overflow-x: hidden; width: 100%; min-height: 100%; margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; scroll-behavior: smooth; }
  * { box-sizing: inherit; }
  body { padding-bottom: 24px; max-width: 1200px; margin: 0 auto; }
  
  header, .hero, .control-strip { padding: 16px 16px 0; display: flex; align-items: center; justify-content: space-between; }
  header { padding-top: 18px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .clock, .hero-sub, .status-label, .card-price-chg, .card-news-item .news-time, .detail-news-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .hero { padding-bottom: 10px; }
  .hero-time { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; line-height: 1; }
  .hero-time span { color: var(--accent); }
  .hero-sub { margin-top: 4px; }
  
  .control-strip { padding-bottom: 14px; }
  .status-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-dot.pulsing { animation: blink 2s infinite; }
  .status-label { font-size: 10px; color: var(--accent); }
  .refresh-btn { background: rgba(0,212,255,0.1); border: 1px solid var(--accent2); border-radius: 100px; padding: 6px 14px; font-size: 11px; color: var(--accent2); cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 14px; padding: 0 12px 12px; width: 100%; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: border-color 0.2s ease, transform 0.2s ease; min-height: 105px; display: flex; flex-direction: column; justify-content: space-between; -webkit-tap-highlight-color: transparent; width: 100%; overflow: hidden; }
  .card.expanded { grid-column: 1 / -1 !important; border-color: var(--accent2); cursor: default; }
  
  .card-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
  .card-sym-wrapper { display: flex; align-items: center; gap: 8px; }
  .card-sym { font-family: 'DM Mono', monospace !important; font-size: 22px !important; font-weight: 700 !important; color: var(--accent2) !important; line-height: 1.1; }
  .market-badge { font-size: 9px; font-weight: 700; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; background: rgba(200, 255, 0, 0.08); display: none; }
  
  .card-name { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .card-price-num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; }
  .card-price-chg { font-size: 11px; margin-top: 2px; }
  .up { color: var(--up) !important; } .down { color: var(--down) !important; } .neutral { color: var(--muted); }
  
  .card-news { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; pointer-events: none; width: 100%; }
  .card.expanded .card-news { display: none; }
  .card-news-item { font-size: 11px; color: var(--text); line-height: 1.6; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; }
  .card-news-item:last-child { border-bottom: none; }
  
  .card-detail { display: none; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; cursor: default; width: 100%; }
  .card.expanded .card-detail { display: block; }
  
  .chart-box { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); height: 260px; margin-bottom: 16px; background: var(--bg); width: 100%; position: relative; cursor: pointer; }
  .chart-box iframe { width: 100%; height: 100%; border: none; display: block; pointer-events: none; }
  .chart-box.active iframe { pointer-events: auto; }
  
  .detail-news-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; text-decoration: none; display: block; -webkit-tap-highlight-color: transparent; width: 100%; transition: border-color 0.2s; }
  .detail-news-title { font-size: 13px; color: var(--text); line-height: 1.5; }
  .detail-news-item:active, .detail-news-item:hover { border-color: var(--accent2); background: rgba(0, 212, 255, 0.04); }
  
  .discord-box { margin: 12px 12px; padding: 16px; background: rgba(88,101,242,0.03); border: 1px solid rgba(88,101,242,0.15); border-radius: 16px; display: flex; flex-direction: column; gap: 10px; }
  .discord-title { font-size: 12px; font-weight: 500; color: #5865F2; display: flex; align-items: center; gap: 6px; }
  .discord-text { font-size: 11px; color: var(--muted); line-height: 1.8; }
  .discord-highlight { color: var(--accent); border: 1px solid var(--accent); border-radius: 100px; padding: 1px 6px; font-size: 10px; background: rgba(200, 255, 0, 0.05); }
  .discord-btn-group { display: flex; flex-direction: column; gap: 8px; }
  .discord-btn { width: 100%; padding: 12px; background: var(--discord); color: #fff; border: none; border-radius: 12px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
  .discord-btn-join { background: transparent; border: 1.5px solid var(--discord); }
  
  .notice { margin: 0 12px; padding: 10px 12px; background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 10px; font-size: 10px; color: var(--accent2); line-height: 1.7; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  @media (min-width: 600px) {
    header, .hero, .control-strip { padding: 16px 20px 0; }
    .hero-time { font-size: 48px; }
    .grid { padding: 0 20px 20px; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .discord-box, .notice { margin: 0 20px 12px; }
    .discord-btn-group { flex-direction: row; }
    .discord-btn { flex: 1; }
    .chart-box { height: 380px; }
  }
  
  @media (min-width: 1024px) { 
    .grid { gap: 16px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); } 
    .chart-box { height: 460px; } 
  }
</style>
</head>
<body>

<header>
  <div class="logo">盤前情報 · PRO</div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="hero">
  <div>
    <div class="hero-time" id="heroTime">--<span>:</span>--</div>
    <div class="hero-sub" id="heroDate">載入中...</div>
  </div>
</div>

<div class="control-strip">
  <div class="status-chip">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-label" id="update-status">正在巡檢紐約市場時區...</div>
  </div>
  <div class="refresh-btn" onclick="manualRefresh()">🔄 重新載入</div>
</div>

<div class="grid" id="grid"></div>

<div class="discord-box">
  <div class="discord-title"><span>🛡️</span> 24H 雲端自動推送已部署</div>
  <div class="discord-text">
    無須開啟網頁，GitHub 雲端將於每日美股收盤後 <span class="discord-highlight">05:18</span> 與晚間盤前 <span class="discord-highlight">17:18</span> 自動提前避堵抓取，並於 30 分精準推送至頻道。
  </div>
  <div class="discord-btn-group">
    <a class="discord-btn" href="https://discord.gg/vzVbybVvys" target="_blank">📱 進入我的美股精選情報室</a>
    <a class="discord-btn discord-btn-join" href="https://discord.gg/vzVbybVvys" target="_blank">⚡ 訂閱我的美股推送播報</a>
  </div>
</div>

<div class="notice">
  📌 提示：網頁已啟用 PWA 離線技術，數據源已安全移至 GitHub Actions 雲端。
</div>

<script>
const STOCKS = [
  { sym: 'NOW',  name: 'ServiceNow',   ex: 'NYSE' },
  { sym: 'NVDA', name: 'Nvidia',       ex: 'NASDAQ' },
  { sym: 'LITE', name: 'Lumentum',     ex: 'NASDAQ' },
  { sym: 'ONDS', name: 'Ondas 無人機', ex: 'NASDAQ' },
  { sym: 'MRVL', name: 'Marvell',      ex: 'NASDAQ' },
  { sym: 'GOOG', name: 'Google C',     ex: 'NASDAQ' },
];

const FALLBACK_NEWS = {
  NOW:  [{ title: "AI 自動化平台需求強勁，NOW 獲矽谷科技核心長線資金增持", src: "機構調研", url: "javascript:void(0);" }],
  NVDA: [{ title: "輝達晶片供應鏈產能與出貨大追蹤：多頭排列均線支撐力道強勁", src: "科技半導體", url: "javascript:void(0);" }],
  LITE: [{ title: "Lumentum 光通訊模組需求看漲：追蹤高速網路元件最新拉貨潮", src: "光通訊專欄", url: "javascript:void(0);" }],
  ONDS: [{ title: "Ondas 無人機防禦與軍工訂單追蹤：多空量能與核心均線變動", src: "特種工業", url: "javascript:void(0);" }],
  MRVL: [{ title: "Marvell 客製化晶片與 ASIC 訂單火熱：網通板塊技術突破", src: "半導體情報", url: "javascript:void(0);" }],
  GOOG: [{ title: "Google 核心搜尋與 AI 廣告整合成效：流量變現與用戶黏著度", src: "網路巨頭", url: "javascript:void(0);" }]
};

let expandedSym = null;
let globalDataCache = null;
let isFirstLoad = true; 
let liveIntervalId = null;

function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('heroTime').innerHTML = `${pad(now.getHours())}<span>:</span>${pad(now.getMinutes())}`;
  document.getElementById('heroDate').textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} 週${['日','一','二','三','四','五','六'][now.getDay()]}`;
  
  manageUpdateLifecycleByNY();
}
setInterval(updateClock, 1000);
updateClock();

function getNYMarketStatus() {
  const now = new Date();
  const nyStr = now.toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour12: false });
  const nyDateStr = now.toLocaleDateString('en-US', { timeZone: 'America/New_York' });
  
  const [nyHour, nyMin, nySec] = nyStr.split(':').map(Number);
  const totalNyMinutes = nyHour * 60 + nyMin;
  const nyDay = new Date(nyDateStr).getDay();

  let isWeekend = (nyDay === 0 || nyDay === 6);
  let isRegularMarketOpen = false;
  let phaseLabel = "";

  if (totalNyMinutes >= 240 && totalNyMinutes < 570) {
    phaseLabel = "盤前";
  }
  else if (totalNyMinutes >= 570 && totalNyMinutes < 960) {
    phaseLabel = ""; 
    if (!isWeekend) isRegularMarketOpen = true; 
  }
  else if (totalNyMinutes >= 960 && totalNyMinutes < 1200) {
    phaseLabel = "盤後";
  }

  return { isRegularMarketOpen, phaseLabel };
}

function manageUpdateLifecycleByNY() {
  const { isRegularMarketOpen } = getNYMarketStatus();
  const dotEl = document.getElementById('status-dot');
  const labelEl = document.getElementById('update-status');

  if (isRegularMarketOpen) {
    if (dotEl) dotEl.className = "status-dot pulsing";
    if (!liveIntervalId) {
      if (labelEl) labelEl.textContent = "美股盤中：即時更新中...";
      liveIntervalId = setInterval(loadCloudData, 60000); 
    }
  } else {
    if (dotEl) dotEl.className = "status-dot";
    if (liveIntervalId) {
      clearInterval(liveIntervalId);
      liveIntervalId = null;
    }
    if (labelEl && !isFirstLoad && !labelEl.textContent.includes("失敗")) {
      const lastT = new Date();
      labelEl.textContent = `休市定格模式 (${String(lastT.getHours()).padStart(2,'0')}:${String(lastT.getMinutes()).padStart(2,'0')}存檔)`;
    }
  }
}

function parseJsonStockNews(stockObj, sym) {
  if (!stockObj || !Array.isArray(stockObj.news)) return FALLBACK_NEWS[sym] || [];
  
  const cleanItems = stockObj.news.map(item => {
    const title = item.headline ? String(item.headline).trim() : "";
    let url = item.url ? String(item.url).trim() : "#";
    if (url === "#" || url === "" || url.toLowerCase() === "null") {
      url = "javascript:void(0);";
    }
    const source = item.source || "今日即時";
    let rawTime = item.datetime;
    let dateObj = new Date();
    if (rawTime) {
      if (rawTime < 9999999999) rawTime *= 1000;
      dateObj = new Date(rawTime);
    }
    return { title, url, source, datetime: dateObj };
  }).filter(item => {
    if (!item.title || item.title.length < 3) return false;
    const t = item.title;
    return !t.includes("無新聞") && !t.includes("無標題") && !t.includes("沒有相關新聞") && !t.includes("null") && !t.includes("無新聞標題");
  });

  return cleanItems.length > 0 ? cleanItems : (FALLBACK_NEWS[sym] || []);
}

function buildGrid() {
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}" onclick="toggleCard('${s.sym}','${s.ex}', event)">
      <div class="card-top">
        <div>
          <div class="card-sym-wrapper"><div class="card-sym">${s.sym}</div><div class="market-badge" id="badge-${s.sym}">盤前</div></div>
          <div class="card-name">${s.name}</div>
        </div>
        <div class="card-price">
          <div class="card-price-num neutral" id="price-${s.sym}">$...</div>
          <div class="card-price-chg neutral" id="chg-${s.sym}">--</div>
        </div>
      </div>
      <div class="card-news" id="news-${s.sym}"><div class="card-news-item">📡 正在接收即時市場資訊...</div></div>
      <div class="card-detail" id="detail-${s.sym}">
        <div class="chart-box" onclick="activateChart(this, event)">
          <iframe id="chart-${s.sym}" src="" allowtransparency="true"></iframe>
        </div>
        <div class="detail-news" id="detail-news-${s.sym}"></div>
      </div>
    </div>
  `).join('');
}

function activateChart(boxEl, event) {
  event.stopPropagation(); 
  boxEl.classList.add('active');
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.chart-box')) {
    document.querySelectorAll('.chart-box.active').forEach(b => b.classList.remove('active'));
  }
});

function toggleCard(sym, ex, event) {
  if (event.target.closest('.card-detail')) return; 
  
  const card = document.getElementById(`card-${sym}`);
  if (!card) return;
  const isExp = card.classList.contains('expanded');
  
  if (expandedSym && expandedSym !== sym) {
    const prevCard = document.getElementById(`card-${expandedSym}`);
    if (prevCard) {
      prevCard.classList.remove('expanded');
      const prevIframe = document.getElementById(`chart-${expandedSym}`);
      if (prevIframe) prevIframe.src = '';
    }
  }

  if (!isExp) {
    window.location.hash = "expanded-" + sym;
    card.classList.add('expanded');
    expandedSym = sym;

    const iframe = document.getElementById(`chart-${sym}`);
    if (iframe) {
      iframe.src = `https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW`;
    }
    
    renderDetailNews(sym);
    setTimeout(() => { card.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 120);

  } else {
    card.classList.remove('expanded');
    expandedSym = null;
    const iframe = document.getElementById(`chart-${sym}`);
    if (iframe) iframe.src = '';
    
    if (window.location.hash.includes("expanded")) {
      history.replaceState("", document.title, window.location.pathname + window.location.search);
    }
    setTimeout(() => { card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
  }
}

function renderDetailNews(sym) {
  const box = document.getElementById('detail-news-' + sym);
  if (!box) return;
  
  const sData = globalDataCache?.[sym];
  const cleanItems = parseJsonStockNews(sData, sym);
  
  if (cleanItems.length > 0) {
    box.innerHTML = cleanItems.slice(0, 1).map(item => `
      <a class="detail-news-item" href="${item.url}" ${item.url.startsWith('http') ? 'target="_blank" rel="noopener noreferrer"' : ''} onclick="event.stopPropagation();">
        <div class="detail-news-title">📰 ${item.title}</div>
        <span class="detail-news-meta">${item.datetime.getMonth()+1}/${item.datetime.getDate()} ${String(item.datetime.getHours()).padStart(2,'0')}:${String(item.datetime.getMinutes()).padStart(2,'0')} · ${item.source}</span>
      </a>
    `).join('');
  } else {
    box.innerHTML = `<div class="detail-news-item" style="cursor:default;"><div class="detail-news-title" style="color:var(--muted)">暫無最新推播新聞細節</div></div>`;
  }
}

window.addEventListener('hashchange', function() {
  if (!window.location.hash && expandedSym) {
    const card = document.getElementById(`card-${expandedSym}`);
    if (card) card.classList.remove('expanded');
    const iframe = document.getElementById(`chart-${expandedSym}`);
    if (iframe) iframe.src = '';
    setTimeout(() => { if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50);
    expandedSym = null;
  }
});

async function loadCloudData() {
  let hasFetchError = false;
  try {
    const res = await fetch(`./stock_data.json?t=${Date.now()}`);
    const json = await res.json(); 
    globalDataCache = json?.data ?? {};
    
    const { phaseLabel } = getNYMarketStatus();

    STOCKS.forEach(s => {
      // 【單兵隔離艙：每隻股票解析各自獨立，保證不互相干擾卡死】
      try {
        const sData = globalDataCache[s.sym];
        if (!sData) return;
        
        const d = sData.quote || sData.price;
        const priceEl = document.getElementById(`price-${s.sym}`);
        const chgEl = document.getElementById(`chg-${s.sym}`);
        const badgeEl = document.getElementById(`badge-${s.sym}`);
        
        if (d && priceEl && chgEl) {
          const currentPrice = d.c !== undefined ? d.c : (d.price || 0);
          const change = d.d !== undefined ? d.d : (d.change || 0);
          const changePercent = d.dp !== undefined ? d.dp : (d.changePercent || 0);
          const cls = change >= 0 ? 'up' : 'down';
          const sign = change >= 0 ? '+' : '';
          
          priceEl.textContent = `$${Number(currentPrice).toFixed(2)}`;
          priceEl.className = `card-price-num ${cls}`;
          chgEl.textContent = `${sign}${Number(change).toFixed(2)} (${sign}${Number(changePercent).toFixed(2)}%)`;
          chgEl.className = `card-price-chg ${cls}`;
          
          if (badgeEl) {
            badgeEl.textContent = phaseLabel;
            badgeEl.style.display = phaseLabel ? "inline-block" : "none";
          }
        }
        
        if (isFirstLoad) {
          const newsBox = document.getElementById(`news-${s.sym}`);
          if (newsBox) {
            const cleanNews = parseJsonStockNews(sData, s.sym);
            if (cleanNews.length > 0) {
              newsBox.innerHTML = cleanNews.slice(0, 1).map(item => `
                <div class="card-news-item">
                  • ${item.title}
                  <div class="news-time">${item.datetime.getMonth()+1}/${item.datetime.getDate()} · ${item.source}</div>
                </div>
              `).join('');
            }
          }
        }
        
        if (expandedSym === s.sym && isFirstLoad) {
          renderDetailNews(s.sym);
        }
      } catch (innerError) {
        console.error(`[單兵解析跳過] 標的 ${s.sym} 資料不完整:`, innerError);
      }
    });
    
    isFirstLoad = false;
  } catch(e) {
    console.error("Cloud data fetch error:", e);
    hasFetchError = true;
    const labelEl = document.getElementById('update-status');
    if (labelEl) labelEl.textContent = "同步失敗，請點擊按鈕重試";
  } finally {
    if (!hasFetchError) {
      manageUpdateLifecycleByNY(); 
    }
  }
}

function manualRefresh() { 
  isFirstLoad = true; 
  loadCloudData(); 
}

buildGrid(); 
loadCloudData(); 
</script>
</body>
</html>
