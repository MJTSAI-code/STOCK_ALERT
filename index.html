<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美股情報 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #1c1a16;
    --card-frame: #d9cdb8;
    --card-border: #3a352c;
    --window: #4a5240;
    --window-edge: #2e3328;
    --window-shadow: #1a1d15;
    --digit: #f0c987;
    --text: #f0e8d8;
    --muted: #7a7468;
    --label: #b8ad96;
    --up: #00e676;
    --down: #ff1744;
    --accent: #d9cdb8;
    --knob: #8a6240;
    --badge-bg: #1a2a1a;
    --tag-green: #00c853;
    --tag-purple: #9c27b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Mono', monospace;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: #0d0d0d;
    border-bottom: 1px solid var(--card-frame);
  }
  .logo {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .hero-time {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 500;
    color: var(--digit);
    letter-spacing: 2px;
    line-height: 1;
    text-shadow: 0 0 12px rgba(240, 201, 135, 0.25);
  }
  .hero-date {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    margin-top: 2px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin: 16px;
  }
  @media(min-width: 640px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media(min-width: 1000px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  /* ── CARD ── */
  .card {
    background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
    border: 3px solid var(--card-frame);
    border-radius: 18px;
    padding: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    box-shadow:
      0 6px 0 rgba(0,0,0,0.5),
      0 10px 22px rgba(0,0,0,0.45),
      inset 0 2px 6px rgba(0,0,0,0.3);
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: #e8ddc8;
    box-shadow:
      0 8px 0 rgba(0,0,0,0.5),
      0 16px 26px rgba(0,0,0,0.5),
      inset 0 2px 6px rgba(0,0,0,0.3);
  }
  .card.expanded {
    cursor: default;
    grid-column: 1 / -1;
    border-color: #e8ddc8;
  }

  /* header row */
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .card-sym {
    font-size: 20px;
    font-weight: 700;
    color: var(--digit);
    letter-spacing: 1px;
  }
  .card-name {
    font-size: 10px;
    color: #aab09a;
    margin-top: 2px;
  }

  /* badges */
  .tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
  }
  .tag-post {
    background: #3a2a18;
    color: #e0b97d;
    border: 1px solid var(--knob);
    display: none;
  }
  .tag-post.show { display: inline-block; }

  /* price section — warm amber LCD screen, matching retro flip-clock display */
  .price-section {
    display: flex;
    flex-direction: column;
    background: linear-gradient(180deg, #e8a838 0%, #d4901f 100%);
    border: 1px solid rgba(0,0,0,0.25);
    border-radius: 10px;
    box-shadow: inset 0 1px 3px rgba(255,235,180,0.4), inset 0 -3px 10px rgba(0,0,0,0.18);
    overflow: hidden;
  }
  .price-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 14px;
  }
  .price-label {
    font-size: 10px;
    color: #6b4a14;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .price-value {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    color: #2c1d08;
    letter-spacing: 1px;
  }
  .change-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 6px;
    display: inline-block;
  }
  .up   { color: var(--up);   background: #00e67615; border: 1px solid #00e67630; }
  .down { color: var(--down); background: #ff174415; border: 1px solid #ff174430; }

  /* divider — superseded by price-row seam, hidden but kept in DOM */
  .divider {
    display: none;
  }

  /* ── CHART ── */
  .chart-container {
    display: none;
    margin-top: 14px;
    border: 1px solid var(--card-frame);
    border-radius: 10px;
    overflow: hidden;
    height: 420px;
    background: #000;
  }
  .card.expanded .chart-container { display: block; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

</style>
</head>
<body>

<div class="topbar">
  <div class="logo">美股情報 PRO</div>
  <div>
    <div class="hero-time" id="heroTime">00:00</div>
    <div class="hero-date" id="heroDate"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">YAHOO FINANCE · 點擊卡片展開圖表</div>

<script>
const STOCKS = [
  {sym:'NOW',  name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA', name:'Nvidia',     ex:'NASDAQ'},
  {sym:'LITE', name:'Lumentum',   ex:'NASDAQ'},
  {sym:'ONDS', name:'Ondas',      ex:'NASDAQ'},
  {sym:'MRVL', name:'Marvell',    ex:'NASDAQ'},
  {sym:'GOOG', name:'Google C',   ex:'NASDAQ'}
];

let expandedSym = null;

/* ── CLOCK ── */
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('heroTime').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('heroDate').textContent =
    `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${days[now.getDay()]}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ── BUILD GRID ── */
function buildGrid() {
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}" onclick="toggleCard('${s.sym}','${s.ex}')">
      <div class="card-header">
        <div>
          <div class="card-sym">${s.sym}</div>
          <div class="card-name">${s.name}</div>
        </div>
        <span class="tag tag-post" id="badge-${s.sym}">盤後</span>
      </div>

      <div class="price-section">
        <div class="price-row">
          <span class="price-label">收盤</span>
          <span class="price-value" id="reg-${s.sym}">—</span>
        </div>
        <hr class="divider">
        <div class="price-row">
          <span class="price-label">盤後</span>
          <span class="price-value" id="post-${s.sym}">—</span>
        </div>
        <div id="chg-${s.sym}"></div>
      </div>

      <div class="chart-container">
        <iframe id="chart-${s.sym}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  `).join('');
}

/* ── TOGGLE CHART ── */
function toggleCard(sym, ex) {
  const card = document.getElementById(`card-${sym}`);
  const isExpanded = card.classList.contains('expanded');

  if (expandedSym && expandedSym !== sym) {
    document.getElementById(`card-${expandedSym}`).classList.remove('expanded');
    document.getElementById(`chart-${expandedSym}`).src = '';
  }

  if (!isExpanded) {
    card.classList.add('expanded');
    expandedSym = sym;
    document.getElementById(`chart-${sym}`).src =
      `https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW`;
    setTimeout(() => {
      const rect = card.getBoundingClientRect();
      const cardCenter = rect.top + window.scrollY + rect.height / 2;
      const targetScroll = cardCenter - window.innerHeight / 2;
      window.scrollTo({ top: Math.max(0, targetScroll), behavior: 'smooth' });
    }, 50);
  } else {
    card.classList.remove('expanded');
    expandedSym = null;
    document.getElementById(`chart-${sym}`).src = '';
  }
}

/* ── RENDER PRICE ── */
function renderPrice(sym, q) {
  if (!q) return;
  const regular  = parseFloat(q.regular || q.c || 0);
  const post     = parseFloat(q.post || regular);
  const change   = post - regular;
  const pct      = regular ? (change / regular * 100) : 0;
  const isPost   = Math.abs(change) > 0.01;

  document.getElementById(`badge-${sym}`).classList.toggle('show', isPost);
  document.getElementById(`reg-${sym}`).textContent  = `$${regular.toFixed(2)}`;
  document.getElementById(`post-${sym}`).textContent = `$${post.toFixed(2)}`;

  const dir  = change >= 0 ? 'up' : 'down';
  const sign = change >= 0 ? '▲' : '▼';
  document.getElementById(`chg-${sym}`).innerHTML =
    `<span class="change-pill ${dir}">${sign} ${Math.abs(change).toFixed(2)} (${Math.abs(pct).toFixed(2)}%)</span>`;
}

/* ── LOAD DATA ── */
async function loadData() {
  try {
    const res  = await fetch('./stock_data.json?t=' + Date.now());
    const json = await res.json();
    STOCKS.forEach(s => {
      const data = json.data?.[s.sym];
      if (data && data.quote) renderPrice(s.sym, data.quote);
    });
  } catch(e) { console.error(e); }
}

buildGrid();
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
