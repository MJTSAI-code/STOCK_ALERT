<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美股情報 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0a05;
    --card: #2c1f14;
    --digit: #ffdd00;
    --accent: #ff6600;
    --up: #00ff99;
    --down: #ff3366;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg); 
    color:#ddd;
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh; 
    padding-bottom:40px;
  }

  /* 復古大時鐘 */
  .flip-clock {
    font-family: 'Press Start 2P', monospace;
    font-size: 82px;
    font-weight: 700;
    color: var(--digit);
    background: #1a140f;
    padding: 10px 30px;
    border: 8px solid #3d2a1f;
    border-radius: 12px;
    box-shadow: 0 12px 0 #000, inset 0 8px 20px rgba(0,0,0,0.95);
    text-shadow: 0 0 15px var(--accent);
    letter-spacing: 6px;
  }

  .topbar {
    text-align:center;
    padding:20px 10px 15px;
    background:#1a140f;
    border-bottom:6px solid #3d2a1f;
  }
  .logo {
    font-family:'Press Start 2P', monospace;
    font-size:17px; 
    color:#ffdd00; 
    letter-spacing:3px;
    margin-bottom:12px;
  }

  .grid {
    display:grid; 
    grid-template-columns:1fr; 
    gap:16px;
    margin:20px 16px;
  }
  @media(min-width:768px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(min-width:1100px){.grid{grid-template-columns:repeat(3,1fr);}}

  .card {
    background:var(--card); 
    border:6px solid #3d2a1f;
    border-radius:12px; 
    padding:18px; 
    position:relative;
    box-shadow:0 12px 0 #111;
  }

  .phase-badge {
    position:absolute; 
    top:12px; 
    right:12px;
    background:#3d1f4d;
    color:#ffccff;
    padding:5px 12px; 
    border-radius:4px;
    font-size:12px; 
    font-weight:700;
    display:none;
    align-items:center;
    gap:5px;
    box-shadow:0 3px 0 #000;
  }
  .phase-badge.show {
    display:flex;
  }

  .card-sym { 
    font-size:23px; 
    font-weight:700; 
    color:#ffdd99;
  }
  .card-name { 
    font-size:11px; 
    color:#888; 
    margin-bottom:12px;
  }

  .price-box {
    background:#111;
    border:4px solid #555;
    border-radius:8px;
    padding:8px 12px;
    margin:8px 0;
    font-family: 'Press Start 2P', monospace;
    font-size:29px;
    color:var(--digit);
    text-align:center;
    box-shadow:inset 0 6px 12px rgba(0,0,0,0.9);
  }

  .label {
    font-size:12px;
    color:#aaa;
    margin-bottom:4px;
  }

  .change {
    text-align:center;
    font-size:14px;
    margin-top:4px;
  }

  @keyframes flip {
    0% { transform: rotateX(0); }
    50% { transform: rotateX(85deg); }
    100% { transform: rotateX(0); }
  }
  .flipping { animation: flip 0.7s ease; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">美股情報 PRO</div>
  <div class="flip-clock" id="heroTime">07:25</div>
</div>

<div class="grid" id="grid"></div>

<div style="text-align:center; margin:30px 0; font-size:10px; color:#555;">
  📌 YAHOO FINANCE • 復古翻頁鬧鐘風格
</div>

<script>
const STOCKS = [
  {sym:'NOW', name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA',name:'Nvidia', ex:'NASDAQ'},
  {sym:'LITE',name:'Lumentum', ex:'NASDAQ'},
  {sym:'ONDS',name:'Ondas', ex:'NASDAQ'},
  {sym:'MRVL',name:'Marvell', ex:'NASDAQ'},
  {sym:'GOOG',name:'Google C', ex:'NASDAQ'}
];

function updateClock(){
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('heroTime').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
setInterval(updateClock, 1000);
updateClock();

function buildGrid(){
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}">
      <div class="phase-badge" id="badge-${s.sym}">
        🌙 盤後
      </div>
      <div class="card-sym">${s.sym}</div>
      <div class="card-name">${s.name}</div>
      
      <div class="label">收盤</div>
      <div class="price-box" id="reg-${s.sym}">$000.00</div>
      
      <div class="label">🌙 盤後</div>
      <div class="price-box" id="post-${s.sym}">$000.00</div>
      <div class="change" id="chg-${s.sym}"></div>
    </div>
  `).join('');
}

function renderPrice(sym, q){
  if(!q) return;
  
  const regular = parseFloat(q.regular || q.c || 0);
  const post = parseFloat(q.post || regular);
  const prevClose = parseFloat(q.prev_close || regular);
  
  const postChange = post - regular;
  const postPct = regular ? (postChange / regular * 100) : 0;

  const badge = document.getElementById(`badge-${sym}`);
  const isPost = q.phase === "盤後" || (post !== regular && post > 0);

  if(isPost){
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }

  const regEl = document.getElementById(`reg-${sym}`);
  const postEl = document.getElementById(`post-${sym}`);
  const chgEl = document.getElementById(`chg-${sym}`);

  regEl.classList.add('flipping');
  postEl.classList.add('flipping');
  setTimeout(() => { regEl.classList.remove('flipping'); postEl.classList.remove('flipping'); }, 800);

  regEl.textContent = `$${regular.toFixed(2)}`;
  postEl.textContent = `$${post.toFixed(2)}`;

  chgEl.innerHTML = `
    <span style="color:${postChange>=0 ? '#00ff99' : '#ff3366'}">
      ${postChange >= 0 ? '▲' : '▼'} ${postChange.toFixed(2)} (${postPct.toFixed(2)}%)
    </span>
  `;
}

async function loadData(){
  try {
    const res = await fetch('./stock_data.json?t=' + Date.now());
    const json = await res.json();
    STOCKS.forEach(s => {
      const data = json.data?.[s.sym];
      if(data && data.quote) renderPrice(s.sym, data.quote);
    });
  } catch(e) { console.error(e); }
}

buildGrid();
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
