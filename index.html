<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美股情報 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── RESET ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ─── TOKENS ─────────────────────────────────── */
:root {
  --bg:          #0a0a0a;
  --window:      #4a5240;
  --window-edge: #2e3328;
  --frame:       #d9cdb8;
  --digit:       #f0c987;
  --text:        #f0e8d8;
  --muted:       #7a7468;
  --up:          #00ff88;
  --down:        #ff4466;
  --accent:      #d9cdb8;
  --knob:        #8a6240;
  --lcd-bg:      #0e0c0a;
}

/* ─── BASE ───────────────────────────────────── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto Mono', monospace;
  min-height: 100vh;
  padding-bottom: 48px;
  -webkit-tap-highlight-color: transparent;
}
body.scroll-locked { overflow: hidden; }

/* ─── TOPBAR ─────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  background: #0d0d0d;
  border-bottom: 1px solid var(--frame);
  position: sticky; top: 0; z-index: 10;
}
.logo {
  font-size: 12px; font-weight: 700;
  color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
}
.topbar-right { text-align: right; }
.hero-time {
  font-family: 'DM Mono', monospace;
  font-size: 32px; font-weight: 500;
  color: var(--digit); letter-spacing: 2px; line-height: 1;
}
.hero-date { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ─── GRID ───────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 12px;
}
@media (min-width: 640px) {
  .grid { grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 16px; }
  .grid > .card { grid-column: span 2; }
}
@media (min-width: 1000px) {
  .grid { grid-template-columns: repeat(6, 1fr); }
  .grid > .card { grid-column: span 2; }
}

/* last-row centering (desktop only) */
.card.last-row-solo  { grid-column: 3 / 5; }
.card.last-row-pair-1 { grid-column: 2 / 4; }
.card.last-row-pair-2 { grid-column: 4 / 6; }

/* ─── CARD (COLLAPSED) ───────────────────────── */
/* 收合時 split 容器透明化，讓內部元素直接參與 .card 的 flex 排版 */
.card-body-split,
.card .split-left,
.card .split-right { display: contents; }

.card {
  background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
  border: 2px solid var(--frame);
  border-radius: 16px;
  padding: 12px;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow:
    0 5px 0 rgba(0,0,0,0.5),
    0 8px 20px rgba(0,0,0,0.45),
    inset 0 1px 4px rgba(0,0,0,0.3);
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
@media (min-width: 640px) {
  .card { padding: 16px; }
}
.card:hover {
  transform: translateY(-2px);
  border-color: #e8ddc8;
  box-shadow:
    0 7px 0 rgba(0,0,0,0.5),
    0 14px 24px rgba(0,0,0,0.5),
    inset 0 1px 4px rgba(0,0,0,0.3);
}
.card:active { transform: translateY(0); }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.card-sym { font-size: 15px; font-weight: 700; color: var(--digit); letter-spacing: 1px; }
.card-name { font-size: 9px; color: var(--muted); margin-top: 2px; }
@media (min-width: 640px) {
  .card-sym { font-size: 20px; }
  .card-name { font-size: 10px; }
}

.tag-post {
  font-size: 8px; font-weight: 700;
  padding: 2px 6px; border-radius: 4px;
  background: #3a2a18; color: #e0b97d;
  border: 1px solid var(--knob);
  display: none; white-space: nowrap;
}
.tag-post.show { display: inline-block; }
@media (min-width: 640px) {
  .tag-post { font-size: 10px; padding: 3px 8px; }
}

/* ─── LCD PRICE SECTION ──────────────────────── */
.price-section {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(180deg, #5a4422 0%, #3d2e16 100%);
  border-radius: 8px;
  padding: 3px;   /* 薄邊框：咖啡色只露 3px 邊框感 */
  flex: 1;
  text-align: center;
}
.phase-label {
  position: absolute; top: 7px; left: 9px; z-index: 2;
  font-size: 8px; font-weight: 700;
  color: #a08060; letter-spacing: 1px;
}
.phase-label.hide { display: none; }

/* 黑框填滿咖啡色內部，padding 給數字留夠的呼吸空間 */
.lcd-frame {
  background: var(--lcd-bg);
  border-radius: 5px;
  padding: 18px 12px 14px;
  width: 100%;
  box-shadow: inset 0 2px 12px rgba(0,0,0,0.8);
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}

/* ─── SPLIT-FLAP DIGIT ───────────────────────── */
.pf-wrap { perspective: 220px; display: flex; justify-content: center; }
.pf-stack { position: relative; height: 32px; width: 140px; }
@media (min-width: 640px) {
  .pf-stack { height: 40px; width: 200px; }
}
.pf-half {
  position: absolute; left: 0; right: 0; height: 50%;
  overflow: hidden; display: flex; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500;
  color: #ffd98a;
  background: transparent;
}
@media (min-width: 640px) { .pf-half { font-size: 32px; } }

/* mask replaces seam line — 48% overlap ensures no visible gap */
.pf-static-t {
  top: 0; align-items: flex-end;
  -webkit-mask-image: linear-gradient(180deg, black 48%, transparent 100%);
  mask-image: linear-gradient(180deg, black 48%, transparent 100%);
}
.pf-static-t span { transform: translateY(50%); }
.pf-static-b {
  bottom: 0; align-items: flex-start;
  -webkit-mask-image: linear-gradient(0deg, black 48%, transparent 100%);
  mask-image: linear-gradient(0deg, black 48%, transparent 100%);
}
.pf-static-b span { transform: translateY(-50%); }

.pf-front, .pf-back {
  position: absolute; left: 0; right: 0; height: 50%;
  overflow: hidden; display: flex; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500;
  color: #ffd98a; background: transparent;
  backface-visibility: hidden;
}
@media (min-width: 640px) { .pf-front, .pf-back { font-size: 32px; } }

.pf-front {
  top: 0; align-items: flex-end; transform-origin: bottom center; z-index: 5;
  -webkit-mask-image: linear-gradient(180deg, black 48%, transparent 100%);
  mask-image: linear-gradient(180deg, black 48%, transparent 100%);
}
.pf-front span { transform: translateY(50%); }
.pf-back {
  bottom: 0; align-items: flex-start; transform-origin: top center;
  transform: rotateX(90deg); z-index: 4;
  -webkit-mask-image: linear-gradient(0deg, black 48%, transparent 100%);
  mask-image: linear-gradient(0deg, black 48%, transparent 100%);
}
.pf-back span { transform: translateY(-50%); }
.pf-seam { display: none; }

/* colour classes */
.pf-half.color-up,  .pf-front.color-up,  .pf-back.color-up   { color: var(--up);   text-shadow: 0 0 14px rgba(0,255,136,0.6); }
.pf-half.color-down,.pf-front.color-down,.pf-back.color-down  { color: var(--down); text-shadow: 0 0 14px rgba(255,68,102,0.5); }

/* flip animations */
.pf-front.flipping { animation: pfFront 0.32s cubic-bezier(.5,0,.75,.3) forwards; }
@keyframes pfFront {
  0%   { transform: rotateX(0deg);   filter: brightness(1); }
  100% { transform: rotateX(-90deg); filter: brightness(0.4); }
}
.pf-back.flipping { animation: pfBack 0.30s cubic-bezier(.2,1,.4,1) 0.28s forwards; }
@keyframes pfBack {
  0%   { transform: rotateX(90deg);  filter: brightness(0.4); }
  65%  { transform: rotateX(-7deg);  filter: brightness(1.2); }
  100% { transform: rotateX(0deg);   filter: brightness(1); }
}

.main-change { font-size: 11px; font-weight: 700; margin-top: 4px; }
@media (min-width: 640px) { .main-change { font-size: 12px; } }

.ref-price {
  margin-top: 6px; padding-top: 6px;
  border-top: 1px solid rgba(255,255,255,0.08);
  width: 100%; font-size: 10px; color: #7a7060;
  display: flex; justify-content: center; gap: 5px; align-items: baseline;
  flex-wrap: wrap;
}
.ref-price .ref-tag { opacity: 0.7; font-size: 9px; }
.ref-price .ref-value { font-family: 'DM Mono', monospace; color: #8a7a60; }

/* up / down badge */
.up   { color: var(--up);   background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.25); border-radius: 3px; padding: 1px 4px; }
.down { color: var(--down); background: rgba(255,68,102,0.08); border: 1px solid rgba(255,68,102,0.25); border-radius: 3px; padding: 1px 4px; }

/* ─── RECENTLY VIEWED ────────────────────────── */
.card.recently-viewed {
  border-color: rgba(240,201,135,0.65);
  box-shadow:
    0 5px 0 rgba(0,0,0,0.5),
    0 8px 20px rgba(0,0,0,0.45),
    inset 0 1px 4px rgba(0,0,0,0.3),
    0 0 16px rgba(240,201,135,0.1);
}
.card.recently-viewed::after {
  content: '◉';
  position: absolute; top: 7px; right: 9px;
  font-size: 7px; color: rgba(240,201,135,0.75);
  text-shadow: 0 0 5px rgba(240,201,135,0.5);
  animation: rvPulse 2.4s ease-in-out infinite;
  pointer-events: none;
}
@keyframes rvPulse { 0%,100%{opacity:.8} 50%{opacity:.25} }

/* ─── GHOST PLACEHOLDER ──────────────────────── */
.card-ghost {
  border-radius: 16px;
  background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
  border: 2px solid var(--frame);
  opacity: 0.15;
  filter: blur(0.5px);
  pointer-events: none;
}

/* ─── OVERLAY ────────────────────────────────── */
.card-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 1000;
  opacity: 0; transition: opacity 0.3s;
}
.card-overlay.show { display: block; opacity: 1; }

/* ─── CARD EXPANDED ──────────────────────────── */
.card.expanded {
  cursor: default; position: fixed;
  top: 50%; left: 50%;
  width: min(1060px, calc(100vw - 20px));
  max-height: calc(100dvh - 20px);
  transform: translate(-50%, -50%);
  z-index: 1001;
  background: transparent; border: none; box-shadow: none; padding: 0;
  overflow: visible;
  animation: cardAppear 0.28s ease-out forwards;
}
@keyframes cardAppear {
  from { opacity: 0; transform: translate(-50%,-50%) scale(0.96); }
  to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}
.card.expanded.closing { animation: cardDisappear 0.24s ease-in forwards; }
@keyframes cardDisappear {
  from { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  to   { opacity: 0; transform: translate(-50%,-50%) scale(0.96); }
}

/* desktop: side-by-side */
.card.expanded .card-body-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  perspective: 1200px;
}

/* shared panel style */
.card.expanded .split-left,
.card.expanded .split-right {
  background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
  border: 2px solid var(--frame);
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  height: 460px;
  box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 12px 24px rgba(0,0,0,0.5);
}
.card.expanded .split-left  { display: flex; flex-direction: column; }
.card.expanded .split-right { display: flex; flex-direction: column; }

/* unroll animation */
.card.expanded .split-left,
.card.expanded .split-right {
  clip-path: inset(0 0 99% 0 round 12px);
  transform: scaleY(0.04);
  transform-origin: top center;
}
.card.expanded .split-left.panel-flap,
.card.expanded .split-right.panel-flap {
  animation: unrollDown 0.52s cubic-bezier(0.77,0,0.175,1) forwards;
}
@keyframes unrollDown {
  0%   { clip-path: inset(0 0 99% 0 round 12px); transform: scaleY(0.04); }
  100% { clip-path: inset(0 0 0%  0 round 12px); transform: scaleY(1); }
}

/* ─── CHART PANEL ────────────────────────────── */
.card.expanded .split-left .chart-container {
  flex: 1;
  height: auto !important; max-height: none !important;
  margin: 10px;
  border-radius: 6px; overflow: hidden;
  border: 1px solid rgba(217,205,184,0.2);
  background: #000;
  opacity: 0;
  transition: opacity 0.4s ease 0.25s;
}
.card.expanded .split-left .chart-container.show-chart { opacity: 1; }

/* ─── INFO PANEL ─────────────────────────────── */
.exp-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 16px 12px;
  border-bottom: 1px solid rgba(217,205,184,0.15);
  flex: none;
}
.exp-sym  { font-size: 22px; font-weight: 700; color: var(--digit); }
.exp-name { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* sf-wrap reveal */
.sf-wrap { position: relative; clip-path: inset(0 0 100% 0); }
.sf-wrap.reveal { animation: sfReveal 0.42s cubic-bezier(0.77,0,0.175,1) forwards; }
@keyframes sfReveal { to { clip-path: inset(0 0 0% 0); } }

/* expanded price stage */
.exp-price-stage {
  margin: 10px 12px 0;
  padding: 18px 14px 14px;
  background: linear-gradient(180deg, #1f1a12 0%, var(--lcd-bg) 100%);
  border-radius: 8px;
  text-align: center; position: relative;
  box-shadow: inset 0 2px 12px rgba(0,0,0,0.7);
}
.exp-phase-label {
  position: absolute; top: 7px; left: 10px;
  font-size: 8px; font-weight: 700; color: #6a6460; letter-spacing: 1px;
}
.exp-main-change { font-size: 13px; font-weight: 700; margin-top: 8px; }
.exp-ref-row {
  margin-top: 8px; padding-top: 7px;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 11px; color: var(--muted);
  overflow: hidden; perspective: 280px;
}
.exp-ref-inner {
  display: block;
  transform-origin: top center;
  transform: rotateX(-90deg);
  backface-visibility: hidden;
}
.exp-ref-inner.playing { animation: singleFlip 0.34s cubic-bezier(.2,1,.4,1) forwards; }
@keyframes singleFlip {
  0%   { transform: rotateX(-90deg); filter: brightness(0.5); }
  65%  { transform: rotateX(5deg);   filter: brightness(1.2); }
  100% { transform: rotateX(0deg);   filter: brightness(1); }
}

.exp-news-wrap {
  flex: 1; overflow-y: auto;
  margin: 10px 12px 12px;
  background: rgba(0,0,0,0.18);
  border: 1px solid rgba(217,205,184,0.12);
  border-radius: 6px;
  padding: 12px;
}
.exp-news-title {
  font-size: 10px; font-weight: 700; color: var(--frame);
  letter-spacing: 1px; margin-bottom: 8px;
}
.exp-news-item {
  display: block; padding: 8px 10px; margin-bottom: 6px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 5px; text-decoration: none;
  transition: background 0.12s;
}
.exp-news-item:hover { background: rgba(255,255,255,0.07); }
.exp-news-headline { font-size: 11px; color: var(--text); line-height: 1.5; }
.exp-news-source   { font-size: 9px;  color: var(--muted); margin-top: 3px; }

/* ─── MOBILE EXPANDED (≤ 720px) ──────────────── */
@media (max-width: 720px) {
  .card.expanded {
    width: calc(100vw - 14px);
    max-height: calc(100dvh - 14px);
    overflow-y: auto;
  }
  .card.expanded .card-body-split {
    grid-template-columns: 1fr;
    gap: 10px;
    perspective: none;
  }
  /* order: info top, chart middle, (news is inside info) */
  .card.expanded .split-right { order: -1; height: auto; min-height: 0; }
  .card.expanded .split-left  { order:  0; height: 260px; }

  .card.expanded .split-left .chart-container { margin: 8px; }
}

/* ─── FOOTER ─────────────────────────────────── */
.footer {
  text-align: center; margin-top: 28px;
  font-size: 9px; color: var(--muted); letter-spacing: 1px;
}

/* hidden by default – shown only when expanded */
.chart-container { display: none; }
.card.expanded .chart-container { display: block; }
.news-container { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">美股情報 PRO</div>
  <div class="topbar-right">
    <div class="hero-time" id="heroTime">00:00</div>
    <div class="hero-date" id="heroDate"></div>
  </div>
</div>

<div class="card-overlay" id="cardOverlay"></div>
<div class="grid" id="grid"></div>
<div class="footer">YAHOO FINANCE · 點擊卡片展開圖表</div>

<script>
/* ─── DATA ───────────────────────────────────── */
const STOCKS = [
  {sym:'NOW',  name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA', name:'Nvidia',     ex:'NASDAQ'},
  {sym:'LITE', name:'Lumentum',   ex:'NASDAQ'},
  {sym:'ONDS', name:'Ondas',      ex:'NASDAQ'},
  {sym:'MRVL', name:'Marvell',    ex:'NASDAQ'},
  {sym:'GOOG', name:'Google C',   ex:'NASDAQ'},
  {sym:'SPCX', name:'SpaceX',     ex:'NASDAQ'},
  {sym:'TSM',  name:'TSMC',       ex:'NYSE'},
  {sym:'MU',   name:'Micron',     ex:'NASDAQ'},
  {sym:'SNDK', name:'SanDisk',    ex:'NASDAQ'},
  {sym:'TSLA', name:'Tesla',      ex:'NASDAQ'},
];

/* ─── STATE ──────────────────────────────────── */
let expandedSym      = null;
let pendingTimers    = [];
let collapsingViaBack = false;

// Bug 2 fix: track first-load flag properly
let isFirstLoad = !sessionStorage.getItem('hasLoaded');
const lastPhase = {};

/* ─── CLOCK ──────────────────────────────────── */
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('heroTime').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('heroDate').textContent =
    `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${days[now.getDay()]}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ─── BUILD GRID ─────────────────────────────── */
function buildGrid() {
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}" onclick="toggleCard('${s.sym}','${s.ex}')">
      <div class="card-body-split">
        <div class="split-left">
          <div class="chart-container">
            <iframe id="chart-${s.sym}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
          </div>
        </div>
        <div class="split-right">
          <div class="card-header">
            <div>
              <div class="card-sym">${s.sym}</div>
              <div class="card-name">${s.name}</div>
            </div>
            <span class="tag-post" id="badge-${s.sym}">盤後</span>
          </div>
          <div class="price-section">
            <span class="phase-label" id="phase-label-${s.sym}">現價</span>
            <div class="lcd-frame">
              <div class="pf-wrap">
                <div class="pf-stack">
                  <div class="pf-half pf-static-t" id="pf-st-${s.sym}"><span>—</span></div>
                  <div class="pf-half pf-static-b" id="pf-sb-${s.sym}"><span>—</span></div>
                  <div class="pf-half pf-front"    id="pf-fr-${s.sym}"><span>—</span></div>
                  <div class="pf-half pf-back"     id="pf-bk-${s.sym}"><span>—</span></div>
                </div>
              </div>
              <div class="main-change" id="main-chg-${s.sym}"></div>
              <div class="ref-price" id="sub-row-${s.sym}" style="display:none;">
                <span class="ref-tag" id="sub-label-${s.sym}">昨收</span>
                <span class="ref-value" id="sub-${s.sym}">—</span>
                <span id="sub-chg-${s.sym}"></span>
              </div>
            </div>
          </div>
          <div class="news-container" id="news-list-${s.sym}"></div>
        </div>
      </div>
    </div>
  `).join('');
  fixLastRow();
}

/* ─── LAYOUT ─────────────────────────────────── */
function fixLastRow() {
  const grid = document.getElementById('grid');
  if (!grid) return;
  grid.querySelectorAll('.last-row-solo,.last-row-pair-1,.last-row-pair-2')
    .forEach(el => el.classList.remove('last-row-solo','last-row-pair-1','last-row-pair-2'));
  if (window.innerWidth < 1000) return; // desktop only
  const items = Array.from(grid.querySelectorAll('.card:not(.expanded),.card-ghost'));
  const r = items.length % 3;
  if (r === 1) items[items.length-1].classList.add('last-row-solo');
  else if (r === 2) {
    items[items.length-2].classList.add('last-row-pair-1');
    items[items.length-1].classList.add('last-row-pair-2');
  }
}
window.addEventListener('resize', fixLastRow);

/* ─── FLIP HELPERS ───────────────────────────── */
function setColor(sym, isUp) {
  const cls = isUp ? 'color-up' : 'color-down';
  const rem = isUp ? 'color-down' : 'color-up';
  ['pf-st','pf-sb','pf-fr','pf-bk'].forEach(id => {
    const el = document.getElementById(`${id}-${sym}`);
    if (el) { el.classList.remove(rem); el.classList.add(cls); }
  });
}

function setDirect(sym, val) {
  ['pf-st','pf-sb','pf-fr','pf-bk'].forEach(id => {
    const el = document.getElementById(`${id}-${sym}`);
    if (el) el.querySelector('span').textContent = val;
  });
}

function flipDigit(sym, newVal) {
  const st = document.getElementById(`pf-st-${sym}`);
  const sb = document.getElementById(`pf-sb-${sym}`);
  const fr = document.getElementById(`pf-fr-${sym}`);
  const bk = document.getElementById(`pf-bk-${sym}`);
  if (!st) return;
  const oldVal = st.querySelector('span').textContent;
  if (oldVal === newVal) return;
  fr.querySelector('span').textContent = oldVal;
  fr.classList.remove('flipping'); bk.classList.remove('flipping');
  void fr.offsetWidth;
  st.querySelector('span').textContent = newVal;
  sb.querySelector('span').textContent = oldVal;
  bk.querySelector('span').textContent = newVal;
  fr.classList.add('flipping'); bk.classList.add('flipping');
  setTimeout(() => { if (sb) sb.querySelector('span').textContent = newVal; }, 640);
}

/* ─── RENDER PRICE ───────────────────────────── */
function renderPrice(sym, q) {
  if (!q) return;

  const c          = parseFloat(q.c ?? q.regular ?? 0);
  const regular    = parseFloat(q.regular ?? q.c ?? 0);
  const prevClose  = parseFloat(q.prev_close ?? regular);
  const phase      = q.phase || '正式盤';
  const valStr     = `$${c.toFixed(2)}`;

  // phase label：只在正式盤顯示「現價」，盤前/盤後右上角 badge 已有標示，不重複
  const phaseLabel = document.getElementById(`phase-label-${sym}`);
  if (phaseLabel) {
    if (phase === '正式盤') {
      phaseLabel.textContent = '現價';
      phaseLabel.classList.remove('hide');
    } else {
      phaseLabel.classList.add('hide');
    }
  }

  // change (always relative to prev_close, use backend values)
  const chgAmt = q.d  !== undefined ? parseFloat(q.d)  : (c - prevClose);
  const chgPct = q.dp !== undefined ? parseFloat(q.dp) : (prevClose ? chgAmt/prevClose*100 : 0);
  const isUp   = chgAmt >= 0;
  const sign   = isUp ? '▲' : '▼';
  const dir    = isUp ? 'up' : 'down';

  setColor(sym, isUp);

  const phaseChanged = lastPhase[sym] !== undefined && lastPhase[sym] !== phase;

  if (phaseChanged) {
    const old = document.getElementById(`pf-st-${sym}`)?.querySelector('span')?.textContent || '—';
    setDirect(sym, valStr);
    const fr = document.getElementById(`pf-fr-${sym}`);
    const bk = document.getElementById(`pf-bk-${sym}`);
    const sb = document.getElementById(`pf-sb-${sym}`);
    if (fr && bk) {
      fr.querySelector('span').textContent = old;
      sb.querySelector('span').textContent = old;
      document.getElementById(`pf-st-${sym}`).querySelector('span').textContent = valStr;
      bk.querySelector('span').textContent = valStr;
      fr.classList.remove('flipping'); bk.classList.remove('flipping');
      void fr.offsetWidth;
      fr.classList.add('flipping'); bk.classList.add('flipping');
      setTimeout(() => { if (sb) sb.querySelector('span').textContent = valStr; }, 640);
    }
  } else if (phase === '正式盤') {
    flipDigit(sym, valStr);
  } else {
    setDirect(sym, valStr);
  }

  lastPhase[sym] = phase;

  // 主行漲跌：永遠相對昨收
  document.getElementById(`main-chg-${sym}`).innerHTML =
    `<span class="${dir}">${sign} ${Math.abs(chgAmt).toFixed(2)} (${Math.abs(chgPct).toFixed(2)}%)</span>`;

  // badge：盤前/盤後才顯示
  const badge = document.getElementById(`badge-${sym}`);
  if (phase==='盤前'||phase==='盤後') { badge.textContent=phase; badge.classList.add('show'); }
  else badge.classList.remove('show');

  // 副行邏輯整理：
  // 盤後：顯示「收盤 $xxx」，不帶%（%數已在主行顯示，重複顯示容易搞混）
  // 盤前：顯示「昨收 $xxx」，不帶%（昨收是參考基準，不需要算漲跌）
  // 正式盤：隱藏副行
  const subRow   = document.getElementById(`sub-row-${sym}`);
  const subLabel = document.getElementById(`sub-label-${sym}`);
  const subEl    = document.getElementById(`sub-${sym}`);
  const subChg   = document.getElementById(`sub-chg-${sym}`);

  if (phase === '盤後') {
    // 盤後：主行=盤後價+漲跌，副行=收盤+收盤漲跌（跟 TradingView 一致）
    subRow.style.display = 'flex';
    subLabel.textContent = '收盤';
    subEl.textContent = `$${regular.toFixed(2)}`;
    const rc = regular - prevClose;
    const rp = prevClose ? rc/prevClose*100 : 0;
    const rd = rc>=0?'up':'down', rs = rc>=0?'▲':'▼';
    subChg.innerHTML = `<span class="${rd}">${rs} ${Math.abs(rc).toFixed(2)} (${Math.abs(rp).toFixed(2)}%)</span>`;
  } else if (phase === '盤前') {
    // 盤前：主行=盤前價+漲跌，副行=昨收（純參考基準，不帶%）
    subRow.style.display = 'flex';
    subLabel.textContent = '昨收';
    subEl.textContent = `$${regular.toFixed(2)}`;
    subChg.innerHTML = '';
  } else {
    subRow.style.display = 'none';
  }
}

/* ─── RENDER NEWS ─────────────────────────────── */
function renderNews(sym, list) {
  const el = document.getElementById(`news-list-${sym}`);
  if (!el) return;
  el.innerHTML = list.length
    ? list.map(n => `<a class="exp-news-item" href="${n.url}" target="_blank" rel="noopener noreferrer"><div class="exp-news-headline">${n.headline}</div><div class="exp-news-source">${n.source}</div></a>`).join('')
    : '<div style="font-size:10px;color:#7a7468;">暫無相關新聞</div>';
}

/* ─── LOAD DATA ──────────────────────────────── */
async function loadData() {
  try {
    const res  = await fetch('./stock_data.json?t=' + Date.now());
    const json = await res.json();

    const doRender = (s, data, delay) => {
      setTimeout(() => {
        if (data?.quote) renderPrice(s.sym, data.quote);
        if (data?.news)  renderNews(s.sym, data.news);
      }, delay);
    };

    if (isFirstLoad) {
      // Bug 2 fix: mark done BEFORE stagger timeouts fire,
      // but keep the isFirstLoad flag true until all cards processed
      const staggerMs = 75;
      STOCKS.forEach((s, i) => doRender(s, json.data?.[s.sym], i * staggerMs));
      // Mark session done after last card's timeout
      setTimeout(() => {
        sessionStorage.setItem('hasLoaded','1');
        isFirstLoad = false;
      }, STOCKS.length * staggerMs + 100);
    } else {
      STOCKS.forEach(s => doRender(s, json.data?.[s.sym], 0));
    }
  } catch (e) { console.error(e); }
}

/* ─── COLLAPSE ───────────────────────────────── */
function collapseCard(sym) {
  const card = document.getElementById(`card-${sym}`);
  if (!card) return;
  document.getElementById('cardOverlay').classList.remove('show');
  document.body.classList.remove('scroll-locked');
  card.classList.add('closing');

  // stop chart
  const iframe = document.getElementById(`chart-${sym}`);
  if (iframe) iframe.src = '';

  // remove ghost early (matches close animation duration)
  setTimeout(() => {
    document.getElementById(`ghost-${sym}`)?.remove();
  }, 240);

  setTimeout(() => {
    card.classList.remove('expanded','closing');
    // restore split-right original HTML
    const sr = card.querySelector('.split-right');
    if (sr?.dataset.expanded) {
      sr.innerHTML = sr.dataset.originalHtml;
      delete sr.dataset.expanded;
      delete sr.dataset.originalHtml;
    }
    card.querySelector('.split-left')?.classList.remove('panel-flap');
    card.classList.add('recently-viewed');
    fixLastRow();
  }, 360);

  expandedSym = null;
}

/* ─── TOGGLE ─────────────────────────────────── */
function toggleCard(sym, ex) {
  pendingTimers.forEach(clearTimeout);
  pendingTimers = [];

  const card      = document.getElementById(`card-${sym}`);
  const isExp     = card.classList.contains('expanded');
  const overlay   = document.getElementById('cardOverlay');

  if (expandedSym && expandedSym !== sym) collapseCard(expandedSym);

  if (!isExp) {
    /* ── pre-expand ── */
    // clear all recently-viewed marks
    document.querySelectorAll('.card.recently-viewed')
      .forEach(c => c.classList.remove('recently-viewed'));

    // ghost placeholder
    const ghost = document.createElement('div');
    ghost.id        = `ghost-${sym}`;
    ghost.className = 'card-ghost';
    const cs        = window.getComputedStyle(card);
    ghost.style.gridColumn = cs.gridColumn;
    ghost.style.gridRow    = cs.gridRow;
    ghost.style.height     = card.offsetHeight + 'px';
    card.parentNode.insertBefore(ghost, card.nextSibling);

    card.classList.add('expanded');
    expandedSym = sym;
    history.pushState({ expanded: sym }, '');
    overlay.classList.add('show');
    overlay.onclick = () => toggleCard(sym, ex); // click overlay to close
    document.body.classList.add('scroll-locked');
    fixLastRow();

    const splitLeft  = card.querySelector('.split-left');
    const splitRight = card.querySelector('.split-right');

    /* ── build right panel ── */
    // read current display values from DOM
    const mainVal = document.getElementById(`pf-st-${sym}`)?.querySelector('span')?.textContent || '—';
    const mainChg = document.getElementById(`main-chg-${sym}`)?.innerHTML || '';
    const phase   = document.getElementById(`phase-label-${sym}`)?.textContent || '現價';
    const subVal  = document.getElementById(`sub-${sym}`)?.textContent || '';
    const subChg  = document.getElementById(`sub-chg-${sym}`)?.innerHTML || '';
    const badgeEl = document.getElementById(`badge-${sym}`);
    const badgeHtml = badgeEl?.classList.contains('show')
      ? `<span class="tag-post show">${badgeEl.textContent}</span>` : '';

    const isPost = phase === '盤後';
    const isPre  = phase === '盤前';

    // Bug 3 fix: phase label matches actual displayed number
    // always show current price (c) as big number
    const bigLabel = isPre ? '盤前' : (isPost ? '盤後' : '現價');
    const bigVal   = mainVal;
    const bigChg   = mainChg;

    // Bug 3 fix: ref row only for post-market
    const showRef  = isPost;
    const refText  = showRef ? `收盤 ${subVal}` : '';

    const pfColor  = document.getElementById(`pf-st-${sym}`)?.classList.contains('color-up')
      ? 'color-up' : 'color-down';

    const newsEl   = document.getElementById(`news-list-${sym}`);
    const newsHtml = newsEl?.innerHTML || '<div style="font-size:10px;color:#7a7468;">暫無相關新聞</div>';

    splitRight.dataset.originalHtml = splitRight.innerHTML;
    splitRight.dataset.expanded     = '1';

    splitRight.innerHTML = `
      <div class="exp-header">
        <div>
          <div class="exp-sym">${sym}</div>
          <div class="exp-name">${STOCKS.find(s=>s.sym===sym)?.name||''}</div>
        </div>
        ${badgeHtml}
      </div>
      <div class="sf-wrap" id="exp-price-${sym}">
        <div class="exp-price-stage">
          <span class="exp-phase-label">${bigLabel}</span>
          <div class="pf-wrap" style="margin:4px 0;">
            <div class="pf-stack" style="width:260px;height:52px;">
              <div class="pf-half pf-static-t ${pfColor}" id="epf-st-${sym}" style="height:26px;font-size:44px;"><span style="font-size:44px;">—</span></div>
              <div class="pf-half pf-static-b ${pfColor}" id="epf-sb-${sym}" style="height:26px;font-size:44px;"><span style="font-size:44px;">—</span></div>
              <div class="pf-half pf-front ${pfColor}"    id="epf-fr-${sym}" style="height:26px;font-size:44px;"><span style="font-size:44px;">—</span></div>
              <div class="pf-half pf-back  ${pfColor}"    id="epf-bk-${sym}" style="height:26px;font-size:44px;"><span style="font-size:44px;">—</span></div>
            </div>
          </div>
          <div class="exp-main-change">${bigChg}</div>
          ${showRef ? `<div class="exp-ref-row"><span class="exp-ref-inner" id="exp-ref-${sym}">${refText} ${subChg}</span></div>` : ''}
        </div>
      </div>
      <div class="sf-wrap" id="exp-news-${sym}">
        <div class="exp-news-wrap">
          <div class="exp-news-title">📰 最新消息</div>
          ${newsHtml}
        </div>
      </div>`;

    /* ── animate ── */
    // chart iframe
    pendingTimers.push(setTimeout(() => {
      document.getElementById(`chart-${sym}`).src =
        `https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW`;
    }, 300));

    // unroll left then right
    pendingTimers.push(setTimeout(() => splitLeft.classList.add('panel-flap'),  60));
    pendingTimers.push(setTimeout(() => splitRight.classList.add('panel-flap'), 130));

    // chart fade-in
    pendingTimers.push(setTimeout(() => {
      splitLeft.querySelector('.chart-container')?.classList.add('show-chart');
    }, 560));

    // Bug 4 fix: secPrice then flip, then secNews
    pendingTimers.push(setTimeout(() => {
      document.getElementById(`exp-price-${sym}`)?.classList.add('reveal');
    }, 660));

    // big digit flip
    pendingTimers.push(setTimeout(() => {
      const fr = document.getElementById(`epf-fr-${sym}`);
      const bk = document.getElementById(`epf-bk-${sym}`);
      const st = document.getElementById(`epf-st-${sym}`);
      const sb = document.getElementById(`epf-sb-${sym}`);
      if (!fr) return;
      fr.querySelector('span').textContent = '—';
      sb.querySelector('span').textContent = '—';
      st.querySelector('span').textContent = bigVal;
      bk.querySelector('span').textContent = bigVal;
      fr.classList.remove('flipping'); bk.classList.remove('flipping');
      void fr.offsetWidth;
      fr.classList.add('flipping'); bk.classList.add('flipping');
      setTimeout(() => { if (sb) sb.querySelector('span').textContent = bigVal; }, 640);
    }, 1100));

    // news reveal (after price flip started)
    pendingTimers.push(setTimeout(() => {
      document.getElementById(`exp-news-${sym}`)?.classList.add('reveal');
    }, 1160));

    // ref row single-flip (after news)
    if (showRef) {
      pendingTimers.push(setTimeout(() => {
        document.getElementById(`exp-ref-${sym}`)?.classList.add('playing');
      }, 1620));
    }

  } else {
    collapseCard(sym);
    if (!collapsingViaBack && history.state?.expanded === sym) history.back();
  }
}

/* ─── BACK BUTTON ────────────────────────────── */
window.addEventListener('popstate', () => {
  if (expandedSym) {
    collapsingViaBack = true;
    toggleCard(expandedSym, '');
    collapsingViaBack = false;
  }
});

/* ─── FIRST-LOAD STAGGER FIX ─────────────────── */
// isFirstLoad is captured at renderPrice call time via closure,
// handled inside renderPrice / loadData already.

buildGrid();
loadData();
setInterval(loadData, 60_000);
</script>
