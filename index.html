<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>美股情報 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #1c1a16;
    --card-frame: #d9cdb8;
    --card-border: #3a352c;
    --window: #4a5240;
    --window-edge: #2e3328;
    --window-shadow: #1a1d15;
    --digit: #f0c987;
    --text: #f0e8d8;
    --muted: #7a7468;
    --label: #b8ad96;
    --up: #00e676;
    --down: #ff1744;
    --accent: #d9cdb8;
    --knob: #8a6240;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Mono', monospace;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: #0d0d0d;
    border-bottom: 1px solid var(--card-frame);
  }
  .logo { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .hero-time { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; color: var(--digit); letter-spacing: 2px; line-height: 1; }
  .hero-date { font-size: 11px; color: var(--muted); text-align: right; margin-top: 2px; }

  /* ── GRID SYSTEM ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin: 16px;
  }
  .grid > .card {
    grid-column: span 2; /* 預設一排放 3 張 */
  }

  /* 💡 均分關鍵：當沒有任何卡片展開時，最後兩張卡片 (SPCX, TSM) 各佔 3 欄 (即各佔 1/2 寬度)，大小外觀完全一致 */
  .grid:not(.has-expanded) .card:nth-last-child(2):nth-child(3n+1),
  .grid:not(.has-expanded) .card:nth-last-child(1):nth-child(3n+2) {
    grid-column: span 3 !important;
  }

  /* 手機版 RWD 斷點：一排一張，完全不影響操作 */
  @media(max-width: 639px) {
    .grid { grid-template-columns: 1fr; }
    .grid > .card { grid-column: span 1 !important; }
  }

  /* ── CARD ── */
  .card {
    background: linear-gradient(180deg, var(--window) 0%, var(--window-edge) 100%);
    border: 3px solid var(--card-frame);
    border-radius: 18px;
    padding: 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    position: relative;
    perspective: 1000px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.5), 0 10px 22px rgba(0,0,0,0.45);
  }
  .card.expanded {
    cursor: default;
    grid-column: 1 / -1 !important; /* 展開時拿到完整整行寬度 */
  }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .card-sym { font-size: 20px; font-weight: 700; color: var(--digit); }
  .card-name { font-size: 10px; color: #aab09a; margin-top: 2px; }
  .tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
  .tag-post { background: #3a2a18; color: #e0b97d; border: 1px solid var(--knob); display: none; }
  .tag-post.show { display: inline-block; }

  /* price section */
  .price-section {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #5a4422 0%, #3d2e16 100%);
    border: 1px solid rgba(0,0,0,0.35);
    border-radius: 10px;
    padding: 18px 14px 14px;
    transform-origin: center center;
    backface-visibility: hidden;
  }
  
  /* 💡 僅在定位完、加入 active-flap 時才播放 3D 翻轉動畫 */
  .card.active-flap .price-section {
    animation: flapDown 0.42s cubic-bezier(0.45, 0, 0.55, 1);
  }
  @keyframes flapDown {
    0%   { transform: rotateX(0deg); }
    45%  { transform: rotateX(-92deg); filter: brightness(0.55); }
    46%  { transform: rotateX(88deg);  filter: brightness(0.55); }
    100% { transform: rotateX(0deg);   filter: brightness(1); }
  }

  .phase-corner-label { position: absolute; top: 8px; left: 10px; font-size: 9px; font-weight: 700; color: #d9b87a; opacity: 0.75; }
  .price-value { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: #ffd98a; text-shadow: 0 0 14px rgba(255, 200, 110, 0.55); }
  .main-change { font-size: 12px; font-weight: 700; margin-top: 6px; }
  
  .ref-price {
    margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08);
    width: 100%; font-size: 11px; color: #c9b48a; display: flex; justify-content: center; gap: 6px;
  }
  .up { color: var(--up); background: #00e67615; border: 1px solid #00e67630; }
  .down { color: var(--down); background: #ff174415; border: 1px solid #ff174430; }

  /* ── CHART ── */
  .chart-container {
    margin-top: 0; border: 1px solid var(--card-frame); border-radius: 10px;
    overflow: hidden; height: 0; opacity: 0;
    transition: height 0.4s ease, margin-top 0.4s ease, opacity 0.3s ease;
  }
  .chart-container.show-chart { height: 420px; margin-top: 14px; opacity: 1; }

  /* ── NEWS ── */
  .news-container { display: none; margin-top: 14px; border: 1px solid var(--card-frame); border-radius: 10px; background: var(--card-bg); padding: 14px; }
  .news-container.show-news { display: block; }
  .news-header { font-size: 12px; font-weight: 700; color: var(--card-frame); margin-bottom: 10px; }
  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-item { display: block; padding: 10px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; text-decoration: none; }
  .news-headline { font-size: 12px; color: var(--text); line-height: 1.5; }
  .news-source { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .footer { text-align: center; margin-top: 24px; font-size: 10px; color: var(--muted); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">美股情報 PRO</div>
  <div>
    <div class="hero-time" id="heroTime">00:00</div>
    <div class="hero-date" id="heroDate"></div>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="footer">YAHOO FINANCE · 點擊卡片展開圖表</div>

<script>
const STOCKS = [
  {sym:'NOW',  name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA', name:'Nvidia',      ex:'NASDAQ'},
  {sym:'LITE', name:'Lumentum',   ex:'NASDAQ'},
  {sym:'ONDS', name:'Ondas',       ex:'NASDAQ'},
  {sym:'MRVL', name:'Marvell',     ex:'NASDAQ'},
  {sym:'GOOG', name:'Google C',   ex:'NASDAQ'},
  {sym:'SPCX', name:'SpaceX',      ex:'NASDAQ'},
  {sym:'TSM',  name:'TSMC',        ex:'NYSE'}
];

let expandedSym = null;
let savedOrder = []; // 記憶初始網格乾淨排版順序

function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('heroTime').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('heroDate').textContent = `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())} ${days[now.getDay()]}`;
}
setInterval(updateClock, 1000);
updateClock();

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}" onclick="toggleCard('${s.sym}','${s.ex}')">
      <div class="card-header">
        <div>
          <div class="card-sym">${s.sym}</div>
          <div class="card-name">${s.name}</div>
        </div>
        <span class="tag tag-post" id="badge-${s.sym}">盤後</span>
      </div>
      <div class="price-section">
        <span class="phase-corner-label" id="phase-label-${s.sym}">現價</span>
        <span class="price-value" id="main-${s.sym}">—</span>
        <div class="main-change" id="main-chg-${s.sym}"></div>
        <div class="ref-price" id="sub-row-${s.sym}" style="display:none;">
          <span class="ref-tag" id="sub-label-${s.sym}">收盤</span>
          <span class="ref-value" id="sub-${s.sym}">—</span>
          <span class="ref-change" id="sub-chg-${s.sym}"></span>
        </div>
      </div>
      <div class="chart-container">
        <iframe id="chart-${s.sym}" width="100%" height="100%" frameborder="0"></iframe>
      </div>
      <div class="news-container" id="news-container-${s.sym}">
        <div class="news-header">📰 最新消息</div>
        <div class="news-list" id="news-list-${s.sym}"></div>
      </div>
    </div>
  `).join('');
  
  savedOrder = Array.from(grid.children);
}

function toggleCard(sym, ex) {
  const grid = document.getElementById('grid');
  const card = document.getElementById(`card-${sym}`);
  const isExpanded = card.classList.contains('expanded');
  const chartEl = document.getElementById(`chart-${sym}`);
  const chartContainer = chartEl.closest('.chart-container');
  const newsContainer = document.getElementById(`news-container-${sym}`);

  const closeAll = () => {
    STOCKS.forEach(s => {
      const c = document.getElementById(`card-${s.sym}`);
      c.classList.remove('expanded', 'active-flap');
      document.getElementById(`chart-${s.sym}`).src = '';
      document.getElementById(`chart-${s.sym}`).closest('.chart-container').classList.remove('show-chart');
      document.getElementById(`news-container-${s.sym}`).classList.remove('show-news');
    });
    savedOrder.forEach(node => grid.appendChild(node)); // 還原 DOM 原本排序
    grid.classList.remove('has-expanded');
    expandedSym = null;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  if (isExpanded) {
    closeAll();
    return;
  }

  if (expandedSym) {
    closeAll();
  }

  expandedSym = sym;
  grid.classList.add('has-expanded');

  // ── 💡 絕對置頂核心時序控制 ──
  
  // 1. 瞬間把當前字卡拔起來抽到 Grid 的最上面（第一個子節點），並展開全寬
  grid.insertBefore(card, grid.firstChild);
  card.classList.add('expanded');

  // 2. 骨架換軌完成，立刻強制視窗捲動對齊到最上方（其他所有卡片百分之百被推去最下面）
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // 3. 等待滾動與置頂定位完成（300ms），才精準准許加入翻卡動效類別跑 LCD 翻轉
  setTimeout(() => {
    card.classList.add('active-flap');

    // 4. 翻卡期間或完成後，依序將新聞與 TradingView 圖表拉開
    setTimeout(() => {
      newsContainer.classList.add('show-news');
    }, 400);

    setTimeout(() => {
      chartEl.src = `https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW`;
      chartContainer.classList.add('show-chart');
    }, 600);

  }, 300);
}

/* ── 💡 強化相容性數據解析 ── */
function renderPrice(sym, q) {
  if (!q) return;
  // 全面覆蓋可能出現的 json 欄位名稱組合，確保一定有數據不漏接
  const current = parseFloat(q.regularMarketPrice ?? q.c ?? q.price ?? q.regular ?? q.currentPrice ?? 0);
  const prevClose = parseFloat(q.regularMarketPreviousClose ?? q.prev_close ?? q.previousClose ?? q.regular ?? current);
  const phase = q.marketState || q.phase || '正式盤';

  if (current === 0) return;

  const phaseLabelMap = { 'PRE': '盤前', 'POST': '盤後', '盤前': '盤前', '盤後': '盤後', 'REGULAR': '現價', '正式盤': '現價', 'CLOSED': '收盤' };
  document.getElementById(`phase-label-${sym}`).textContent = phaseLabelMap[phase] || '現價';
  document.getElementById(`main-${sym}`).textContent = `$${current.toFixed(2)}`;

  let mainChange = q.regularMarketChange ?? q.d ?? q.change;
  let mainPct = q.regularMarketChangePercent ?? q.dp ?? q.changePercent;
  
  if (mainChange === undefined || mainChange === null) mainChange = current - prevClose;
  if (mainPct === undefined || mainPct === null) mainPct = prevClose ? (mainChange / prevClose * 100) : 0;

  mainChange = parseFloat(mainChange);
  mainPct = parseFloat(mainPct);

  const mainDir = mainChange >= 0 ? 'up' : 'down';
  const mainSign = mainChange >= 0 ? '▲' : '▼';
  document.getElementById(`main-chg-${sym}`).innerHTML =
    `<span class="${mainDir}">${mainSign} ${Math.abs(mainChange).toFixed(2)} (${Math.abs(mainPct).toFixed(2)}%)</span>`;

  const badge = document.getElementById(`badge-${sym}`);
  if (phase === 'PRE' || phase === 'POST' || phase === '盤前' || phase === '盤後') {
    badge.textContent = (phase === 'PRE' || phase === '盤前') ? '盤前' : '盤後';
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }

  const subRow = document.getElementById(`sub-row-${sym}`);
  const subLabel = document.getElementById(`sub-label-${sym}`);
  const subEl = document.getElementById(`sub-${sym}`);
  const subChgEl = document.getElementById(`sub-chg-${sym}`);

  if (phase === 'POST' || phase === '盤後') {
    subRow.style.display = 'flex';
    subLabel.textContent = '收盤';
    const regularPrice = parseFloat(q.regularMarketPrice ?? prevClose);
    subEl.textContent = `$${regularPrice.toFixed(2)}`;
    const regChange = regularPrice - prevClose;
    const regPct = prevClose ? (regChange / prevClose * 100) : 0;
    const dir = regChange >= 0 ? 'up' : 'down';
    const sign = regChange >= 0 ? '▲' : '▼';
    subChgEl.innerHTML = `<span class="${dir}">${sign} ${Math.abs(regChange).toFixed(2)} (${Math.abs(regPct).toFixed(2)}%)</span>`;
  } else if (phase === 'PRE' || phase === '盤前') {
    subRow.style.display = 'flex';
    subLabel.textContent = '昨收';
    subEl.textContent = `$${prevClose.toFixed(2)}`;
    subChgEl.innerHTML = '';
  } else {
    subRow.style.display = 'none';
  }
}

async function loadData() {
  try {
    const res = await fetch('./stock_data.json?t=' + Date.now());
    const json = await res.json();
    STOCKS.forEach(s => {
      const data = json.data?.[s.sym] || json[s.sym];
      if (data) {
        const quote = data.quote || data;
        renderPrice(s.sym, quote);
        if (data.news) renderNews(s.sym, data.news);
      }
    });
  } catch(e) { console.error("數據載入錯誤：", e); }
}

/* ── 💡 嚴格限制：只渲染「一條」新聞 ── */
function renderNews(sym, newsList) {
  const el = document.getElementById(`news-list-${sym}`);
  if (!el) return;
  if (!newsList || !newsList.length) {
    el.innerHTML = `<div class="news-source">暫無相關新聞</div>`;
    return;
  }
  
  // 💡 精準只拿第一則項目項目
  const n = newsList[0];
  el.innerHTML = `
    <a class="news-item" href="${n.url || n.link || '#'}" target="_blank" rel="noopener noreferrer">
      <div class="news-headline">${n.headline || n.title}</div>
      <div class="news-source">${n.source || ''}</div>
    </a>
  `;
}

buildGrid();
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
