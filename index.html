<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="盤前情報">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<title>盤前情報</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #c8ff00; --accent2: #00d4ff; --text: #e8e8f0;
    --muted: #5a5a7a; --up: #39ff8a; --down: #ff4d6d; --discord: #5865F2;
  }
  
  /* 鎖死全域左右滑動，僅允許上下垂直滾動 */
  html {
    overflow-x: hidden;
    width: 100%;
    height: 100%;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Noto Sans TC', sans-serif; 
    font-weight: 300; 
    min-height: 100vh; 
    padding-bottom: 40px; 
    max-width: 1200px; 
    margin: 0 auto; 
    overflow-x: hidden; /* 強制 body 左右鎖死 */
    width: 100%;
    position: relative;
  }
  
  header, .hero, .control-strip { padding: 16px 20px 0; display: flex; align-items: center; justify-content: space-between; width: 100%; }
  header { padding-top: 18px; }
  .logo { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .clock, .hero-sub, .status-label, .card-price-chg { font-family: 'DM Mono', monospace; }
  .clock, .hero-sub { font-size: 11px; color: var(--muted); }
  .hero { padding-bottom: 10px; }
  .hero-time { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; line-height: 1; }
  .hero-time span { color: var(--accent); }
  .hero-sub { margin-top: 4px; }
  .control-strip { padding-bottom: 14px; clear: both; }
  .status-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 2s infinite; }
  .status-label { font-size: 10px; color: var(--accent); }
  .refresh-btn { background: rgba(0,212,255,0.1); border: 1px solid var(--accent2); border-radius: 100px; padding: 6px 14px; font-size: 11px; color: var(--accent2); cursor: pointer; transition: all 0.2s; }
  .refresh-btn:active, .discord-btn:active { transform: scale(0.95); }
  
  /* 預設手機版 1 欄排版，並限制寬度防止溢出 */
  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 0 16px 12px; clear: both; width: 100%; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; cursor: pointer; transition: border-color 0.2s; min-height: 105px; display: flex; flex-direction: column; justify-content: space-between; width: 100%; overflow: hidden; }
  .card.expanded { border-color: var(--accent2); grid-column: 1 / -1; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }
  .card-sym { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent2); }
  .card-name { font-size: 9px; color: var(--muted); margin-top: 1px; }
  .card-price { text-align: right; }
  .card-price-num { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; }
  .card-price-chg { font-size: 10px; margin-top: 1px; }
  .up { color: var(--up); } .down { color: var(--down); } .neutral { color: var(--muted); }
  .card-news { border-top: 1px solid var(--border); padding-top: 8px; margin-top: 8px; width: 100%; }
  .card-news-item { font-size: 11px; color: var(--muted); line-height: 1.5; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; width: 100%; }
  .card-news-item:last-child { border-bottom: none; }
  .card-news-item a { color: var(--text); text-decoration: none; display: block; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
  .card-news-item .news-time, .detail-news-meta { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); margin-top: 1px; }
  .card-detail { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; width: 100%; }
  .card.expanded .card-detail { display: block; }
  .chart-box { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); height: 240px; margin-bottom: 10px; width: 100%; }
  .chart-box iframe { width: 100%; height: 100%; border: none; }
  .detail-news-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; text-decoration: none; display: block; width: 100%; }
  .detail-news-title { font-size: 12px; color: var(--text); line-height: 1.5; }
  .detail-news-meta { margin-top: 3px; display: block; }
  
  /* 防止 Discord 面板溢出 */
  .discord-box { margin: 12px 16px; padding: 16px; background: rgba(88,101,242,0.03); border: 1px solid rgba(88,101,242,0.15); border-radius: 16px; display: flex; flex-direction: column; gap: 10px; }
  .discord-title { font-size: 12px; font-weight: 500; color: #5865F2; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .discord-text { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .discord-btn { width: 100%; padding: 12px; background: var(--discord); color: #fff; border: none; border-radius: 12px; font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; transition: all 0.2s; }
  
  /* 底部說明限制寬度 */
  .notice { margin: 0 16px; padding: 10px 12px; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 10px; font-size: 10px; color: var(--accent2); line-height: 1.7; }
  .loading-dot { display: inline-block; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  /* 💻 電腦與平板自適應排版 */
  @media (min-width: 600px) {
    .hero-time { font-size: 48px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 20px 20px; }
    .discord-box, .notice { margin: 0 20px 12px; }
  }
  @media (min-width: 1024px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">盤前情報 · PRO</div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="hero">
  <div>
    <div class="hero-time" id="heroTime">--<span>:</span>--</div>
    <div class="hero-sub" id="heroDate">載入中...</div>
  </div>
</div>

<div class="control-strip">
  <div class="status-chip">
    <div class="status-dot"></div>
    <div class="status-label" id="update-status">自動更新中 (60s)</div>
  </div>
  <div class="refresh-btn" onclick="manualRefresh()">🔄 手動刷新</div>
</div>

<div class="grid" id="grid"></div>

<div class="discord-box">
  <div class="discord-title"><span>🛡️</span> 24H 雲端自動推送已部署</div>
  <div class="discord-text">
    無須保持網頁開啟，GitHub 雲端腳本將在每日 <b>06:00</b> 與 <b>18:00</b> 自動抓取行情並推送至您的 Discord 頻道。
  </div>
  <!-- 💡 提示：請將下方 href="https://discord.gg/" 替換為你的 Discord 專屬「永久邀請連結」 -->
  <a class="discord-btn" https://discord.gg/DNSG7reuS" target="_blank">
    💬 開啟我的 Discord 專屬通知頻道
  </a>
</div>

<div class="notice">
  📌 提示：網頁已啟用 PWA 離線技術，每次點開皆會秒開並自動載入美股最新盤前數據。
</div>

<script>
const API_KEY = "d8e124pr01qhm4ai0etgd8e124pr01qhm4ai0eu0";
const STOCKS = [
  { sym: 'NOW',  name: 'ServiceNow',   ex: 'NYSE' },
  { sym: 'NVDA', name: 'Nvidia',       ex: 'NASDAQ' },
  { sym: 'LITE', name: 'Lumentum',     ex: 'NASDAQ' },
  { sym: 'ONDS', name: 'Ondas 無人機', ex: 'NASDAQ' },
  { sym: 'MRVL', name: 'Marvell',      ex: 'NASDAQ' },
  { sym: 'GOOG', name: 'Google C',     ex: 'NASDAQ' },
];

let expandedSym = null, newsCache = {}, refreshInterval = null;

function updateClock() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('heroTime').innerHTML = `${pad(now.getHours())}<span>:</span>${pad(now.getMinutes())}`;
  document.getElementById('heroDate').textContent = `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} 週${['日','一','二','三','四','五','六'][now.getDay()]}`;
}
setInterval(updateClock, 1000); updateClock();

function buildGrid() {
  document.getElementById('grid').innerHTML = STOCKS.map(s => `
    <div class="card" id="card-${s.sym}" onclick="toggleCard('${s.sym}','${s.ex}')">
      <div class="card-top">
        <div>
          <div class="card-sym">${s.sym}</div>
          <div class="card-name">${s.name}</div>
        </div>
        <div class="card-price">
          <div class="card-price-num neutral" id="price-${s.sym}">$<span class="loading-dot">·</span></div>
          <div class="card-price-chg neutral" id="chg-${s.sym}">--</div>
        </div>
      </div>
      <div class="card-news" id="news-${s.sym}"><div class="card-news-item">載入中...</div></div>
      <div class="card-detail" id="detail-${s.sym}">
        <div class="chart-box"><iframe id="chart-${s.sym}" src="" allowtransparency="true"></iframe></div>
        <div class="detail-news" id="detail-news-${s.sym}"></div>
      </div>
    </div>
  `).join('');
}

function toggleCard(sym, ex) {
  const card = document.getElementById(`card-${sym}`);
  const isExp = card.classList.toggle('expanded');
  if (expandedSym && expandedSym !== sym) document.getElementById(`card-${expandedSym}`)?.classList.remove('expanded');
  expandedSym = isExp ? sym : null;
  document.getElementById(`chart-${sym}`).src = isExp ? `https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW` : '';
  if (isExp && newsCache[sym]) renderDetailNews(sym, newsCache[sym]);
}

function renderDetailNews(sym, items) {
  const box = document.getElementById('detail-news-' + sym);
  if (box) box.innerHTML = items.slice(0, 8).map(item => {
    const d = new Date(item.datetime * 1000);
    return `<a class="detail-news-item" href="${item.url}" target="_blank" onclick="event.stopPropagation();">
      <div class="detail-news-title">${item.headline}</div>
      <span class="detail-news-meta">${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} · ${item.source}</span>
    </a>`;
  }).join('');
}

async function fetchAll() {
  document.getElementById('update-status').textContent = "正在更新資料...";
  await Promise.all(STOCKS.map(s => fetchStock(s.sym)));
  document.getElementById('update-status').textContent = "自動更新中 (60s)";
}

async function fetchStock(sym) {
  try {
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${API_KEY}`), d = await res.json();
    if (d.c) {
      const cls = d.d >= 0 ? 'up' : 'down', sign = d.d >= 0 ? '+' : '';
      document.getElementById(`price-${sym}`).textContent = `$${d.c.toFixed(2)}`;
      document.getElementById(`price-${sym}`).className = `card-price-num ${cls}`;
      document.getElementById(`chg-${sym}`).textContent = `${sign}${d.d.toFixed(2)} (${sign}${d.dp.toFixed(2)}%)`;
      document.getElementById(`chg-${sym}`).className = `card-price-chg ${cls}`;
    }
  } catch(e) { document.getElementById(`price-${sym}`).textContent = '--'; }

  try {
    const today = new Date(), from = new Date(today - 7 * 24 * 60 * 60 * 1000), fmt = d => d.toISOString().split('T')[0];
    const res = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${sym}&from=${fmt(from)}&to=${fmt(today)}&token=${API_KEY}`), items = await res.json();
    newsCache[sym] = items;
    const newsBox = document.getElementById(`news-${sym}`);
    if (items?.length > 0) {
      newsBox.innerHTML = items.slice(0, 2).map(item => `<div class="card-news-item" onclick="event.stopPropagation();">
        <a href="${item.url}" target="_blank">${item.headline}</a>
        <div class="news-time">${new Date(item.datetime*1000).getMonth()+1}/${new Date(item.datetime*1000).getDate()} · ${item.source}</div>
      </div>`).join('');
      if (expandedSym === sym) renderDetailNews(sym, items);
    } else { newsBox.innerHTML = '<div class="card-news-item">暫無新聞</div>'; }
  } catch(e) { document.getElementById(`news-${sym}`).innerHTML = '<div class="card-news-item">新聞載入失敗</div>'; }
}

function manualRefresh() { fetchAll(); clearInterval(refreshInterval); startAutoRefresh(); }
function startAutoRefresh() { refreshInterval = setInterval(fetchAll, 60000); }

buildGrid(); fetchAll(); startAutoRefresh();

if ('serviceWorker' in navigator && (window.location.protocol === 'http:' || window.location.protocol === 'https:')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}
</script>
</body>
</html>
