<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<title>盤前情報</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #111111;
    --border: #222222;
    --border2: #333333;
    --text: #ffffff;
    --text2: #cccccc;
    --muted: #666666;
    --muted2: #444444;
    --up: #00cc66;
    --up-dim: #007a3d;
    --up-bg: rgba(0,204,102,0.07);
    --down: #ff3333;
    --down-dim: #991f1f;
    --down-bg: rgba(255,51,51,0.07);
    --accent: #ffcc00;
    --accent2: #ff6600;
    --pre-color: #ffaa00;
    --post-color: #cc88ff;
    --discord: #5865F2;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{overflow-x:hidden;width:100%;min-height:100%;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;}
  body{padding-bottom:40px;max-width:1400px;margin:0 auto;}

  /* ── TOP BAR ── */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
  }
  .topbar-left{display:flex;align-items:center;gap:16px;}
  .logo{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;font-weight:700;letter-spacing:0.12em;
    color:var(--accent);text-transform:uppercase;
  }
  .topbar-divider{width:1px;height:18px;background:var(--border2);}
  .topbar-date{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;color:var(--muted);letter-spacing:0.06em;
  }
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .live-chip{
    display:flex;align-items:center;gap:6px;
    background:rgba(0,204,102,0.08);
    border:1px solid rgba(0,204,102,0.2);
    border-radius:4px;padding:4px 10px;
  }
  .live-dot{width:5px;height:5px;border-radius:50%;background:var(--up);box-shadow:0 0 6px var(--up);animation:blink 2s infinite;}
  .live-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--up);letter-spacing:0.1em;text-transform:uppercase;}
  .clock-big{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--text2);letter-spacing:0.06em;}
  .refresh-btn{
    background:transparent;border:1px solid var(--border2);
    border-radius:3px;padding:5px 12px;
    font-family:'IBM Plex Mono',monospace;font-size:10px;
    color:var(--muted);cursor:pointer;letter-spacing:0.06em;
    transition:all 0.15s;-webkit-tap-highlight-color:transparent;
  }
  .refresh-btn:active{border-color:var(--accent);color:var(--accent);}

  /* ── HERO STRIP ── */
  .hero-strip{
    padding:20px 20px 16px;
    border-bottom:1px solid var(--border);
    display:flex;align-items:flex-end;justify-content:space-between;
  }
  .hero-time{
    font-family:'IBM Plex Mono',monospace;
    font-size:64px;font-weight:700;line-height:1;
    letter-spacing:-0.02em;color:var(--text);
  }
  .hero-time em{color:var(--accent);font-style:normal;}
  .sync-info{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;color:var(--muted);
    letter-spacing:0.06em;text-align:right;
    display:flex;flex-direction:column;gap:4px;align-items:flex-end;
  }
  .sync-info span{color:var(--text2);}

  /* ── GRID ── */
  .grid{
    display:grid;
    grid-template-columns:1fr;
    gap:1px;
    background:var(--border);
    margin:20px;
    border:1px solid var(--border);
    border-radius:8px;
    overflow:hidden;
  }

  /* ── CARD ── */
  .card{
    background:var(--surface);
    padding:18px 20px;
    cursor:pointer;
    transition:background 0.15s;
    -webkit-tap-highlight-color:transparent;
    position:relative;
  }
  .card:active{background:var(--surface2);}
  .card.up-card{border-left:3px solid var(--up);}
  .card.down-card{border-left:3px solid var(--down);}
  .card.neutral-card{border-left:3px solid var(--border2);}
  .card.expanded{
    background:var(--surface2);
    cursor:default;
    grid-column:1/-1;
    border-left:3px solid var(--accent)!important;
  }

  /* CARD HEADER ROW */
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;}
  .card-meta{display:flex;flex-direction:column;gap:4px;}
  .card-sym-row{display:flex;align-items:center;gap:10px;}
  .card-sym{
    font-family:'IBM Plex Mono',monospace;
    font-size:18px;font-weight:700;color:var(--text);
    letter-spacing:0.04em;
  }
  .phase-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:8px;font-weight:700;
    padding:2px 6px;border-radius:2px;
    letter-spacing:0.1em;text-transform:uppercase;display:none;
  }
  .phase-badge.pre{color:var(--pre-color);border:1px solid rgba(255,170,0,0.3);background:rgba(255,170,0,0.07);}
  .phase-badge.post{color:var(--post-color);border:1px solid rgba(204,136,255,0.3);background:rgba(204,136,255,0.07);}
  .phase-badge.live{color:var(--up);border:1px solid rgba(0,204,102,0.3);background:var(--up-bg);}
  .card-name{font-size:10px;color:var(--muted);letter-spacing:0.04em;}

  /* PRICE AREA */
  .card-price{display:flex;flex-direction:column;align-items:flex-end;gap:0;}

  /* single line */
  .price-single{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
  .p-main{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:700;line-height:1;}
  .p-chg{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:2px 7px;border-radius:2px;}

  /* two-line */
  .price-two{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
  .p-reg-row{display:flex;align-items:center;gap:6px;}
  .p-reg-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.08em;}
  .p-reg-val{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;}
  .p-reg-pct{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;}
  .p-sep{width:100%;height:1px;background:var(--border2);}
  .p-ext-row{display:flex;align-items:center;gap:8px;}
  .p-ext-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;}
  .p-ext-lbl.pre{color:var(--pre-color);}
  .p-ext-lbl.post{color:var(--post-color);}
  .p-ext-val{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;line-height:1;}
  .p-ext-chg{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:2px;}

  .up{color:var(--up)!important;}
  .down{color:var(--down)!important;}
  .neutral{color:var(--muted)!important;}
  .up-chip{background:var(--up-bg);color:var(--up)!important;}
  .down-chip{background:var(--down-bg);color:var(--down)!important;}

  /* ── DETAIL ── */
  .card-sep{height:1px;background:var(--border);margin:16px 0;}
  .card-detail{display:none;}
  .card.expanded .card-detail{display:block;}

  .chart-box{
    border:1px solid var(--border2);height:280px;
    background:#000;width:100%;position:relative;cursor:pointer;
    border-radius:4px;overflow:hidden;
  }
  .chart-box iframe{width:100%;height:100%;border:none;display:block;pointer-events:none;}
  .chart-box.active iframe{pointer-events:auto;}
  .chart-hint{
    position:absolute;bottom:8px;right:10px;
    font-family:'IBM Plex Mono',monospace;font-size:8px;
    color:var(--muted);background:rgba(0,0,0,0.8);
    padding:2px 7px;border-radius:2px;pointer-events:none;letter-spacing:0.04em;
  }
  .chart-box.active .chart-hint{display:none;}

  .stat-row{display:flex;gap:1px;background:var(--border);margin-top:14px;border-radius:4px;overflow:hidden;}
  .stat-item{background:var(--surface);flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:3px;}
  .stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;}
  .stat-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--text);}

  /* ── BOTTOM ── */
  .bottom-area{margin:0 20px;}
  .discord-box{
    padding:18px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:6px;
    display:flex;flex-direction:column;gap:10px;
    margin-bottom:12px;
  }
  .discord-title{font-size:11px;font-weight:600;color:#7c8bff;display:flex;align-items:center;gap:6px;}
  .discord-text{font-size:10px;color:var(--muted);line-height:1.8;}
  .discord-hl{
    color:var(--accent);
    border:1px solid rgba(255,204,0,0.3);
    border-radius:2px;padding:1px 6px;font-size:9px;
    background:rgba(255,204,0,0.06);
    font-family:'IBM Plex Mono',monospace;letter-spacing:0.06em;
  }
  .discord-btn-group{display:flex;flex-direction:column;gap:8px;}
  .discord-btn{
    width:100%;padding:11px;background:var(--discord);
    color:#fff;border:none;border-radius:4px;
    font-size:11px;font-weight:600;cursor:pointer;
    text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .discord-btn:active{opacity:0.8;}
  .discord-btn-outline{background:transparent;border:1px solid var(--discord);color:#7c8bff;}

  .notice{
    padding:10px 14px;
    background:var(--surface);border:1px solid var(--border);
    border-radius:4px;font-size:9px;color:var(--muted);
    line-height:1.7;font-family:'IBM Plex Mono',monospace;letter-spacing:0.03em;
  }

  @keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}

  @media(min-width:600px){
    .hero-time{font-size:80px;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .discord-btn-group{flex-direction:row;}
    .discord-btn{flex:1;}
    .chart-box{height:380px;}
  }
  @media(min-width:1024px){
    .grid{grid-template-columns:repeat(3,1fr);}
    .chart-box{height:460px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">盤前情報 PRO</div>
    <div class="topbar-divider"></div>
    <div class="topbar-date" id="topbarDate">--</div>
  </div>
  <div class="topbar-right">
    <div class="live-chip">
      <div class="live-dot"></div>
      <div class="live-label">LIVE</div>
    </div>
    <div class="clock-big" id="clock">--:--:--</div>
    <div class="refresh-btn" onclick="manualRefresh()">↻ REFRESH</div>
  </div>
</div>

<div class="hero-strip">
  <div class="hero-time" id="heroTime">--<em>:</em>--</div>
  <div class="sync-info">
    <div>LAST SYNC</div>
    <div><span id="update-status">--:--</span></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="bottom-area">
  <div class="discord-box">
    <div class="discord-title">🛡️ 24H 雲端自動推送已部署</div>
    <div class="discord-text">
      無須開啟網頁，GitHub 雲端將於每日美股盤後 <span class="discord-hl">05:30</span> 與晚間 <span class="discord-hl">17:30</span> 自動精準推送至 Telegram 頻道
    </div>
    <div class="discord-btn-group">
      <a class="discord-btn" href="https://discord.gg/vzVbybVvys" target="_blank">📱 進入美股精選情報室</a>
      <a class="discord-btn discord-btn-outline" href="https://discord.gg/vzVbybVvys" target="_blank">⚡ 訂閱推送播報</a>
    </div>
  </div>
  <div class="notice">📌 DATA SOURCE: YAHOO FINANCE VIA GITHUB ACTIONS · AUTO SYNC EVERY HOUR</div>
</div>

<script>
const STOCKS=[
  {sym:'NOW', name:'ServiceNow', ex:'NYSE'},
  {sym:'NVDA',name:'Nvidia',     ex:'NASDAQ'},
  {sym:'LITE',name:'Lumentum',   ex:'NASDAQ'},
  {sym:'ONDS',name:'Ondas',      ex:'NASDAQ'},
  {sym:'MRVL',name:'Marvell',    ex:'NASDAQ'},
  {sym:'GOOG',name:'Google C',   ex:'NASDAQ'},
];
let expandedSym=null, globalDataCache=null;

function updateClock(){
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  const days='日一二三四五六';
  document.getElementById('clock').textContent=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('heroTime').innerHTML=`${pad(now.getHours())}<em>:</em>${pad(now.getMinutes())}`;
  document.getElementById('topbarDate').textContent=`${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} WED ${['SUN','MON','TUE','WED','THU','FRI','SAT'][now.getDay()]}`;
}
setInterval(updateClock,1000); updateClock();

function buildGrid(){
  document.getElementById('grid').innerHTML=STOCKS.map(s=>`
    <div class="card neutral-card" id="card-${s.sym}" onclick="toggleCard('${s.sym}','${s.ex}',event)">
      <div class="card-header">
        <div class="card-meta">
          <div class="card-sym-row">
            <div class="card-sym">${s.sym}</div>
            <div class="phase-badge" id="badge-${s.sym}"></div>
          </div>
          <div class="card-name">${s.name}</div>
        </div>
        <div class="card-price" id="pb-${s.sym}">
          <div class="price-single">
            <div class="p-main neutral">$—</div>
            <div class="p-chg neutral">— —%</div>
          </div>
        </div>
      </div>
      <div class="card-detail" id="detail-${s.sym}">
        <div class="card-sep"></div>
        <div class="chart-box" onclick="activateChart(this,event)">
          <iframe id="chart-${s.sym}" src="" allowtransparency="true"></iframe>
          <div class="chart-hint">TAP TO INTERACT</div>
        </div>
        <div class="stat-row" id="stat-${s.sym}"></div>
      </div>
    </div>`).join('');
}

const fmt=(n,d=2)=>(n>=0?'+':'')+n.toFixed(d);
const cls=n=>n>=0?'up':'down';
const chip=n=>n>=0?'up-chip':'down-chip';

function renderPrice(sym,q){
  const pb=document.getElementById('pb-'+sym);
  const badge=document.getElementById('badge-'+sym);
  const card=document.getElementById('card-'+sym);
  if(!pb||!q) return;

  const phase=q.phase||'';
  const regular=q.regular!=null?Number(q.regular):Number(q.c||0);
  const prevClose=Number(q.prev_close||0);
  const pre=q.pre!=null?Number(q.pre):null;
  const post=q.post!=null?Number(q.post):null;

  badge.className='phase-badge'; badge.style.display='none';
  card.className='card';

  if(phase==='盤前'&&pre!=null){
    const d=pre-prevClose, dp=prevClose?d/prevClose*100:0;
    card.classList.add(d>=0?'up-card':'down-card');
    badge.className='phase-badge pre'; badge.textContent='PRE-MKT'; badge.style.display='';
    pb.innerHTML=`<div class="price-two">
      <div class="p-reg-row">
        <span class="p-reg-lbl">PREV CLOSE</span>
        <span class="p-reg-val neutral">$${prevClose.toFixed(2)}</span>
      </div>
      <div class="p-sep"></div>
      <div class="p-ext-row">
        <span class="p-ext-lbl pre">PRE</span>
        <span class="p-ext-val ${cls(d)}">$${pre.toFixed(2)}</span>
        <span class="p-ext-chg ${chip(d)}">${fmt(d)} ${fmt(dp)}%</span>
      </div></div>`;

  } else if(phase==='盤後'&&post!=null){
    const regD=regular-prevClose, regDp=prevClose?regD/prevClose*100:0;
    const d=post-regular, dp=regular?d/regular*100:0;
    card.classList.add(d>=0?'up-card':'down-card');
    badge.className='phase-badge post'; badge.textContent='AFTER-MKT'; badge.style.display='';
    pb.innerHTML=`<div class="price-two">
      <div class="p-reg-row">
        <span class="p-reg-lbl">CLOSE</span>
        <span class="p-reg-val ${cls(regD)}">$${regular.toFixed(2)}</span>
        <span class="p-reg-pct ${cls(regD)}">${fmt(regDp)}%</span>
      </div>
      <div class="p-sep"></div>
      <div class="p-ext-row">
        <span class="p-ext-lbl post">POST</span>
        <span class="p-ext-val ${cls(d)}">$${post.toFixed(2)}</span>
        <span class="p-ext-chg ${chip(d)}">${fmt(d)} ${fmt(dp)}%</span>
      </div></div>`;

  } else {
    const c=Number(q.c||0), d=Number(q.d||0), dp=Number(q.dp||0);
    card.classList.add(d>=0?'up-card':'down-card');
    if(phase==='正式盤'){badge.className='phase-badge live';badge.textContent='MKT OPEN';badge.style.display='';}
    pb.innerHTML=`<div class="price-single">
      <div class="p-main ${cls(d)}">$${c.toFixed(2)}</div>
      <div class="p-chg ${chip(d)}">${fmt(d)} ${fmt(dp)}%</div>
    </div>`;
  }
}

function renderStat(sym,q){
  const row=document.getElementById('stat-'+sym);
  if(!row||!q) return;
  const items=[];
  if(q.regular&&q.regular!==0) items.push({l:'CLOSE',v:'$'+Number(q.regular).toFixed(2)});
  if(q.prev_close&&q.prev_close!==0) items.push({l:'PREV CLOSE',v:'$'+Number(q.prev_close).toFixed(2)});
  if(q.pre!=null) items.push({l:'PRE-MKT',v:'$'+Number(q.pre).toFixed(2)});
  if(q.post!=null) items.push({l:'AFTER-MKT',v:'$'+Number(q.post).toFixed(2)});
  row.innerHTML=items.map(i=>`<div class="stat-item"><div class="stat-lbl">${i.l}</div><div class="stat-val">${i.v}</div></div>`).join('');
}

function toggleCard(sym,ex,event){
  if(event.target.closest('.card-detail')) return;
  const card=document.getElementById('card-'+sym);
  if(!card) return;
  const isExp=card.classList.contains('expanded');
  if(expandedSym&&expandedSym!==sym){
    const prev=document.getElementById('card-'+expandedSym);
    if(prev){prev.classList.remove('expanded');const pi=document.getElementById('chart-'+expandedSym);if(pi)pi.src='';}
  }
  if(!isExp){
    card.classList.add('expanded'); expandedSym=sym;
    const iframe=document.getElementById('chart-'+sym);
    if(iframe) iframe.src=`https://www.tradingview.com/widgetembed/?symbol=${ex}:${sym}&interval=D&hidesidetoolbar=1&theme=dark&style=1&timezone=Asia/Taipei&locale=zh_TW`;
    renderStat(sym,globalDataCache?.[sym]?.quote);
    setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),120);
  } else {
    card.classList.remove('expanded'); expandedSym=null;
    const iframe=document.getElementById('chart-'+sym);
    if(iframe) iframe.src='';
    setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
  }
}

function activateChart(boxEl,event){event.stopPropagation();boxEl.classList.add('active');}
document.addEventListener('click',e=>{if(!e.target.closest('.chart-box'))document.querySelectorAll('.chart-box.active').forEach(b=>b.classList.remove('active'));});

async function loadCloudData(){
  const s=document.getElementById('update-status');
  try{
    const res=await fetch('./stock_data.json?t='+Date.now());
    const json=await res.json();
    globalDataCache=json?.data??{};
    STOCKS.forEach(st=>{const d=globalDataCache[st.sym];if(d)renderPrice(st.sym,d.quote);});
    const n=new Date(),pad=x=>String(x).padStart(2,'0');
    if(s) s.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}`;
  }catch(e){console.error(e);if(s)s.textContent='SYNC FAILED';}
}
function manualRefresh(){loadCloudData();}
buildGrid(); loadCloudData();
setInterval(loadCloudData,60000);
</script>
</body>
</html>
